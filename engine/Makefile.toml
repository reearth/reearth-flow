[config]
skip_core_tasks = true
default_to_workspace = false

[env]
PROJ_NAME = "reearth-flow"

[tasks.format]
script = ['''
#!/usr/bin/env bash -eux
cargo fmt --all ${@:-}
''']

# NOTE: `--all-features` is intentionally avoided. It would enable the `new-geometry`
# migration flag, which switches `Feature.geometry` to the new type and is mutually
# exclusive with the default geometry world. So the default world is checked plainly,
# and `new-geometry` is built separately (lib/bin only, since un-ported actions hit
# the loud runtime default and their tests fail by design until ported). CI builds both.
[tasks.check]
script = ['''
#!/usr/bin/env bash -eux
cargo check --workspace --all-targets
cargo check -p reearth-flow-cli -p reearth-flow-worker --features new-geometry
''']

[tasks.clippy]
script = ['''
#!/usr/bin/env bash -eux
cargo clippy --workspace --all-targets -- -D warnings
cargo clippy -p reearth-flow-cli -p reearth-flow-worker --features new-geometry -- -D warnings
''']

[tasks.clippy-fix]
script = ['''
#!/usr/bin/env bash -eux
cargo clippy --workspace --all-targets --fix ${@:-}
''']

[tasks.test]
script = ['''
#!/usr/bin/env bash -eux
cargo make test-rs ${@:-}
cargo make test-qc ${@:-}
cargo make test-conv ${@:-}
''']

[tasks.test-rs]
script = ['''
#!/usr/bin/env bash -eux
# Default geometry world only. The `new-geometry` world cannot be tested until
# actions are ported (un-ported actions hit the loud runtime default).
cargo test --workspace --all-targets --exclude workflow-tests ${@:-}
''']

[tasks.test-qc]
script = ['''
#!/usr/bin/env bash -eux
# Defaults to cargo's normal thread count (= N_CPUs). CI overrides via
# `cargo make test-qc -- --test-threads=16` so local development is not
# forced to a CI-specific value.
cargo test -p workflow-tests ${@:-}
''']

[tasks.test-conv]
script = ['''
#!/usr/bin/env bash -eux
export RUST_LOG=warn,plateau_tiles_test=info # avoid engine info log flooding
export PLATEAU_TILES_TEST_CLEANUP=1
export PLATEAU_TILES_TEST_CONCURRENCY="${PLATEAU_TILES_TEST_CONCURRENCY:-4}" # default 4, caller can override
cargo run -p plateau-tiles-test --bin plateau-tiles-test ${@:-}
''']

[tasks.doc]
script = ['''
#!/usr/bin/env bash -eux
cargo clean --doc
cargo doc --no-deps --all-features
''']

[tasks.coverage]
script = [
  '''
#!/usr/bin/env bash -eux
rm -rf target/debug/deps/${PROJ_NAME}-*

export CARGO_INCREMENTAL=0
export RUSTFLAGS="-Zinstrument-coverage"
export LLVM_PROFILE_FILE="${PROJ_NAME}-%p-%m.profraw"

cargo build --workspace --verbose
cargo test --workspace --verbose

grcov . -s . --binary-path ./target/debug/ -t lcov --branch --ignore-not-existing -o lcov.info
''',
]

[tasks.check-easy-panic]
script = ['''
#!/usr/bin/env bash -eux
git ls-files |grep -E '.rs$' |(! xargs grep 'unimplemented!')
git ls-files |grep -E '.rs$' |(! xargs grep 'todo!')
''']

[tasks.check-action-tracing]
script = ['''
#!/usr/bin/env bash -eu
# Actions must report via ctx.report()/ctx.warn(), not raw tracing macros (spec: logs-error G3/G4).
# The allowlist pins per-file counts of legacy call sites and must shrink to empty:
# converting a site requires updating tools/action-tracing-allowlist.txt in the same commit.
# (Qualified `tracing::` form only; imported `warn!`/`error!` macros are caught in review.)
actual=$(mktemp)
git ls-files 'runtime/action-*' | grep -E '\.rs$' \
  | xargs grep -c -E 'tracing::(warn|error)!' 2>/dev/null \
  | grep -v ':0$' | sort > "$actual" || true
if ! diff -u tools/action-tracing-allowlist.txt "$actual"; then
  echo "tracing::warn!/tracing::error! call sites in action crates changed."
  echo "New sites are forbidden — use ctx.report()/ctx.warn()."
  echo "If you converted sites, regenerate the allowlist: cargo make update-action-tracing-allowlist"
  exit 1
fi
''']

[tasks.update-action-tracing-allowlist]
script = ['''
#!/usr/bin/env bash -eu
git ls-files 'runtime/action-*' | grep -E '\.rs$' \
  | xargs grep -c -E 'tracing::(warn|error)!' 2>/dev/null \
  | grep -v ':0$' | sort > tools/action-tracing-allowlist.txt
echo "wrote tools/action-tracing-allowlist.txt"
''']

# Generates actions.json (base English schema) and syncs i18n skeleton files.
# Run this after adding or modifying any action. Then fill in translations and run schema-translated.
[tasks.schema-base]
script = [
  '''
#!/usr/bin/env bash -eux
rm -rf "./schema/actions.json"
cargo run --package reearth-flow-cli -- schema-action > ./schema/actions.json
cargo run --package reearth-flow-cli -- scaffold-i18n --dir "$PWD/schema/i18n/actions"
cargo run --package reearth-flow-cli -- schema-error-codes > ./schema/error-codes.json
''',
]

# Generates translated schema files and docs from the current i18n source files.
# Run after filling in translations in schema/i18n/actions/.
[tasks.schema-translated]
script = ['''
#!/usr/bin/env bash -eux
FILES=(
  "./schema/actions_en.json"
  "./schema/actions_es.json"
  "./schema/actions_fr.json"
  "./schema/actions_ja.json"
  "./schema/actions_zh.json"
  "./docs/mdbook/src/action.md"
)

for f in "${FILES[@]}"; do
  rm -rf "$f"
done

LANGS=(en es fr ja zh)

for lang in "${LANGS[@]}"; do
  cargo run --package reearth-flow-cli \
    -- schema-action \
    --language-file-path "$PWD/schema/i18n/actions/${lang}.json" \
    > "./schema/actions_${lang}.json"
done

cargo run --package reearth-flow-cli -- doc-action > ./docs/mdbook/src/action.md
''']

[tasks.check-schema]
script = [
  '''
#!/usr/bin/env bash -eux

cargo make schema-base
cargo make schema-translated
git add -N .
line=$(git diff | wc -l)
if [ "$line" -gt 0 ]; then
  echo "Please run 'cargo make schema-base' and 'cargo make schema-translated' and commit the changes."
  git --no-pager diff
  exit 1
fi
''',
]

[tasks.doc-workflow]
script = ['''
#!/usr/bin/env bash -eux
rm -rf ./schema/workflow.json
cargo run --package reearth-flow-cli -- schema-workflow > ./schema/workflow.json
''']

[tasks.serve-mdbook]
script = ['''
#!/usr/bin/env bash -eux
mdbook serve docs/mdbook
''']

[tasks.format-taplo]
script = ['''
#!/usr/bin/env bash -eux
if ! command -v taplo &> /dev/null; then
  cargo install taplo-cli
fi
taplo fmt ${@:-}
''']

[tasks.generate-cms-workflow]
script = [
  '''
#!/usr/bin/env bash -eux
FEATURES=(
  "bldg"
)

for feature_type in "${FEATURES[@]}"; do
  rm -rf "./worker/workflow/cms/plateau4/data-convert/${feature_type}/workflow.json"
  if [ -e "./worker/workflow/cms/plateau4/data-convert/${feature_type}/template/workflow.yml" ]; then
    yaml-include ./worker/workflow/cms/plateau4/data-convert/${feature_type}/template/workflow.yml | yq eval -o=json - > ./worker/workflow/cms/plateau4/data-convert/${feature_type}/workflow.json
  fi
  rm -rf "./worker/workflow/cms/plateau4/quality-check/${feature_type}/workflow.json"
  if [ -e "./worker/workflow/cms/plateau4/quality-check/${feature_type}/template/workflow.yml" ]; then
    yaml-include ./worker/workflow/cms/plateau4/quality-check/${feature_type}/template/workflow.yml | yq eval -o=json - > ./worker/workflow/cms/plateau4/quality-check/${feature_type}/workflow.json
  fi
done

''',
]

[tasks.generate-examples-cms-workflow]
script = [
  '''
#!/usr/bin/env bash -eux

BASEPATH_CONV=./runtime/examples/fixture/workflow/data-convert/plateau4/
WORKFLOW_CONV=(
  "01-bldg"
  "02-tran-rwy-trk-squr-wwy"
  "03-frn-veg"
  "04-luse-lsld"
  "05-fld"
  "06-area-urf"
  "07-brid-tun-cons"
  "08-ubld"
  "09-unf"
  "10-wtr"
  "11-gen"
)

BASEPATH_QC=./runtime/examples/fixture/workflow/quality-check/plateau4/
WORKFLOW_QC=(
  "01-common"
  "02-bldg"
  "03-tran"
  "04-frn-veg"
  "05-luse-urf-area"
  "06-fld"
  "07-lsld"
  "08-dem"
  "09-brid-tun-ubld"
  "10-cons"
  "11-wtr"
  "12-unf"
  "13-gen"
)

process_workflows() {
  local base_path="$1"
  shift
  for filename in "$@"; do
    (
      cd "$base_path"
      yaml-include "${filename}/workflow.yml" > "${filename}.yml"
    )
  done
}

process_workflows "$BASEPATH_CONV" "${WORKFLOW_CONV[@]}"
process_workflows "$BASEPATH_QC" "${WORKFLOW_QC[@]}"

# Solar radiation workflow
yaml-include ./runtime/examples/fixture/workflow/solar-radiation/workflow.yml > ./runtime/examples/fixture/workflow/solar-radiation/solar-radiation.yml
''',
]

[tasks.check-generate-examples-cms-workflow]
script = [
  '''
#!/usr/bin/env bash -eux

cargo make generate-examples-cms-workflow
git add -N .
line=$(git diff | wc -l)
if [ "$line" -gt 0 ]; then
  echo "Please run 'cargo make generate-examples-cms-workflow' and commit the changes."
  git --no-pager diff
  exit 1
fi
''',
]

[tasks.ci]
script = ['''
#!/usr/bin/env bash -eux

# check
cargo make check

# rustfmt
cargo make format --check

# clippy
cargo make clippy

# taplo
cargo make format-taplo --check

# check generated schema
cargo make check-schema

# check generated cms workflows
cargo make check-generate-examples-cms-workflow

# run tests
cargo make test
''']
