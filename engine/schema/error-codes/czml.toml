[[codes]]
code = "czml.missing_feature_id"
category = "schema"
default_disposition = "warn_drop"
message = "skipped feature without a feature_id"
help = "Ensure upstream features carry a CityGML gml:id before reaching the CZML Writer."

[[codes]]
code = "czml.non_citygml_geometry"
category = "geometry"
default_disposition = "warn_drop"
message = "skipped feature with non-CityGML geometry"
help = "CZML Writer only converts CityGML geometry to polygons; route other geometry types to a different writer."

[[codes]]
code = "czml.empty_geometry"
category = "geometry"
default_disposition = "warn_drop"
message = "skipped feature whose geometry contains no polygons"
help = "Check the feature's LOD geometries; only LOD > 0 geometries with polygons are converted."
