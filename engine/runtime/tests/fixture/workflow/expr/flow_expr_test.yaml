id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
name: "FlowExprTest integration test"
entryGraphId: b2c3d4e5-f6a7-8901-bcde-f12345678901
with:
  outputFilePath:
  foobar: "file:///tmp"
graphs:
  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: entrypoint
    nodes:
      - id: c3d4e5f6-a7b8-9012-cdef-123456789012
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator:
            type: flowExpr
            value: '[{"filename": "hello.txt"}]'

      - id: d4e5f6a7-b8c9-0123-defa-234567890123
        name: FlowExprTest
        type: action
        action: FlowExprTest
        with:
          mappings:
            - attribute: result
              value:
                type: flowExpr
                value: 'Url(env["foobar"]) / attributes["filename"]'

      - id: e5f6a7b8-c9d0-1234-efab-345678901234
        name: JsonWriter
        type: action
        action: JsonWriter
        with:
          output:
            type: flowExpr
            value: 'env["outputFilePath"]'

    edges:
      - id: f1111111-1111-1111-1111-111111111111
        from: c3d4e5f6-a7b8-9012-cdef-123456789012
        to: d4e5f6a7-b8c9-0123-defa-234567890123
        fromPort: default
        toPort: default

      - id: f2222222-2222-2222-2222-222222222222
        from: d4e5f6a7-b8c9-0123-defa-234567890123
        to: e5f6a7b8-c9d0-1234-efab-345678901234
        fromPort: default
        toPort: default
