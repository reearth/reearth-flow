            env.get("joinedOutputPath")

      - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name: JsonWriterUnjoinedRequestor
        type: action
        action: JsonWriter
        with:
          output: |
            env.get("unjoinedRequestorOutputPath")

      - id: b2c3d4e5-f6a7-8901-bcde-f23456789012
        name: JsonWriterUnjoinedSupplier
        type: action
        action: JsonWriter
        with:
          output: |
            env.get("unjoinedSupplierOutputPath")

    edges:
