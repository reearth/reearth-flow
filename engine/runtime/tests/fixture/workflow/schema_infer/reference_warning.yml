# Demonstrates an END-TO-END validation WARNING (not error).
# The AttributeMapper uses the parent/child form, which inserts `maybeAttr` only
# when the parent map contains the child — so the field is recorded with
# Presence::Maybe. The downstream AttributeManager references `maybeAttr`: it
# exists in the (closed) schema but may not always be present, so the validator
# emits a WARNING and `build` still exits 0 (warnings do not fail the build).
id: 11111111-1111-1111-1111-111111111111
name: "schema-validation reference warning"
entryGraphId: 22222222-2222-2222-2222-222222222222
with:
graphs:
  - id: 22222222-2222-2222-2222-222222222222
    name: entry
    nodes:
      - id: 33333333-3333-3333-3333-333333333333
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [ #{ raw: "x" } ]
      - id: 44444444-4444-4444-4444-444444444444
        name: Mapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: "maybeAttr"
              parentAttribute: "raw"
              childAttribute: "k"
      - id: 55555555-5555-5555-5555-555555555555
        name: ConvertMaybe
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: "maybeAttr"
              method: convert
              value:
                type: flowExpr
                value: "1"
    edges:
      - id: 66666666-6666-6666-6666-666666666666
        from: 33333333-3333-3333-3333-333333333333
        to: 44444444-4444-4444-4444-444444444444
        fromPort: default
        toPort: default
      - id: 77777777-7777-7777-7777-777777777777
        from: 44444444-4444-4444-4444-444444444444
        to: 55555555-5555-5555-5555-555555555555
        fromPort: default
        toPort: default
