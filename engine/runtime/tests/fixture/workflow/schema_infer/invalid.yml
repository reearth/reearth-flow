# NOTE: This fixture exercises the validator over a workflow that references an
# attribute (`nonexistent`) that no upstream node produces. With the current
# inference implementation, the FeatureCreator source seeds an `open` schema and
# the AttributeManager processor preserves `open`, so the reaching schema is open
# and the reference check is suppressed (no ERROR is emitted). The validator
# still runs end-to-end. The hard-ERROR path is covered by the unit tests in
# `reearth_flow_runtime::schema_infer` using closed-schema stub producers.
