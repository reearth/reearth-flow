# Demonstrates a TYPED end-to-end validation error.
# StatisticsCalculator's `default` port emits a fresh, CLOSED, *typed* schema:
# group_by attrs as String, calculations as Number (input attributes dropped).
# Here that schema is {region: String, total: Number}. The downstream
# AttributeManager `convert` references `average`, which the aggregation does not
# produce — against the closed schema this is a hard ERROR and `build` exits
# non-zero. Unlike the AttributeMapper case, the surviving fields carry KNOWN
# types (String/Number), proving typed inference end-to-end, not just name tracking.
id: 11111111-1111-1111-1111-111111111111
name: "typed reference error via StatisticsCalculator"
entryGraphId: 22222222-2222-2222-2222-222222222222
with:
graphs:
  - id: 22222222-2222-2222-2222-222222222222
    name: entry
    nodes:
      - id: 33333333-3333-3333-3333-333333333333
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: "[ #{ region: \"A\", val: 1 } ]"
      - id: 44444444-4444-4444-4444-444444444444
        name: Stats
        type: action
        action: StatisticsCalculator
        with:
          groupBy: ["region"]
          calculations:
            - newAttribute: "total"
              expr: "feature.val"
      - id: 55555555-5555-5555-5555-555555555555
        name: ConvertMissing
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: "average"
              method: convert
              value:
                type: flowExpr
                value: "1"
    edges:
      - id: 66666666-6666-6666-6666-666666666666
        from: 33333333-3333-3333-3333-333333333333
        to: 44444444-4444-4444-4444-444444444444
        fromPort: default
        toPort: default
      - id: 77777777-7777-7777-7777-777777777777
        from: 44444444-4444-4444-4444-444444444444
        to: 55555555-5555-5555-5555-555555555555
        fromPort: default
        toPort: default
