# The valid counterpart of reference_error.yml: the downstream AttributeManager
# `convert` references `name`, which the AttributeMapper DOES produce. Against the
# closed {name, area} schema this resolves cleanly, so `build` exits 0. This guards
# against false positives — the validator must not flag references that are satisfied.
id: 11111111-1111-1111-1111-111111111111
name: "schema-validation reference ok"
entryGraphId: 22222222-2222-2222-2222-222222222222
with:
graphs:
  - id: 22222222-2222-2222-2222-222222222222
    name: entry
    nodes:
      - id: 33333333-3333-3333-3333-333333333333
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [ #{ raw: "x" } ]
      - id: 44444444-4444-4444-4444-444444444444
        name: Mapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: "name"
              expr: "feature.raw"
            - attribute: "area"
              expr: "1.0"
      - id: 55555555-5555-5555-5555-555555555555
        name: ConvertPresent
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: "name"
              method: convert
              value:
                type: flowExpr
                value: "env.get(\"x\")"
    edges:
      - id: 66666666-6666-6666-6666-666666666666
        from: 33333333-3333-3333-3333-333333333333
        to: 44444444-4444-4444-4444-444444444444
        fromPort: default
        toPort: default
      - id: 77777777-7777-7777-7777-777777777777
        from: 44444444-4444-4444-4444-444444444444
        to: 55555555-5555-5555-5555-555555555555
        fromPort: default
        toPort: default
