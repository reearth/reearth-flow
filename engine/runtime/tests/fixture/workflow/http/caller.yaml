            type: string
            value: ram:///fixture/testdata/http/caller/test_data.json

      - id: b1a91180-ab88-4c1a-aab5-48c242a218db
        name: HTTP-Caller
        type: action
        action: HTTPCaller
        with:
          url:
            type: flowExpr
            value: '"https://jsonplaceholder.typicode.com/" + attributes["api_endpoint"]'
          method: GET
          authentication:
            type: bearer
            token:
              type: flowExpr
              value: attributes["auth_token"]
          customHeaders:
            - name: "X-User-ID"
              value:
                type: flowExpr
                value: attributes["user_id"]
          queryParameters:
            - name: "format"
              value:
                type: string
                value: "json"
          response:
            responseBodyAttribute: "_response"
            statusCodeAttribute: "_status"
            headersAttribute: "_response_headers"
            errorAttribute: "_error"
          timeouts:
            connectionTimeout: 30
            transferTimeout: 60

      - id: b1a91180-ab88-4c1a-aab5-48c242a218dc
        name: Sink-Json-Writer-01
        type: action
        action: JSON Writer
        with:
          output:
            type: flowExpr
            value: 'env["outputFilePath"]'

