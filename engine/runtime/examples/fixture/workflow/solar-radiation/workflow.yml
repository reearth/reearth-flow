# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
id: 6a8c4f2e-9b1d-4e7a-b3c5-6f8e2a4b9d7c
name: SolarRadiationWorkflow
entryGraphId: 34bf873b-3364-46b0-8153-efeb9568bb3c
with:
  bldgCityGmlPath:
  demCityGmlPath:
  roofFilterShapefilePath:
  roofFilterEpsgCode: 4326
  codelistsPath:
  schemasPath:
  codelists:
  schemas:
  prcs:
  startTime:
  endTime:
  outputReflection: false
  considerDEM: false
  dailySunDataPath:
  monthlyWeatherDataPath:
  snowDepthDataPath:
  maxRadiationPerDay: 7.5 # kW/m^2
  directNormalIrradianceFactor: 1.367 # kW/m^2
  photovoltaicConversionEfficiency: 0.167
  lossConstant: 0.88
  monthlyTransmissivity:
    - 0.75 # January
    - 0.72 # February
    - 0.67 # March
    - 0.64 # April
    - 0.64 # May
    - 0.62 # June
    - 0.63 # July
    - 0.64 # August
    - 0.68 # September
    - 0.71 # October
    - 0.74 # November
    - 0.75 # December
  # Adequate place judgment parameters
  # Category 1 — Panel installation priority
  solarRadiationThreshold:         # 1_1_1: threshold in kWh/m².
  lowerPercent:                    # 1_1_2: bottom percentile to exclude (%).
  bldgStructureToExclude:          # 1_2: set true to exclude buildings of that structure type
    木造・土蔵造: false              # uro:buildingStructureType = 601
    鉄骨鉄筋コンクリート造: false     # 602
    鉄筋コンクリート造: false        # 603
    鉄骨造: false                  # 604
    軽量鉄骨造: false               # 605
    レンガ造等: false               # 606
    非木造: false                  # 610
    不明: false                    # 999 or missing
  floorsBelow:                     # 1_3: exclude if floorCount <= this.
  upperFloors:                     # 1_3: exclude if floorCount >= this.
  # Category 2 — Disaster risk
  enableTsunamiCheck: false        # 2_1
  enableFloodCheck: false          # 2_2
  enableLandslideCheck: false      # 2_3
  snowDepthShapefilePath:          # 2_4: path to snow depth shapefile ZIP. null = skip
  snowDepthThreshold:              # 2_4: depth threshold in m.
  snowLoad:                        # 2_4: load threshold in kgf/m²
  snowUnitWeight: 3000.0           # 2_4: unit weight of snow in N/m³
  # Category 3 — Restriction zones (3 independent zones)
  restrictAreaPath1:               # 3_1: path to zone 1 shapefile ZIP. null = skip
  restrictHeight1:                 # 3_1: height threshold (m).
  restrictDirection1:              # 3_1: restricted azimuth (°, North=0)
  restrictAreaPath2:
  restrictHeight2:
  restrictDirection2:
  restrictAreaPath3:
  restrictHeight3:
  restrictDirection3:
graphs:
  - !include ../../graphs/plateau4/folder_and_file_path_reader.yml
  - !include cloud_factor.yml
  - !include adequate_place_judgement.yml
  - id: 34bf873b-3364-46b0-8153-efeb9568bb3c
    name: main
    nodes:
      - id: 00000001-0000-0000-0000-000000000001
        name: BldgFeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{
                cityGmlPath: env.get("bldgCityGmlPath"),
                cityCode: env.get("cityCode") ?? file::extract_filename(env.get("bldgCityGmlPath"))[0..5],
                baseCityCode: env.get("cityCode") ?? file::extract_filename(env.get("bldgCityGmlPath"))[0..5],
                codelists: env.get("codelistsPath") ?? env.get("codelists"),
                schemas: env.get("schemasPath") ?? env.get("schemas"),
              },
            ]

      - id: 00000001-0000-0000-0000-000000000111
        name: FolderAndFilePathReader
        type: subGraph
        subGraphId: c6863b71-953b-4d15-af56-396fc93fc617

      # ========================================
      # DEM Import Pipeline
      # ========================================

      - id: 00000002-0000-0000-0000-000000000001
        name: DEMFeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{
                cityGmlPath: env.get("demCityGmlPath"),
                cityCode: env.get("cityCode") ?? file::extract_filename(env.get("demCityGmlPath"))[0..5],
                baseCityCode: env.get("cityCode") ?? file::extract_filename(env.get("demCityGmlPath"))[0..5],
                codelists: env.get("codelistsPath") ?? env.get("codelists"),
                schemas: env.get("schemasPath") ?? env.get("schemas"),
              },
            ]

      - id: 00000002-0000-0000-0000-000000000002
        name: DEMDirectoryDecompressor
        type: action
        action: DirectoryDecompressor
        with:
          archiveAttributes:
            - codelists
            - schemas

      - id: 00000002-0000-0000-0000-000000000003
        name: DEMFeatureFilePathExtractor
        type: action
        action: FeatureFilePathExtractor
        with:
          sourceDataset: |
            env.get("__value")["cityGmlPath"]
          extractArchive: true
          destPrefix: udx

      - id: 00000002-0000-0000-0000-000000000004
        name: DEMFeatureFilterByGml
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["extension"] == "gml"
              outputPort: default

      - id: 00000002-0000-0000-0000-000000000005
        name: DEMPLATEAU4UDXFolderExtractor
        type: action
        action: PLATEAU4.UDXFolderExtractor
        with:
          cityGmlPath: |
            env.get("__value")["path"]
          codelistsPath: codelists
          schemasPath: schemas

      - id: 00000002-0000-0000-0000-000000000006
        name: DEMPLATEAU4CityGmlMeshBuilder
        type: action
        action: PLATEAU4.CityGmlMeshBuilder
        with:
          errorAttribute: _validation_error
          epsgCode: |
            env.get("prcs")

      - id: 00000001-0000-0000-0000-000000000002
        name: CityGmlReader
        type: action
        action: FeatureCityGmlReader
        with:
          codelistsPath: env.get("__value").codelists
          flatten: true
          dataset: |
            env.get("__value")["path"]

      # Filter by LOD level: LOD2 → default (solar pipeline), LOD1/3/4 → separate 3DTiles writers, LOD0 → dropped
      - id: 00000001-0000-0000-0000-00000000003a
        name: LodFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["lod"] in [1, "1"]
              outputPort: lod1
            - expr:
                type: flowExpr
                value: attributes["lod"] in [2, "2"]
              outputPort: default
            - expr:
                type: flowExpr
                value: attributes["lod"] in [3, "3"]
              outputPort: lod3
            - expr:
                type: flowExpr
                value: attributes["lod"] in [4, "4"]
              outputPort: lod4

      # Keep only featureType attribute to reduce memory footprint
      - id: 00000001-0000-0000-0000-00000000003b
        name: KeepFeatureType
        type: action
        action: AttributeMapper
        with:
          mappers:
          - attribute: featureType
            valueAttribute: featureType
          - attribute: gmlId
            valueAttribute: gmlId

      - id: 00000001-0000-0000-0000-000000000004
        name: GeometryPartExtractor
        type: action
        action: GeometryPartExtractor

      # Assign stable surfaceId per geometry part (before pipeline splits)
      - id: 00000001-0000-0000-0000-000000000041
        name: SurfaceIdCounter
        type: action
        action: FeatureCounter
        with:
          countStart: 0
          outputAttribute: surfaceId

      - id: 00000001-0000-0000-0000-000000000005
        name: HorizontalReprojector
        type: action
        action: HorizontalReprojector
        with:
          targetEpsgCode: |
            env.get("prcs")

      # ========================================
      # Optional Roof Restriction Polygon
      # ========================================

      - id: 00000004-0000-0000-0000-000000000001
        name: RoofFilterShapefileReader
        type: action
        action: ShapefileReader
        with:
          dataset: |
            env.get("roofFilterShapefilePath")
          force2D: true
          allowEmptyPath: true

      - id: 00000004-0000-0000-0000-000000000002
        name: RoofFilterReprojector
        type: action
        action: HorizontalReprojector
        with:
          sourceEpsgCode: |
            env.get("roofFilterEpsgCode")
          targetEpsgCode: |
            env.get("prcs")

      - id: 00000004-0000-0000-0000-000000000003
        name: AreaSpatialFilter
        type: action
        action: SpatialFilter
        with:
          predicate: intersects

      - id: 00000004-0000-0000-0000-000000000004
        name: OccluderSurfaceFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
          - expr:
              type: flowExpr
              value: attributes["featureType"] != "bldg:Building"
            outputPort: default

      - id: 00000001-0000-0000-0000-000000000006
        name: GeometrySplitter
        type: action
        action: GeometrySplitter
        with:
          splitLevel: polygon

      # Note: GeometryCoercer removed to preserve CityGmlGeometry for 3D tiles output
      # PolygonNormalExtractor now supports CityGmlGeometry directly

      # ========================================
      # Section 2: Surface Analysis
      # ========================================

      - id: 00000001-0000-0000-0000-000000000008
        name: PolygonNormalExtractor
        type: action
        action: PolygonNormalExtractor

      - id: 00000001-0000-0000-0000-000000000009
        name: GridDivider
        type: action
        action: GridDivider
        with:
          unitSquareSize: 1.0
          keepSquareOnly: true

      - id: 00000001-0000-0000-0000-00000000000a
        name: FilterRoofSurfaces
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["featureType"] == "bldg:RoofSurface"
              outputPort: default

      # Counter to assign stable cellId per physical grid cell (before timestep expansion)
      - id: 00000001-0000-0000-0000-000000000029
        name: GridCellIdCounter
        type: action
        action: FeatureCounter
        with:
          countStart: 0
          outputAttribute: cellId

      # ========================================
      # Section 3: Solar Position Calculation
      # ========================================

      - id: 00000001-0000-0000-0000-00000000000b
        name: SunPositionCalculator
        type: action
        action: PLATEAU4.SolarPositionCalculator
        with:
          type: duration
          start: |
            env.get("startTime")
          end: |
            env.get("endTime")
          step: "1"
          stepUnit: hour
          sourceEpsg: |
            env.get("prcs")
          outputType: both

      # Convert year, month, date, hour to integers from solarTime (RFC 3339)
      - id: 00000001-0000-0000-0000-000000000040
        name: ConvertDateTimeToIntegers
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: year
              method: create
              value:
                type: flowExpr
                value: 'int(attributes["solarTime"].split("-")[0])'
            - attribute: month
              method: create
              value:
                type: flowExpr
                value: 'int(attributes["solarTime"].split("-")[1])'
            - attribute: date
              method: create
              value:
                type: flowExpr
                value: |
                  dt = attributes["solarTime"].split("T")[0];
                  int(dt.split("-")[2])
            - attribute: hour
              method: create
              value:
                type: flowExpr
                value: |
                  dt = attributes["solarTime"].split("T")[1];
                  int(dt.split(":")[0])

      - id: 00000001-0000-0000-0000-00000000000c
        name: AreaCalculator
        type: action
        action: AreaCalculator
        with:
          areaType: slopedArea
          outputAttribute: cellArea
          multiplier: 1.0

      - id: 00000001-0000-0000-0000-000000000031
        name: GeometryRemover
        type: action
        action: GeometryRemover

      # Restrict attributes before the ray port to reduce feature payload
      - id: 00000001-0000-0000-0000-000000000032
        name: PreRayAttributeMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: gmlId
              valueAttribute: gmlId
            - attribute: surfaceId
              valueAttribute: surfaceId
            - attribute: cellId
              valueAttribute: cellId
            - attribute: year
              valueAttribute: year
            - attribute: month
              valueAttribute: month
            - attribute: slope
              valueAttribute: slope
            - attribute: solarAltitude
              valueAttribute: solarAltitude
            - attribute: solarTime
              valueAttribute: solarTime
            - attribute: cellArea
              valueAttribute: cellArea
            - attribute: cosTheta
              valueAttribute: cosTheta
            - attribute: groundReflectivity
              valueAttribute: groundReflectivity
            - attribute: rayOriginX
              valueAttribute: rayOriginX
            - attribute: rayOriginY
              valueAttribute: rayOriginY
            - attribute: rayOriginZ
              valueAttribute: rayOriginZ
            - attribute: solarDirectionX
              valueAttribute: solarDirectionX
            - attribute: solarDirectionY
              valueAttribute: solarDirectionY
            - attribute: solarDirectionZ
              valueAttribute: solarDirectionZ
            - attribute: normalX
              valueAttribute: normalX
            - attribute: normalY
              valueAttribute: normalY
            - attribute: normalZ
              valueAttribute: normalZ
            - attribute: featureType
              valueAttribute: featureType
            - attribute: azimuth
              valueAttribute: azimuth
            - attribute: dirMatch1
              valueAttribute: dirMatch1
            - attribute: dirMatch2
              valueAttribute: dirMatch2
            - attribute: dirMatch3
              valueAttribute: dirMatch3
            - attribute: _grid_col
              valueAttribute: _grid_col
            - attribute: _grid_row
              valueAttribute: _grid_row

      # ========================================
      # Section 5: Shadow Detection
      # ========================================

      - id: 00000001-0000-0000-0000-000000000010
        name: RayIntersectorShadow
        type: action
        action: RayIntersector
        with:
          # All rays are checked with all geometries
          pairId: |
            "all"
          closestIntersectionOnly: "true"
          includeRayOrigin: "false"
          tolerance: "0.01"
          outputGeometryType: lineSegmentToIntersection
          ray:
            posX: rayOriginX
            posY: rayOriginY
            posZ: rayOriginZ
            dirX: solarDirectionX
            dirY: solarDirectionY
            dirZ: solarDirectionZ


      # ========================================
      # Snow Factor Sub-flow
      # ========================================

      - id: 00000003-0000-0000-0000-000000000001
        name: SnowCSVReader
        type: action
        action: CsvReader
        with:
          format: csv
          dataset: |
            env.get("snowDepthDataPath")
          offset: 1
          headerRows: 0

      - id: 00000003-0000-0000-0000-000000000002
        name: SnowFeatureFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["column1"] == "9"
              outputPort: default

      - id: 00000003-0000-0000-0000-000000000003
        name: SnowAttributeMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: month
              expr:
                type: flowExpr
                value: int(attributes["column2"])
            - attribute: date
              expr:
                type: flowExpr
                value: int(attributes["column3"])
            - attribute: groundReflectivity
              expr:
                type: flowExpr
                value: |
                  if float(attributes["column29"]) < 10.0 { 0.1 } else { 0.7 }

      - id: 00000003-0000-0000-0000-000000000004
        name: SnowFactorMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - month
            - date
          supplierAttribute:
            - month
            - date

      # ========================================
      # Section 6: Direct Radiation Computation (non-shadowed surfaces)
      # ========================================

      # First compute cos_theta and ray endpoints
      - id: 00000001-0000-0000-0000-000000000011
        name: ComputeCosTheta
        type: action
        action: AttributeManager
        with:
          operations:
            # cos(theta) = solar_dir · normal (dot product of unit vectors)
            - attribute: cosTheta
              method: create
              value:
                type: flowExpr
                value: |
                  sdx = attributes["solarDirectionX"];
                  sdy = attributes["solarDirectionY"];
                  sdz = attributes["solarDirectionZ"];
                  nx = attributes["normalX"];
                  ny = attributes["normalY"];
                  nz = attributes["normalZ"];
                  cos_th = sdx * nx + sdy * ny + sdz * nz;
                  if cos_th < 0.0 { 0.0 } else { cos_th }

      # Compute DT using the cos_theta from previous step
      # month is already an integer from ConvertDateTimeToIntegers
      - id: 00000001-0000-0000-0000-00000000001d
        name: ComputeRadiation
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: radiationSunny
              method: create
              value:
                type: flowExpr
                value: |
                  p = env["monthlyTransmissivity"][attributes["month"] - 1];
                  h_rad = attributes["solarAltitude"] * math.pi / 180.0;
                  m = 1.0 / math.sin(h_rad);
                  beta_m = p ** m;
                  DT = env["directNormalIrradianceFactor"] * beta_m * attributes["cosTheta"] * attributes["cellArea"];

                  dN = 1 - beta_m;
                  dD = 1 - 1.4 * math.log(p);
                  SH = env["directNormalIrradianceFactor"] * math.sin(h_rad) * (dN / dD) * 0.5;
                  tilt_rad = attributes["slope"] * math.pi / 180.0;
                  ST = SH * (1 + math.cos(tilt_rad)) / 2;

                  TH = env["directNormalIrradianceFactor"] * math.sin(h_rad) + SH;
                  RT = TH * (1 - math.cos(tilt_rad)) / 2 * attributes["groundReflectivity"];

                  DT + ST + RT

            - attribute: radiationCloudy
              method: create
              value:
                type: flowExpr
                value: |
                  p = 1.0 - env["monthlyTransmissivity"][attributes["month"] - 1];
                  h_rad = attributes["solarAltitude"] * math.pi / 180.0;
                  m = 1.0 / math.sin(h_rad);
                  beta_m = p ** m;
                  DT = env["directNormalIrradianceFactor"] * beta_m * attributes["cosTheta"] * attributes["cellArea"];

                  dN = 1 - beta_m;
                  dD = 1 - 1.4 * math.log(p);
                  SH = env["directNormalIrradianceFactor"] * math.sin(h_rad) * (dN / dD) * 0.5;
                  tilt_rad = attributes["slope"] * math.pi / 180.0;
                  ST = SH * (1 + math.cos(tilt_rad)) / 2;

                  TH = env["directNormalIrradianceFactor"] * math.sin(h_rad) + SH;
                  RT = TH * (1 - math.cos(tilt_rad)) / 2 * attributes["groundReflectivity"];

                  DT + ST + RT

      # ========================================
      # Section 6b: Monthly Radiation with Cloud Factor
      # ========================================

      # Cloud Factor Calculator subgraph - computes sunny ratio per month
      - id: 00000001-0000-0000-0000-000000000050
        name: CloudFactorCalculator
        type: subGraph
        subGraphId: b2f4a1c8-7e3d-4b9a-8c5f-1a2e3b4c5d6e

      # Aggregate radiationSunny and radiationCloudy by year/month/cell/surface
      - id: 00000001-0000-0000-0000-000000000051
        name: MonthlyDTAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - year
            - month
            - cellId
            - surfaceId
            - gmlId
            - featureType
            - _grid_col
            - _grid_row
          calculations:
            - newAttribute: radiationSunnySum
              expr: |
                env.get("__value")["radiationSunny"]
            - newAttribute: radiationCloudySum
              expr: |
                env.get("__value")["radiationCloudy"]

      # Merge cloud factor (sunnyRatio) with monthly DT sums
      - id: 00000001-0000-0000-0000-000000000052
        name: CloudFactorDTMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - year
            - month
          supplierAttribute:
            - year
            - month

      # Calculate radiationPerMonth using sunny ratio
      - id: 00000001-0000-0000-0000-000000000053
        name: CalcradiationPerMonth
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: radiationPerMonth
              method: create
              value:
                type: flowExpr
                value: |
                  sunny_ratio = attributes.get("sunnyRatio", 0.0);
                  dt_sunny = attributes.get("radiationSunnySum", 0.0);
                  dt_cloudy = attributes.get("radiationCloudySum", 0.0);
                  sunny_ratio * dt_sunny + (1.0 - sunny_ratio) * dt_cloudy

      # ========================================
      # Section 6c: Total Radiation Aggregation for 3D Tiles
      # ========================================

      # Aggregate radiationPerMonth across all months per cell for unique cellId in ImageRasterizer
      - id: 00000001-0000-0000-0000-000000000071
        name: TotalRadiationAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - cellId
            - surfaceId
            - gmlId
            - featureType
            - _grid_col
            - _grid_row
          calculations:
            - newAttribute: totalSolarRadiation
              expr: |
                env.get("__value")["radiationPerMonth"]
            - newAttribute: totalSolarPower
              expr: |
                let dt = env.get("__value")["radiationPerMonth"] ?? 0.0;
                dt * env.get("photovoltaicConversionEfficiency") * env.get("lossConstant")

      # Aggregate total radiation per surface (sum across all cells of a roof surface)
      - id: 00000001-0000-0000-0000-000000000074
        name: SurfaceRadiationAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - surfaceId
            - gmlId
          calculations:
            - newAttribute: totalSolarRadiation
              expr: |
                env.get("__value")["radiationPerMonth"]
            - newAttribute: totalSolarPower
              expr: |
                let dt = env.get("__value")["radiationPerMonth"] ?? 0.0;
                dt * env.get("photovoltaicConversionEfficiency") * env.get("lossConstant")
            - newAttribute: dirMatchSum1
              expr: env.get("__value")["dirMatch1"] ?? 0
            - newAttribute: dirMatchSum2
              expr: env.get("__value")["dirMatch2"] ?? 0
            - newAttribute: dirMatchSum3
              expr: env.get("__value")["dirMatch3"] ?? 0

      # Merge per-surface solar totals onto roof geometry features
      - id: 00000001-0000-0000-0000-000000000075
        name: SolarAttributeMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - surfaceId
          supplierAttribute:
            - surfaceId

      # Add Japanese-named schema attributes for 3D Tiles output
      - id: 00000001-0000-0000-0000-000000000073
        name: AddSolarSchemaAttributes
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: 予測日射量
              method: create
              value:
                type: flowExpr
                value: 'attributes["totalSolarRadiation"]'
            - attribute: 予測発電量
              method: create
              value:
                type: flowExpr
                value: 'attributes["totalSolarPower"]'
            - attribute: シミュレーション開始日時
              method: create
              value:
                type: flowExpr
                value: 'env["startTime"]'
            - attribute: シミュレーション終了日時
              method: create
              value:
                type: flowExpr
                value: 'env["endTime"]'

      # ========================================
      # Section 6d: Textured 3D Tiles Output
      # ========================================

      # Normalize radiation per day and by maxRadiationPerDay to get t in [0, 1]
      - id: 00000001-0000-0000-0000-000000000070
        name: NormalizeRadiationForColorMapping
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: normalizedRadiation
              method: create
              value:
                type: flowExpr
                value: |
                  start_str = env["startTime"];
                  s_date_parts = start_str.split("-");
                  s_year = float(s_date_parts[0]);
                  s_month = float(s_date_parts[1]);
                  s_day_val = float(s_date_parts[2][:2]);
                  s_a = math.floor((14.0 - s_month) / 12.0);
                  s_y = s_year + 4800.0 - s_a;
                  s_m = s_month + 12.0 * s_a - 3.0;
                  s_jdn = s_day_val + math.floor((153.0 * s_m + 2.0) / 5.0) + 365.0 * s_y + math.floor(s_y / 4.0) - math.floor(s_y / 100.0) + math.floor(s_y / 400.0) - 32045.0;
                  end_str = env["endTime"];
                  e_date_parts = end_str.split("-");
                  e_year = float(e_date_parts[0]);
                  e_month = float(e_date_parts[1]);
                  e_day_val = float(e_date_parts[2][:2]);
                  e_a = math.floor((14.0 - e_month) / 12.0);
                  e_y = e_year + 4800.0 - e_a;
                  e_m = e_month + 12.0 * e_a - 3.0;
                  e_jdn = e_day_val + math.floor((153.0 * e_m + 2.0) / 5.0) + 365.0 * e_y + math.floor(e_y / 4.0) - math.floor(e_y / 100.0) + math.floor(e_y / 400.0) - 32045.0;
                  num_days_raw = e_jdn - s_jdn;
                  if num_days_raw <= 0.0 { num_days = 1.0 } else { num_days = num_days_raw };
                  dt = attributes.get("totalSolarRadiation", 0.0);
                  max_rad = env.get("maxRadiationPerDay", 7.5);
                  t_raw = dt / num_days / max_rad;
                  if t_raw < 0.0 { 0.0 } else if t_raw > 1.0 { 1.0 } else { t_raw }

      # Force 2D for rasterization (project 3D cells to 2D plane)
      - id: 00000001-0000-0000-0000-00000000005f
        name: CellTwoDimensionForcer
        type: action
        action: TwoDimensionForcer

      # Convert radiationPerMonth to RGB colors for rasterization
      - id: 00000001-0000-0000-0000-000000000060
        name: RadiationToColorMapper
        type: action
        action: AttributeManager
        with:
          operations:
            # Map normalized radiation t in [0,1] to blue-cyan-yellow-red color gradient
            # r = clamp(4t-1), g = clamp(4t) - clamp(4t-3), b = 1 - clamp(4t-1)
            - attribute: color_r
              method: create
              value:
                type: flowExpr
                value: |
                  t = attributes.get("normalizedRadiation", 0.0);
                  v = 4.0 * t - 1.0;
                  if v < 0.0 { r = 0.0 } else if v > 1.0 { r = 1.0 } else { r = v };
                  math.round(255.0 * r)
            - attribute: color_g
              method: create
              value:
                type: flowExpr
                value: |
                  t = attributes.get("normalizedRadiation", 0.0);
                  v1_raw = 4.0 * t;
                  if v1_raw < 0.0 { v1 = 0.0 } else if v1_raw > 1.0 { v1 = 1.0 } else { v1 = v1_raw };
                  v2_raw = 4.0 * t - 3.0;
                  if v2_raw < 0.0 { v2 = 0.0 } else if v2_raw > 1.0 { v2 = 1.0 } else { v2 = v2_raw };
                  math.round(255.0 * (v1 - v2))
            - attribute: color_b
              method: create
              value:
                type: flowExpr
                value: |
                  t = attributes.get("normalizedRadiation", 0.0);
                  v = 4.0 * t - 1.0;
                  if v < 0.0 { clamped = 0.0 } else if v > 1.0 { clamped = 1.0 } else { clamped = v };
                  math.round(255.0 * (1.0 - clamped))

      # Merge colors back to original cell polygons (which have geometry)
      # The aggregation pipeline loses geometry, so we need to restore it from CellIdCounter
      - id: 00000001-0000-0000-0000-000000000068
        name: CellGeometryMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - cellId
          supplierAttribute:
            - cellId

      # Extract bounds (especially maxZ) before forcing to 2D
      - id: 00000001-0000-0000-0000-000000000069
        name: CellBoundsExtractor
        type: action
        action: BoundsExtractor
        with:
          zmax: maxZ

      # Exclude bldg:Building solid geometry to avoid duplication with individual bounded surfaces
      - id: 00000001-0000-0000-0000-00000000006c
        name: TextureBuildingFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["featureType"] != "bldg:Building"
              outputPort: default

      # Filter to keep only roof surfaces for texture assignment
      - id: 00000001-0000-0000-0000-00000000006a
        name: FilterRoofForTexture
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["featureType"] == "bldg:RoofSurface"
              outputPort: default

      # ImageRasterizer: creates texture from colored cells and assigns UV to roof geometry
      - id: 00000001-0000-0000-0000-000000000061
        name: ImageRasterizer
        type: action
        action: ImageRasterizer
        with:
          imageWidth: 2048
          saveTo: |
            "roof_radiation_texture.png"
          onOverlap:
            max: |
              env.get("__value")["maxZ"]

      # Reproject textured geometry from projected CRS to WGS84
      - id: 00000001-0000-0000-0000-000000000062
        name: TexturedHorizontalReprojector
        type: action
        action: HorizontalReprojector
        with:
          sourceEpsgCode: |
            env.get("prcs")
          targetEpsgCode: |
            6697

      # BoundsExtractor for textured geometry
      - id: 00000001-0000-0000-0000-000000000063
        name: TexturedBoundsExtractor
        type: action
        action: BoundsExtractor
        with:
          xmin: _xmin
          xmax: _xmax
          ymin: _ymin
          ymax: _ymax
          zmin: _zmin
          zmax: _zmax

      # Calculate center coordinates for tiling
      - id: 00000001-0000-0000-0000-000000000064
        name: TexturedCenterCoords
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: _x
              method: create
              value:
                type: flowExpr
                value: '(attributes["_xmin"] + attributes["_xmax"]) * 0.5'
            - attribute: _y
              method: create
              value:
                type: flowExpr
                value: '(attributes["_ymin"] + attributes["_ymax"]) * 0.5'

      # Vertical reprojection for textured geometry
      - id: 00000001-0000-0000-0000-000000000065
        name: TexturedVerticalReprojector
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      # Write textured 3D Tiles
      - id: 00000001-0000-0000-0000-000000000066
        name: Textured3DTilesWriter
        type: action
        action: Cesium3DTilesWriter
        with:
          schemaKey: __citygml_feature_type
          minZoom: 15
          maxZoom: 18
          attachTexture: true
          dracoCompression: false
          output:
            type: string
            value: textured_roof_3dtiles
          compressOutput:
            type: string
            value: textured_roof_3dtiles.zip

      # ========================================
      # Section 7: Reflection Computation
      # ========================================

      - id: 00000004-0000-0000-0000-000000000010
        name: ReflectionOutputFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: env["outputReflection"] == true or env["outputReflection"] == "true"
              outputPort: default

      - id: 00000001-0000-0000-0000-000000000013
        name: ComputeReflection
        type: action
        action: AttributeManager
        with:
          operations:
            # Reflection direction: R = I - 2(I·N)N where I is incident direction (opposite of solar)
            # I = -solarDirection, I·N = -cosTheta, so R = -solarDirection + 2*cosTheta*normal
            - attribute: reflectDirX
              method: create
              value:
                type: flowExpr
                value: '-attributes["solarDirectionX"] + 2.0 * attributes["cosTheta"] * attributes["normalX"]'
            - attribute: reflectDirY
              method: create
              value:
                type: flowExpr
                value: '-attributes["solarDirectionY"] + 2.0 * attributes["cosTheta"] * attributes["normalY"]'
            - attribute: reflectDirZ
              method: create
              value:
                type: flowExpr
                value: '-attributes["solarDirectionZ"] + 2.0 * attributes["cosTheta"] * attributes["normalZ"]'

      - id: 00000001-0000-0000-0000-000000000014
        name: RayIntersectorReflect
        type: action
        action: RayIntersector
        with:
          # All rays are checked with all geometries
          pairId: |
            "all"
          closestIntersectionOnly: "true"
          includeRayOrigin: "false"
          tolerance: "0.01"
          geomId: |
            env.get("__value")["gmlId"] ?? ""
          ray:
            posX: rayOriginX
            posY: rayOriginY
            posZ: rayOriginZ
            dirX: reflectDirX
            dirY: reflectDirY
            dirZ: reflectDirZ

      # Extract intersection point coordinates (BoundsExtractor on a point)
      - id: 00000001-0000-0000-0000-00000000001b
        name: ReflectionBoundsExtractor
        type: action
        action: BoundsExtractor
        with:
          xmin: reflectHitX
          ymin: reflectHitY
          zmin: reflectHitZ
          xmax: _reflectXmax
          ymax: _reflectYmax
          zmax: _reflectZmax

      - id: 00000001-0000-0000-0000-000000000016
        name: ReflectionWriter
        type: action
        action: CsvWriter
        with:
          format: csv
          output: |
            "反射シミュレーション結果.csv"

      # ========================================
      # Area Computation Branch (for CSV per-m2 values)
      # ========================================

      # Compute sloped area of each roof surface polygon
      - id: 00000001-0000-0000-0000-0000000000d0
        name: RoofAreaCalculator
        type: action
        action: AreaCalculator
        with:
          areaType: slopedArea
          outputAttribute: surfaceArea
          multiplier: 1.0

      # Aggregate area per surface (sum across split polygons within a surface)
      - id: 00000001-0000-0000-0000-0000000000d1
        name: SurfaceAreaAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - surfaceId
            - gmlId
          calculations:
            - newAttribute: totalSurfaceArea
              expr: |
                env.get("__value")["surfaceArea"]

      # Aggregate area per building (sum across surfaces)
      - id: 00000001-0000-0000-0000-0000000000d2
        name: BuildingAreaAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - gmlId
          calculations:
            - newAttribute: totalRoofArea
              expr: |
                env.get("__value")["totalSurfaceArea"]

      # Merge building area into building radiation results
      - id: 00000001-0000-0000-0000-0000000000d3
        name: BuildingAreaMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - gmlId
          supplierAttribute:
            - gmlId

      # Merge surface area into surface radiation results
      - id: 00000001-0000-0000-0000-0000000000d4
        name: SurfaceAreaMerger
        type: action
        action: FeatureMerger
        with:
          requestorAttribute:
            - surfaceId
          supplierAttribute:
            - surfaceId

      # ========================================
      # CSV 1: Building Solar Potential
      # ========================================

      # Aggregate radiation per building (gmlId)
      - id: 00000001-0000-0000-0000-0000000000c0
        name: BuildingRadiationAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy:
            - gmlId
          calculations:
            - newAttribute: totalSolarRadiation
              expr: |
                env.get("__value")["radiationPerMonth"]
            - newAttribute: totalSolarPower
              expr: |
                let dt = env.get("__value")["radiationPerMonth"] ?? 0.0;
                dt * env.get("photovoltaicConversionEfficiency") * env.get("lossConstant")
            - newAttribute: dirMatchSum1
              expr: env.get("__value")["dirMatchSum1"] ?? 0
            - newAttribute: dirMatchSum2
              expr: env.get("__value")["dirMatchSum2"] ?? 0
            - newAttribute: dirMatchSum3
              expr: env.get("__value")["dirMatchSum3"] ?? 0

      # Map building attributes to Japanese column names
      - id: 00000001-0000-0000-0000-0000000000c5
        name: BuildingPotentialMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: 建物ID
              valueAttribute: gmlId
            - attribute: 太陽日射量(kWh)
              valueAttribute: totalSolarRadiation
            - attribute: 太陽日射量(kWh/m2)
              expr:
                type: flowExpr
                value: |
                  area = attributes.get("totalRoofArea", 0.0);
                  if area > 0.0 { attributes["totalSolarRadiation"] / area } else { 0.0 }
            - attribute: 太陽発電量(kWh)
              valueAttribute: totalSolarPower
            - attribute: 太陽発電量(kWh/m2)
              expr:
                type: flowExpr
                value: |
                  area = attributes.get("totalRoofArea", 0.0);
                  if area > 0.0 { attributes["totalSolarPower"] / area } else { 0.0 }
            - attribute: 受光面積(m2)
              valueAttribute: totalRoofArea

      # Write building potential CSV
      - id: 00000001-0000-0000-0000-0000000000c1
        name: BuildingPotentialWriter
        type: action
        action: CsvWriter
        with:
          format: csv
          output: |
            "建物ポテンシャル推計結果.csv"

      # ========================================
      # CSV 4: Per-Surface Radiation
      # ========================================

      # Map surface attributes to Japanese column names
      - id: 00000001-0000-0000-0000-0000000000c6
        name: SurfaceRadiationMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: 建物ID
              valueAttribute: gmlId
            - attribute: 屋根ID
              valueAttribute: surfaceId
            - attribute: 単位面積あたりの日射量(kWh/m2)
              expr:
                type: flowExpr
                value: |
                  area = attributes.get("totalSurfaceArea", 0.0);
                  if area > 0.0 { attributes["totalSolarRadiation"] / area } else { 0.0 }
            - attribute: 対象面全体の日射量(kWh)
              valueAttribute: totalSolarRadiation
            - attribute: 太陽発電量(kWh)
              valueAttribute: totalSolarPower
            - attribute: 受光面積(m2)
              valueAttribute: totalSurfaceArea

      # Write surface radiation CSV
      - id: 00000001-0000-0000-0000-0000000000c2
        name: SurfaceRadiationWriter
        type: action
        action: CsvWriter
        with:
          format: csv
          output: |
            "面別日射量.csv"

      # ========================================
      # CSV 5: Reflection — Map to Japanese column names
      # ========================================

      - id: 00000001-0000-0000-0000-0000000000c7
        name: ReflectionMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: 建物/土地ID
              valueAttribute: gmlId
            - attribute: 屋根ID
              valueAttribute: surfaceId
            - attribute: 日時
              valueAttribute: solarTime
            - attribute: 反射元_座標.X(m)
              valueAttribute: rayOriginX
            - attribute: 反射元_座標.Y(m)
              valueAttribute: rayOriginY
            - attribute: 反射元_座標.Z(m)
              valueAttribute: rayOriginZ
            - attribute: 反射先_座標.X(m)
              valueAttribute: reflectHitX
            - attribute: 反射先_座標.Y(m)
              valueAttribute: reflectHitY
            - attribute: 反射先_座標.Z(m)
              valueAttribute: reflectHitZ
            - attribute: 反射先
              expr:
                type: flowExpr
                value: attributes.get("geomId", "")

      # ========================================
      # CSV 6: Area Aggregation Results
      # ========================================

      # Aggregate all buildings into single-row summary
      - id: 00000001-0000-0000-0000-0000000000c3
        name: AreaAggregator
        type: action
        action: StatisticsCalculator
        with:
          groupBy: []
          calculations:
            - newAttribute: buildingCount
              expr: |
                1
            - newAttribute: areaTotalSolarRadiation
              expr: |
                env.get("__value")["totalSolarRadiation"]
            - newAttribute: areaTotalSolarPower
              expr: |
                env.get("__value")["totalSolarPower"]
            - newAttribute: areaTotalRoofArea
              expr: |
                env.get("__value")["totalRoofArea"]

      # Map aggregation attributes to Japanese column names
      - id: 00000001-0000-0000-0000-0000000000c8
        name: AreaAggregationMapper
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: 対象範囲内建物数
              valueAttribute: buildingCount
            - attribute: 太陽放射量推計(kWh/m2)
              expr:
                type: flowExpr
                value: |
                  area = attributes.get("areaTotalRoofArea", 0.0);
                  if area > 0.0 { attributes["areaTotalSolarRadiation"] / area } else { 0.0 }
            - attribute: 太陽発電量推計(kWh)
              valueAttribute: areaTotalSolarPower

      # Write area aggregation CSV
      - id: 00000001-0000-0000-0000-0000000000c4
        name: AreaAggregationWriter
        type: action
        action: CsvWriter
        with:
          format: csv
          output: |
            "集計結果.csv"

      # ========================================
      # Per-LOD 3D Tiles Output Pipelines (LOD1, LOD3, LOD4)
      # ========================================

      # --- LOD1 Pipeline ---
      - id: 00000001-0000-0000-0000-0000000000a0
        name: BoundsExtractorByLod1
        type: action
        action: BoundsExtractor
        with:
          xmin: _xmin
          ymin: _ymin
          xmax: _xmax
          ymax: _ymax
          zmin: _zmin
          zmax: _zmax

      - id: 00000001-0000-0000-0000-0000000000a1
        name: AttributeManagerXYByLod1
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: _x
              method: create
              value:
                type: flowExpr
                value: '(attributes["_xmin"] + attributes["_xmax"]) * 0.5'
            - attribute: _y
              method: create
              value:
                type: flowExpr
                value: '(attributes["_ymin"] + attributes["_ymax"]) * 0.5'

      - id: 00000001-0000-0000-0000-0000000000a2
        name: VerticalReprojectorByLod1
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: 00000001-0000-0000-0000-0000000000a3
        name: Cesium3DTilesWriterByLod1
        type: action
        action: Cesium3DTilesWriter
        with:
          schemaKey: __citygml_feature_type
          minZoom: 15
          maxZoom: 18
          attachTexture: false
          dracoCompression: false
          output:
            type: string
            value: bldg_lod1
          compressOutput:
            type: string
            value: bldg_lod1.zip

      # --- LOD3 Pipeline ---
      - id: 00000001-0000-0000-0000-0000000000a4
        name: BoundsExtractorByLod3
        type: action
        action: BoundsExtractor
        with:
          xmin: _xmin
          ymin: _ymin
          xmax: _xmax
          ymax: _ymax
          zmin: _zmin
          zmax: _zmax

      - id: 00000001-0000-0000-0000-0000000000a5
        name: AttributeManagerXYByLod3
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: _x
              method: create
              value:
                type: flowExpr
                value: '(attributes["_xmin"] + attributes["_xmax"]) * 0.5'
            - attribute: _y
              method: create
              value:
                type: flowExpr
                value: '(attributes["_ymin"] + attributes["_ymax"]) * 0.5'

      - id: 00000001-0000-0000-0000-0000000000a6
        name: VerticalReprojectorByLod3
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: 00000001-0000-0000-0000-0000000000a7
        name: Cesium3DTilesWriterByLod3
        type: action
        action: Cesium3DTilesWriter
        with:
          schemaKey: __citygml_feature_type
          minZoom: 15
          maxZoom: 18
          attachTexture: false
          dracoCompression: false
          output:
            type: string
            value: bldg_lod3
          compressOutput:
            type: string
            value: bldg_lod3.zip

      # --- LOD4 Pipeline ---
      - id: 00000001-0000-0000-0000-0000000000a8
        name: BoundsExtractorByLod4
        type: action
        action: BoundsExtractor
        with:
          xmin: _xmin
          ymin: _ymin
          xmax: _xmax
          ymax: _ymax
          zmin: _zmin
          zmax: _zmax

      - id: 00000001-0000-0000-0000-0000000000a9
        name: AttributeManagerXYByLod4
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: _x
              method: create
              value:
                type: flowExpr
                value: '(attributes["_xmin"] + attributes["_xmax"]) * 0.5'
            - attribute: _y
              method: create
              value:
                type: flowExpr
                value: '(attributes["_ymin"] + attributes["_ymax"]) * 0.5'

      - id: 00000001-0000-0000-0000-0000000000aa
        name: VerticalReprojectorByLod4
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: 00000001-0000-0000-0000-0000000000ab
        name: Cesium3DTilesWriterByLod4
        type: action
        action: Cesium3DTilesWriter
        with:
          schemaKey: __citygml_feature_type
          minZoom: 15
          maxZoom: 18
          attachTexture: false
          dracoCompression: false
          output:
            type: string
            value: bldg_lod4
          compressOutput:
            type: string
            value: bldg_lod4.zip

      # ========================================
      # CityGML Output Pipeline
      # ========================================

      - id: 00000001-0000-0000-0000-0000000000e0
        name: CityGmlAttributeInserter
        type: action
        action: PLATEAU4.SolarCityGmlAttributeInserter
        with:
          outputDir: |
            "citygml"
          pathAttribute: path
          gmlIdAttribute: gmlId
          measurements:
            - name: "年間予測日射量"
              attribute: totalSolarRadiation
              uom: "kWh"
            - name: "年間予測発電量"
              attribute: totalSolarPower
              uom: "kWh"
          textureImagePath: |
            "roof_radiation_texture.png"
          sourceEpsg: |
            env.get("prcs")

      - id: 00000001-0000-0000-0000-0000000000e1
        name: CityGmlZipFileWriter
        type: action
        action: ZipFileWriter
        with:
          output: |
            "citygml_bldg.zip"

      # ========================================
      # Section 2b: Building Attributes Preservation Branch
      # ========================================

      # Filter to only bldg:Building features before KeepFeatureType strips attributes
      - id: 00000005-0000-0000-0000-000000000001
        name: BuildingFeatureFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["featureType"] == "bldg:Building"
              outputPort: default

      # Extract and preserve building-level CityGML attributes
      - id: 00000005-0000-0000-0000-000000000002
        name: BuildingAttrExtractor
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: gmlId
              valueAttribute: gmlId
            - attribute: bldgHeight
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  cga.get("bldg:measuredHeight", -1.0)
            - attribute: structureType
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  detail = cga.get("uro:BuildingDetailAttribute", []);
                  if len(detail) > 0 { detail[0].get("uro:buildingStructureType_code", -1) } else { -1 }
            - attribute: floodDepth
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  max_d = 0.0;
                  for item in cga.get("uro:RiverFloodingRiskAttribute", []) + cga.get("uro:InlandFloodingRiskAttribute", []) + cga.get("uro:HighTideRiskAttribute", []) {
                    d = item.get("uro:depth", 0.0);
                    if d > max_d { max_d = d }
                  }
                  max_d
            - attribute: tsunamiHeight
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  list = cga.get("uro:TsunamiRiskAttribute", []);
                  max_d = 0.0;
                  for item in list {
                    d = item.get("uro:depth", 0.0);
                    if d > max_d { max_d = d }
                  }
                  max_d
            - attribute: landslideFlag
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  "uro:LandSlideRiskAttribute" in cga
            - attribute: floorCount
              expr:
                type: flowExpr
                value: |
                  cga = attributes.get("cityGmlAttributes", {});
                  cga.get("bldg:storeysAboveGround", -1)

      # ========================================
      # Section 2c: DEM Triangle Pipeline
      # ========================================

      # Gate: only proceed with DEM triangles if considerDEM is true
      - id: 00000002-0000-0000-0000-000000000013
        name: DEMConsiderFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: env["considerDEM"] == true
              outputPort: default

      # Decompose DEM TriangularMesh → individual Polygon3D triangles
      - id: 00000002-0000-0000-0000-000000000007
        name: DEMGeometrySplitter
        type: action
        action: GeometrySplitter

      # Assign featureType and gmlId for DEM triangle features
      - id: 00000002-0000-0000-0000-000000000008
        name: DEMFeatureTypeAssigner
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: featureType
              method: create
              value:
                type: string
                value: "dem:Triangle"
