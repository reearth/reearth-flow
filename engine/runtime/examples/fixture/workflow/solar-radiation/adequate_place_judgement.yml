# Adequate Place Judgment Subgraph
#
# Evaluates buildings and land areas for solar panel installation suitability.
# Writes two CSV output files:
#   - 適地判定結果.csv   (building judgment)
#   - 土地適地判定結果.csv (land judgment)
#
# Input ports:
#   buildingRadiation — aggregated solar radiation per building (from BuildingRadiationAggregator)
#   buildingAttr      — building CityGML attributes (from BuildingAttrExtractor)
#   landRadiation     — land area radiation features (from LandAreaSeparator.land)
#   demTriangle       — DEM triangle geometry for land spatial checks (from DEMTriangleReprojector)

id: f1e2d3c4-b5a6-4798-8c9d-0e1f2a3b4c5d
name: AdequatePlaceJudgment
nodes:
  # ========================================
  # Input Routers
  # ========================================

  - id: a0000000-0000-0000-0000-000000000001
    name: BuildingRadiationInput
    type: action
    action: InputRouter
    with:
      routingPort: buildingRadiation

  - id: a0000000-0000-0000-0000-000000000002
    name: BuildingAttrInput
    type: action
    action: InputRouter
    with:
      routingPort: buildingAttr

  - id: a0000000-0000-0000-0000-000000000003
    name: LandRadiationInput
    type: action
    action: InputRouter
    with:
      routingPort: landRadiation

  - id: a0000000-0000-0000-0000-000000000004
    name: DemTriangleInput
    type: action
    action: InputRouter
    with:
      routingPort: demTriangle

  # ========================================
  # Section 2e: Per-Building Data Assembly
  # ========================================

  # Branch 1: Count total buildings (for 1_1_2 percentile criterion)
  - id: 00000005-0000-0000-0000-000000000030
    name: BuildingTotalCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy: []
      calculations:
        - newAttribute: totalBuildingCount
          expr: "1"

  - id: 00000005-0000-0000-0000-000000000031
    name: AddBroadcastKey
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: _bcastKey
          method: create
          value:
            type: string
            value: all

  # Branch 2: Sort by radiation and rank (for 1_1_2 percentile criterion)
  - id: 00000005-0000-0000-0000-000000000032
    name: BuildingRadiationSorter
    type: action
    action: FeatureSorter
    with:
      attributes:
        - totalSolarRadiation
      order: ascending

  - id: 00000005-0000-0000-0000-000000000033
    name: BuildingRankCounter
    type: action
    action: FeatureCounter
    with:
      countStart: 1
      outputAttribute: solarRank

  - id: 00000005-0000-0000-0000-000000000034
    name: AddBroadcastKeyToRanked
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: _bcastKey
          method: create
          value:
            type: string
            value: all

  # Merge total count onto ranked features
  - id: 00000005-0000-0000-0000-000000000035
    name: TotalCountMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - _bcastKey
      supplierAttribute:
        - _bcastKey

  # Branch 3: Join building CityGML attributes onto radiation results
  - id: 00000005-0000-0000-0000-000000000036
    name: BuildingAttrMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - gmlId
      supplierAttribute:
        - gmlId

  # ========================================
  # Section 2f: Restriction Zone Spatial Checks
  # ========================================

  # --- Zone 1 ---
  - id: 00000007-0000-0000-0000-000000000001
    name: RestrictZone1ShapefileReader
    type: action
    action: ShapefileReader
    with:
      dataset: |
        env.get("restrictAreaPath1")
      allowEmptyPath: true

  - id: 00000007-0000-0000-0000-000000000002
    name: RestrictZone1Reprojector
    type: action
    action: HorizontalReprojector
    with:
      targetEpsgCode: |
        env.get("prcs")

  - id: 00000007-0000-0000-0000-000000000004
    name: RestrictZone1SpatialFilter
    type: action
    action: SpatialFilter
    with:
      predicate: intersects

  - id: 00000007-0000-0000-0000-000000000005
    name: InZone1FlagPassed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone1
          method: create
          value:
            type: flowExpr
            value: 1

  - id: 00000007-0000-0000-0000-000000000006
    name: InZone1FlagFailed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone1
          method: create
          value:
            type: flowExpr
            value: 0

  - id: 00000007-0000-0000-0000-000000000007
    name: Zone1Merger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - gmlId
      supplierAttribute:
        - gmlId

  # --- Zone 2 ---
  - id: 00000007-0000-0000-0000-000000000011
    name: RestrictZone2ShapefileReader
    type: action
    action: ShapefileReader
    with:
      dataset: |
        env.get("restrictAreaPath2")
      allowEmptyPath: true

  - id: 00000007-0000-0000-0000-000000000012
    name: RestrictZone2Reprojector
    type: action
    action: HorizontalReprojector
    with:
      targetEpsgCode: |
        env.get("prcs")

  - id: 00000007-0000-0000-0000-000000000014
    name: RestrictZone2SpatialFilter
    type: action
    action: SpatialFilter
    with:
      predicate: intersects

  - id: 00000007-0000-0000-0000-000000000015
    name: InZone2FlagPassed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone2
          method: create
          value:
            type: flowExpr
            value: 1

  - id: 00000007-0000-0000-0000-000000000016
    name: InZone2FlagFailed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone2
          method: create
          value:
            type: flowExpr
            value: 0

  - id: 00000007-0000-0000-0000-000000000017
    name: Zone2Merger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - gmlId
      supplierAttribute:
        - gmlId

  # --- Zone 3 ---
  - id: 00000007-0000-0000-0000-000000000021
    name: RestrictZone3ShapefileReader
    type: action
    action: ShapefileReader
    with:
      dataset: |
        env.get("restrictAreaPath3")
      allowEmptyPath: true

  - id: 00000007-0000-0000-0000-000000000022
    name: RestrictZone3Reprojector
    type: action
    action: HorizontalReprojector
    with:
      targetEpsgCode: |
        env.get("prcs")

  - id: 00000007-0000-0000-0000-000000000024
    name: RestrictZone3SpatialFilter
    type: action
    action: SpatialFilter
    with:
      predicate: intersects

  - id: 00000007-0000-0000-0000-000000000025
    name: InZone3FlagPassed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone3
          method: create
          value:
            type: flowExpr
            value: 1

  - id: 00000007-0000-0000-0000-000000000026
    name: InZone3FlagFailed
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: inZone3
          method: create
          value:
            type: flowExpr
            value: 0

  - id: 00000007-0000-0000-0000-000000000027
    name: Zone3Merger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - gmlId
      supplierAttribute:
        - gmlId

  # --- Snow Depth Check ---
  - id: 00000007-0000-0000-0000-000000000030
    name: SnowShapefileReader
    type: action
    action: ShapefileReader
    with:
      dataset: |
        env.get("snowDepthShapefilePath")
      allowEmptyPath: true

  - id: 00000007-0000-0000-0000-000000000031
    name: SnowShapefileReprojector
    type: action
    action: HorizontalReprojector
    with:
      targetEpsgCode: |
        env.get("prcs")

  - id: 00000007-0000-0000-0000-000000000033
    name: SnowSpatialFilter
    type: action
    action: SpatialFilter
    with:
      predicate: intersects
      mergeFilterAttributes: true
      mergedAttributesPrefix: "snow_"

  - id: 00000007-0000-0000-0000-000000000034
    name: SnowMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttribute:
        - gmlId
      supplierAttribute:
        - gmlId

  # ========================================
  # Section 2g: Final Building Judgment
  # ========================================

  # Compute per-building judgment criteria
  - id: 00000005-0000-0000-0000-000000000060
    name: BuildingJudgmentComputer
    type: action
    action: AttributeManager
    with:
      operations:
        # 1_1_1: solar radiation absolute threshold
        - attribute: result_1_1_1
          method: create
          value:
            type: flowExpr
            value: |
              thresh = env.get("solarRadiationThreshold", 0.0);
              rad = attributes.get("totalSolarRadiation", -1.0);
              if thresh <= 0.0 or rad < 0.0 { "-" }
              else if rad < thresh { "×" } else { "○" }

        # 1_1_2: lower percentile exclusion
        - attribute: result_1_1_2
          method: create
          value:
            type: flowExpr
            value: |
              pct = env.get("lowerPercent", 0.0);
              rad = attributes.get("totalSolarRadiation", -1.0);
              if pct <= 0.0 or rad < 0.0 { "-" } else {
                rank = attributes.get("solarRank", 0);
                total = attributes.get("totalBuildingCount", 1);
                if total > 0 and float(rank) / float(total) <= pct / 100.0 { "×" } else { "○" }
              }

        # 1_2: structure type exclusion map
        - attribute: result_1_2
          method: create
          value:
            type: flowExpr
            value: |
              m = env.get("bldgStructureToExclude");
              if m == null { "-" } else {
                any_active = m.get("木造・土蔵造") or m.get("鉄骨鉄筋コンクリート造") or m.get("鉄筋コンクリート造") or m.get("鉄骨造") or m.get("軽量鉄骨造") or m.get("レンガ造等") or m.get("非木造") or m.get("不明");
                if not any_active { "-" } else {
                  st_raw = attributes.get("structureType", "-1");
                  if type(st_raw) == "string" { st = int(st_raw); } else { st = st_raw; }
                  if st == 601 { excluded = m.get("木造・土蔵造"); }
                  else if st == 602 { excluded = m.get("鉄骨鉄筋コンクリート造"); }
                  else if st == 603 { excluded = m.get("鉄筋コンクリート造"); }
                  else if st == 604 { excluded = m.get("鉄骨造"); }
                  else if st == 605 { excluded = m.get("軽量鉄骨造"); }
                  else if st == 606 { excluded = m.get("レンガ造等"); }
                  else if st == 610 { excluded = m.get("非木造"); }
                  else { excluded = m.get("不明", false); }
                  if excluded { "×" } else { "○" }
                }
              }

        # 1_3: floor count bounds
        - attribute: result_1_3
          method: create
          value:
            type: flowExpr
            value: |
              lb = env.get("floorsBelow", -1);
              ub = env.get("upperFloors", -1);
              fc = attributes.get("floorCount", -1);
              if (lb == -1 and ub == -1) or fc < 0 { "-" }
              else if lb != -1 and fc <= lb { "×" }
              else if ub != -1 and fc >= ub { "×" }
              else { "○" }

        # 2_1: tsunami risk
        - attribute: result_2_1
          method: create
          value:
            type: flowExpr
            value: |
              if not env.get("enableTsunamiCheck", false) { "-" } else {
                h = attributes.get("bldgHeight", -1.0);
                th = attributes.get("tsunamiHeight", 0.0);
                if h < 0.0 or th <= 0.0 { "-" }
                else if h < th { "×" } else { "○" }
              }

        # 2_2: flood risk
        - attribute: result_2_2
          method: create
          value:
            type: flowExpr
            value: |
              if not env.get("enableFloodCheck", false) { "-" } else {
                h = attributes.get("bldgHeight", -1.0);
                fd = attributes.get("floodDepth", 0.0);
                if h < 0.0 or fd <= 0.0 { "-" }
                else if h < fd { "×" } else { "○" }
              }

        # 2_3: landslide risk
        - attribute: result_2_3
          method: create
          value:
            type: flowExpr
            value: |
              if not env.get("enableLandslideCheck", false) { "-" } else {
                flag = attributes.get("landslideFlag", false);
                if flag { "×" } else { "○" }
              }

        # 2_4: snow depth/load
        - attribute: result_2_4
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("snowDepthShapefilePath");
              if path == null { "-" } else {
                depth_cm = attributes.get("snow_G02_058");
                if depth_cm == null { "-" } else {
                  depth = depth_cm / 100.0;
                  s = env.get("snowLoad", 0.0);
                  if s > 0.0 {
                    dp = env.get("snowUnitWeight", 0.0);
                    load = depth * dp / 9.80665;
                    if load >= s { "×" } else { "○" }
                  } else {
                    thresh = env.get("snowDepthThreshold", -1.0);
                    if thresh > 0.0 and depth >= thresh { "×" } else { "○" }
                  }
                }
              }

        # 3_1: restriction zone 1
        - attribute: result_3_1
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath1");
              hThresh = env.get("restrictHeight1", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone1", 0);
                if inZone == 0 { "○" } else {
                  h = attributes.get("bldgHeight", -1.0);
                  if h >= 0.0 and h < hThresh { "○" } else {
                    dir = env.get("restrictDirection1", -1.0);
                    if dir < 0.0 { "×" } else {
                      sm = attributes.get("dirMatchSum1", 0);
                      if sm > 0 { "×" } else { "○" }
                    }
                  }
                }
              }

        # 3_2: restriction zone 2
        - attribute: result_3_2
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath2");
              hThresh = env.get("restrictHeight2", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone2", 0);
                if inZone == 0 { "○" } else {
                  h = attributes.get("bldgHeight", -1.0);
                  if h >= 0.0 and h < hThresh { "○" } else {
                    dir = env.get("restrictDirection2", -1.0);
                    if dir < 0.0 { "×" } else {
                      sm = attributes.get("dirMatchSum2", 0);
                      if sm > 0 { "×" } else { "○" }
                    }
                  }
                }
              }

        # 3_3: restriction zone 3
        - attribute: result_3_3
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath3");
              hThresh = env.get("restrictHeight3", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone3", 0);
                if inZone == 0 { "○" } else {
                  h = attributes.get("bldgHeight", -1.0);
                  if h >= 0.0 and h < hThresh { "○" } else {
                    dir = env.get("restrictDirection3", -1.0);
                    if dir < 0.0 { "×" } else {
                      sm = attributes.get("dirMatchSum3", 0);
                      if sm > 0 { "×" } else { "○" }
                    }
                  }
                }
              }

  # Compute building priority rank from judgment results
  - id: 00000005-0000-0000-0000-000000000063
    name: BuildingPriorityComputer
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: priority
          method: create
          value:
            type: flowExpr
            value: |
              score = 0;
              r11 = attributes["result_1_1_1"];
              r12 = attributes["result_1_1_2"];
              if r11 == "×" or r12 == "×" { score -= 1; }
              if attributes["result_1_2"] == "×" { score -= 1; }
              if attributes["result_1_3"] == "×" { score -= 1; }
              if attributes["result_2_1"] == "×" { score -= 1; }
              if attributes["result_2_2"] == "×" { score -= 1; }
              if attributes["result_2_3"] == "×" { score -= 1; }
              if attributes["result_2_4"] == "×" { score -= 1; }
              if attributes["result_3_1"] == "×" { score -= 1; }
              if attributes["result_3_2"] == "×" { score -= 1; }
              if attributes["result_3_3"] == "×" { score -= 1; }
              if score >= 0 { 5 }
              else if score >= -2 { 4 }
              else if score >= -4 { 3 }
              else if score >= -6 { 2 }
              else { 1 }

  # Map building judgment to CSV column names
  - id: 00000005-0000-0000-0000-000000000061
    name: BuildingJudgmentMapper
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: 建物ID
          valueAttribute: gmlId
        - attribute: 優先度
          valueAttribute: priority
        - attribute: 適否1_1_1
          valueAttribute: result_1_1_1
        - attribute: 適否1_1_2
          valueAttribute: result_1_1_2
        - attribute: 適否1_2
          valueAttribute: result_1_2
        - attribute: 適否1_3
          valueAttribute: result_1_3
        - attribute: 適否2_1
          valueAttribute: result_2_1
        - attribute: 適否2_2
          valueAttribute: result_2_2
        - attribute: 適否2_3
          valueAttribute: result_2_3
        - attribute: 適否2_4
          valueAttribute: result_2_4
        - attribute: 適否3_1
          valueAttribute: result_3_1
        - attribute: 適否3_2
          valueAttribute: result_3_2
        - attribute: 適否3_3
          valueAttribute: result_3_3

  - id: 00000005-0000-0000-0000-000000000062
    name: BuildingJudgmentWriter
    type: action
    action: CsvWriter
    with:
      format: csv
      output: |
        "適地判定結果.csv"

  # ========================================
  # Section 2h: Land Area Pipeline
  # ========================================

  # Aggregate land radiation per gmlId (triangle ID)
  - id: 00000006-0000-0000-0000-000000000002
    name: LandRadiationAggregator
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - gmlId
      calculations:
        - newAttribute: totalSolarRadiation
          expr: |
            env.get("__value")["radiationPerMonth"]
        - newAttribute: totalSolarPower
          expr: |
            let dt = env.get("__value")["radiationPerMonth"] ?? 0.0;
            dt * env.get("photovoltaicConversionEfficiency") * env.get("lossConstant")
        - newAttribute: dirMatchSum1
          expr: env.get("__value")["dirMatch1"] ?? 0
        - newAttribute: dirMatchSum2
          expr: env.get("__value")["dirMatch2"] ?? 0
        - newAttribute: dirMatchSum3
          expr: env.get("__value")["dirMatch3"] ?? 0

  # Compute land area judgment criteria (1_2 and 1_3 always "-" for land)
  - id: 00000006-0000-0000-0000-000000000003
    name: LandJudgmentComputer
    type: action
    action: AttributeManager
    with:
      operations:
        # 1_1_1: solar radiation absolute threshold
        - attribute: result_1_1_1
          method: create
          value:
            type: flowExpr
            value: |
              thresh = env.get("solarRadiationThreshold", 0.0);
              rad = attributes.get("totalSolarRadiation", -1.0);
              if thresh <= 0.0 or rad < 0.0 { "-" }
              else if rad < thresh { "×" } else { "○" }

        # 1_1_2: not applicable for land
        - attribute: result_1_1_2
          method: create
          value:
            type: string
            value: "-"

        # 1_2: not applicable for land
        - attribute: result_1_2
          method: create
          value:
            type: string
            value: "-"

        # 1_3: not applicable for land
        - attribute: result_1_3
          method: create
          value:
            type: string
            value: "-"

        # 2_1: tsunami risk (land areas do not have building height)
        - attribute: result_2_1
          method: create
          value:
            type: string
            value: "-"

        # 2_2: flood risk
        - attribute: result_2_2
          method: create
          value:
            type: string
            value: "-"

        # 2_3: landslide risk
        - attribute: result_2_3
          method: create
          value:
            type: flowExpr
            value: |
              if not env.get("enableLandslideCheck", false) { "-" } else {
                flag = attributes.get("landslideFlag", false);
                if flag { "×" } else { "○" }
              }

        # 2_4: snow depth/load
        - attribute: result_2_4
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("snowDepthShapefilePath");
              if path == null { "-" } else {
                depth_cm = attributes.get("snow_G02_058");
                if depth_cm == null { "-" } else {
                  depth = depth_cm / 100.0;
                  s = env.get("snowLoad", 0.0);
                  if s > 0.0 {
                    dp = env.get("snowUnitWeight", 0.0);
                    load = depth * dp / 9.80665;
                    if load >= s { "×" } else { "○" }
                  } else {
                    thresh = env.get("snowDepthThreshold", -1.0);
                    if thresh > 0.0 and depth >= thresh { "×" } else { "○" }
                  }
                }
              }

        # 3_1: restriction zone 1
        - attribute: result_3_1
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath1");
              hThresh = env.get("restrictHeight1", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone1", 0);
                if inZone == 0 { "○" } else {
                  dir = env.get("restrictDirection1", -1.0);
                  if dir < 0.0 { "×" } else {
                    sm = attributes.get("dirMatchSum1", 0);
                    if sm > 0 { "×" } else { "○" }
                  }
                }
              }

        # 3_2: restriction zone 2
        - attribute: result_3_2
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath2");
              hThresh = env.get("restrictHeight2", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone2", 0);
                if inZone == 0 { "○" } else {
                  dir = env.get("restrictDirection2", -1.0);
                  if dir < 0.0 { "×" } else {
                    sm = attributes.get("dirMatchSum2", 0);
                    if sm > 0 { "×" } else { "○" }
                  }
                }
              }

        # 3_3: restriction zone 3
        - attribute: result_3_3
          method: create
          value:
            type: flowExpr
            value: |
              path = env.get("restrictAreaPath3");
              hThresh = env.get("restrictHeight3", -1.0);
              if path == null or hThresh == -1.0 { "-" } else {
                inZone = attributes.get("inZone3", 0);
                if inZone == 0 { "○" } else {
                  dir = env.get("restrictDirection3", -1.0);
                  if dir < 0.0 { "×" } else {
                    sm = attributes.get("dirMatchSum3", 0);
                    if sm > 0 { "×" } else { "○" }
                  }
                }
              }

  # Compute land priority rank from judgment results
  - id: 00000006-0000-0000-0000-000000000006
    name: LandPriorityComputer
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: priority
          method: create
          value:
            type: flowExpr
            value: |
              score = 0;
              if attributes["result_1_1_1"] == "×" { score -= 1; }
              if attributes["result_2_3"] == "×" { score -= 1; }
              if attributes["result_2_4"] == "×" { score -= 1; }
              if attributes["result_3_1"] == "×" { score -= 1; }
              if attributes["result_3_2"] == "×" { score -= 1; }
              if attributes["result_3_3"] == "×" { score -= 1; }
              if score >= 0 { 5 }
              else if score >= -2 { 4 }
              else if score >= -4 { 3 }
