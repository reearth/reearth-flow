  - id: 00000006-0000-0000-0000-000000000004
    name: LandJudgmentMapper
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: 土地ID
          expr: env.get("__value")["gmlId"]
        - attribute: 優先度
          expr: env.get("__value")["priority"]
        - attribute: 適否1_1_1
