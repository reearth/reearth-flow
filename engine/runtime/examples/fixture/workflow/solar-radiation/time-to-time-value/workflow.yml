id: 78ce67ea-d017-11f0-99c4-7c70db10a7e3
name: TimeDataProcessor
nodes:
  - id: 90f40a3e-61d3-48e2-a328-e7226c2ad1ae
    name: CsvReader
    type: action
    action: CsvReader
    with:
      format: csv
      inline: |
        env.get("csvFile")

  - id: d2b4977d-e218-4628-96f2-d26407aeea14
    name: AttributeMapper
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: 年月日
          valueAttribute: 年月日
        - attribute: 方位_出
          valueAttribute: 方位[°]
        - attribute: 方位_入
          valueAttribute: 方位[°]00
        - attribute: 高度[°]
          valueAttribute: 高度[°]
        # Preserve original time values
        - attribute: 出
          valueAttribute: 出
        - attribute: 入り
          valueAttribute: 入り
        - attribute: 南中
          valueAttribute: 南中
        # Add the extracted time parts directly in the AttributeMapper
        - attribute: 出_H
          expr:
            type: flowExpr
            value: |
              time_parts = attributes["出"].split(":");
              if len(time_parts) > 0 { time_parts[0] } else { "" }
        - attribute: 出_M
          expr:
            type: flowExpr
            value: |
              time_parts = attributes["出"].split(":");
              if len(time_parts) > 1 { time_parts[1] } else { "" }
        - attribute: 入り_H
          expr:
            type: flowExpr
            value: |
              time_parts = attributes["入り"].split(":");
              if len(time_parts) > 0 { time_parts[0] } else { "" }
        - attribute: 入り_M
          expr:
            type: flowExpr
            value: |
              time_parts = attributes["入り"].split(":");
              if len(time_parts) > 1 { time_parts[1] } else { "" }

  - id: 57d8a9b1-8e7b-4c23-9e6d-9f70db10a7e4
    name: ConvertToSeconds
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: 出
          method: convert
          value:
            type: flowExpr
            value: int(attributes["出_H"]) * 3600 + int(attributes["出_M"]) * 60
        - attribute: 入り
          method: convert
          value:
            type: flowExpr
            value: int(attributes["入り_H"]) * 3600 + int(attributes["入り_M"]) * 60
        - attribute: 南中
          method: convert
          value:
            type: flowExpr
            value: |
              parts = attributes["南中"].split(":");
              int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
        - attribute: 出_H
          method: remove
        - attribute: 出_M
          method: remove
        - attribute: 入り_H
          method: remove
        - attribute: 入り_M
          method: remove


  - id: 56cab506-d1a0-11f0-a36d-7c70db10a7e3
    name: SolarRadiationCalculator
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: "日射量[kWh/m2]"
          method: create
          value:
            type: flowExpr
            value: |
              entry_time = attributes["入り"];
              exit_time = attributes["出"];
              altitude = float(attributes["高度[°]"]);
              altitude_radians = math.radians(altitude);
              input_time_days = entry_time / 86400.0;
              output_time_days = exit_time / 86400.0;
              (input_time_days - output_time_days) * 24.0 * math.sin(altitude_radians) * (2.0 / math.pi)

  - id: c60a3004-ded4-11f0-9390-7c70db10a7e3
    name: SolarEnergySum
    type: action
    action: StatisticsCalculator
    with:
      calculations:
        - newAttribute: 日射量[kWh/m2].sum
          expr: |
            env.get("__value")["日射量[kWh/m2]"]

  - id: 481cea32-ded5-11f0-b1da-7c70db10a7e3
    name: AttributeCreator
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: join_key
          method: create
          value:
            type: string
            value: key

  - id: f5e66920-24c0-4c70-ae16-6be1ed3b906c
    name: SolarEnergyResultCsvWriter
    type: action
    action: OutputRouter
    with: 
      routingPort: default

