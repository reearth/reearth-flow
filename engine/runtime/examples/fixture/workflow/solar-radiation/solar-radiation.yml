  - id: 00000001-0000-0000-0000-000000000011
    name: ComputeCosTheta
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: cosTheta
        method: create
        value:
          type: flowExpr
          value: |
            sdx = attributes["solarDirectionX"];
            sdy = attributes["solarDirectionY"];
            sdz = attributes["solarDirectionZ"];
            nx = attributes["normalX"];
            ny = attributes["normalY"];
            nz = attributes["normalZ"];
            cos_th = sdx * nx + sdy * ny + sdz * nz;
            if cos_th < 0.0 { 0.0 } else { cos_th }
  - id: 00000001-0000-0000-0000-00000000001d
    name: ComputeRadiation
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: radiationSunny
        method: create
        value:
          type: flowExpr
          value: |
            p = env["monthlyTransmissivity"][attributes["month"] - 1];
            h_rad = attributes["solarAltitude"] * math.pi / 180.0;
            m = 1.0 / math.sin(h_rad);
            beta_m = p ** m;
            DT = env["directNormalIrradianceFactor"] * beta_m * attributes["cosTheta"] * attributes["cellArea"];

            dN = 1 - beta_m;
            dD = 1 - 1.4 * math.log(p);
            SH = env["directNormalIrradianceFactor"] * math.sin(h_rad) * (dN / dD) * 0.5;
            tilt_rad = attributes["slope"] * math.pi / 180.0;
            ST = SH * (1 + math.cos(tilt_rad)) / 2;

            TH = env["directNormalIrradianceFactor"] * math.sin(h_rad) + SH;
            RT = TH * (1 - math.cos(tilt_rad)) / 2 * attributes["groundReflectivity"];

            DT + ST + RT
      - attribute: radiationCloudy
        method: create
        value:
          type: flowExpr
          value: |
            p = 1.0 - env["monthlyTransmissivity"][attributes["month"] - 1];
            h_rad = attributes["solarAltitude"] * math.pi / 180.0;
            m = 1.0 / math.sin(h_rad);
            beta_m = p ** m;
            DT = env["directNormalIrradianceFactor"] * beta_m * attributes["cosTheta"] * attributes["cellArea"];

            dN = 1 - beta_m;
            dD = 1 - 1.4 * math.log(p);
            SH = env["directNormalIrradianceFactor"] * math.sin(h_rad) * (dN / dD) * 0.5;
            tilt_rad = attributes["slope"] * math.pi / 180.0;
            ST = SH * (1 + math.cos(tilt_rad)) / 2;

            TH = env["directNormalIrradianceFactor"] * math.sin(h_rad) + SH;
            RT = TH * (1 - math.cos(tilt_rad)) / 2 * attributes["groundReflectivity"];

            DT + ST + RT
  - id: 00000001-0000-0000-0000-000000000050
    name: CloudFactorCalculator
