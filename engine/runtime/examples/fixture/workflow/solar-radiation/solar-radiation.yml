    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: dirMatch1
        method: create
        value:
          type: flowExpr
          value: |
            dir = env.get("restrictDirection1", -1.0);
            if dir < 0.0 { 0 } else {
              pne = attributes.get("azimuth", 0.0);
              geo = (180.0 - pne + 360.0) % 360.0;
              diff = (geo - dir + 360.0) % 360.0;
              if diff > 180.0 { d = 360.0 - diff } else { d = diff };
              if d <= 11.25 { 1 } else { 0 }
            }
      - attribute: dirMatch2
        method: create
        value:
          type: flowExpr
          value: |
            dir = env.get("restrictDirection2", -1.0);
            if dir < 0.0 { 0 } else {
              pne = attributes.get("azimuth", 0.0);
              geo = (180.0 - pne + 360.0) % 360.0;
              diff = (geo - dir + 360.0) % 360.0;
              if diff > 180.0 { d = 360.0 - diff } else { d = diff };
              if d <= 11.25 { 1 } else { 0 }
            }
      - attribute: dirMatch3
        method: create
        value:
          type: flowExpr
          value: |
            dir = env.get("restrictDirection3", -1.0);
            if dir < 0.0 { 0 } else {
              pne = attributes.get("azimuth", 0.0);
              geo = (180.0 - pne + 360.0) % 360.0;
              diff = (geo - dir + 360.0) % 360.0;
