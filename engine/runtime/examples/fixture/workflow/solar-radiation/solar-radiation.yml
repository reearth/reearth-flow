  - id: 00000001-0000-0000-0000-000000000070
    name: NormalizeRadiationForColorMapping
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: normalizedRadiation
        method: create
        value:
          type: flowExpr
          value: |
            start_str = env["startTime"];
            s_date_parts = start_str.split("-");
            s_year = float(s_date_parts[0]);
            s_month = float(s_date_parts[1]);
            s_day_val = float(s_date_parts[2][:2]);
            s_a = math.floor((14.0 - s_month) / 12.0);
            s_y = s_year + 4800.0 - s_a;
            s_m = s_month + 12.0 * s_a - 3.0;
            s_jdn = s_day_val + math.floor((153.0 * s_m + 2.0) / 5.0) + 365.0 * s_y + math.floor(s_y / 4.0) - math.floor(s_y / 100.0) + math.floor(s_y / 400.0) - 32045.0;
            end_str = env["endTime"];
            e_date_parts = end_str.split("-");
            e_year = float(e_date_parts[0]);
            e_month = float(e_date_parts[1]);
            e_day_val = float(e_date_parts[2][:2]);
            e_a = math.floor((14.0 - e_month) / 12.0);
            e_y = e_year + 4800.0 - e_a;
            e_m = e_month + 12.0 * e_a - 3.0;
            e_jdn = e_day_val + math.floor((153.0 * e_m + 2.0) / 5.0) + 365.0 * e_y + math.floor(e_y / 4.0) - math.floor(e_y / 100.0) + math.floor(e_y / 400.0) - 32045.0;
            num_days_raw = e_jdn - s_jdn;
            if num_days_raw <= 0.0 { num_days = 1.0 } else { num_days = num_days_raw };
            dt = attributes.get("totalSolarRadiation", 0.0);
            max_rad = env.get("maxRadiationPerDay", 7.5);
            t_raw = dt / num_days / max_rad;
            if t_raw < 0.0 { 0.0 } else if t_raw > 1.0 { 1.0 } else { t_raw }
  - id: 00000001-0000-0000-0000-00000000005f
    name: CellTwoDimensionForcer
    type: action
    action: TwoDimensionForcer
  - id: 00000001-0000-0000-0000-000000000060
    name: RadiationToColorMapper
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: color_r
        method: create
        value:
          type: flowExpr
          value: |
            t = attributes.get("normalizedRadiation", 0.0);
            v = 4.0 * t - 1.0;
            if v < 0.0 { r = 0.0 } else if v > 1.0 { r = 1.0 } else { r = v };
            math.round(255.0 * r)
      - attribute: color_g
        method: create
        value:
          type: flowExpr
          value: |
            t = attributes.get("normalizedRadiation", 0.0);
            v1_raw = 4.0 * t;
            if v1_raw < 0.0 { v1 = 0.0 } else if v1_raw > 1.0 { v1 = 1.0 } else { v1 = v1_raw };
            v2_raw = 4.0 * t - 3.0;
            if v2_raw < 0.0 { v2 = 0.0 } else if v2_raw > 1.0 { v2 = 1.0 } else { v2 = v2_raw };
            math.round(255.0 * (v1 - v2))
      - attribute: color_b
        method: create
        value:
          type: flowExpr
          value: |
            t = attributes.get("normalizedRadiation", 0.0);
            v = 4.0 * t - 1.0;
            if v < 0.0 { clamped = 0.0 } else if v > 1.0 { clamped = 1.0 } else { clamped = v };
            math.round(255.0 * (1.0 - clamped))
