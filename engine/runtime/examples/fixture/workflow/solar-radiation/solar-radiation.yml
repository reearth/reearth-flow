  - id: 00000001-0000-0000-0000-000000000073
    name: AddSolarSchemaAttributes
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: 予測日射量
        method: create
        value: |
          env.get("__value")["totalSolarRadiation"] ?? ()
      - attribute: 予測発電量
