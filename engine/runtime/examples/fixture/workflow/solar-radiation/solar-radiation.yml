  - id: a7b8c9d0-e1f2-4a3b-4c5d-6e7f8a9b0c1d
    name: CalcSunnyRatio
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: sunnyRatio
        method: create
        value:
          type: flowExpr
          value: |
            actual_sunshine = float(attributes["日照時間(時間)"]);
            potential_daylight = attributes["monthlyDayTimeSumInHours"];
            if potential_daylight > 0.0 {
              actual_sunshine / potential_daylight
            } else {
              0.0
