  - id: 00000005-0000-0000-0000-000000000060
    name: BuildingJudgmentComputer
    type: action
    action: AttributeManager
    with:
      operations:
      - attribute: result_1_1_1
        method: create
        value:
          type: flowExpr
          value: |
            thresh = env.get("solarRadiationThreshold", 0.0);
            rad = attributes.get("totalSolarRadiation", -1.0);
            if thresh <= 0.0 or rad < 0.0 { "-" }
            else if rad < thresh { "×" } else { "○" }
      - attribute: result_1_1_2
        method: create
        value:
          type: flowExpr
          value: |
            pct = env.get("lowerPercent", 0.0);
            rad = attributes.get("totalSolarRadiation", -1.0);
            if pct <= 0.0 or rad < 0.0 { "-" } else {
              rank = attributes.get("solarRank", 0);
              total = attributes.get("totalBuildingCount", 1);
              if total > 0 and float(rank) / float(total) <= pct / 100.0 { "×" } else { "○" }
            }
      - attribute: result_1_2
        method: create
        value:
          type: flowExpr
          value: |
            m = env.get("bldgStructureToExclude");
            if m == null { "-" } else {
              any_active = m.get("木造・土蔵造") or m.get("鉄骨鉄筋コンクリート造") or m.get("鉄筋コンクリート造") or m.get("鉄骨造") or m.get("軽量鉄骨造") or m.get("レンガ造等") or m.get("非木造") or m.get("不明");
              if not any_active { "-" } else {
                st_raw = attributes.get("structureType", "-1");
                if type(st_raw) == "string" { st = int(st_raw); } else { st = st_raw; }
                if st == 601 { excluded = m.get("木造・土蔵造"); }
                else if st == 602 { excluded = m.get("鉄骨鉄筋コンクリート造"); }
                else if st == 603 { excluded = m.get("鉄筋コンクリート造"); }
                else if st == 604 { excluded = m.get("鉄骨造"); }
                else if st == 605 { excluded = m.get("軽量鉄骨造"); }
                else if st == 606 { excluded = m.get("レンガ造等"); }
                else if st == 610 { excluded = m.get("非木造"); }
                else { excluded = m.get("不明", false); }
                if excluded { "×" } else { "○" }
              }
            }
      - attribute: result_1_3
        method: create
        value:
          type: flowExpr
          value: |
            lb = env.get("floorsBelow", -1);
            ub = env.get("upperFloors", -1);
            fc = attributes.get("floorCount", -1);
            if (lb == -1 and ub == -1) or fc < 0 { "-" }
            else if lb != -1 and fc <= lb { "×" }
            else if ub != -1 and fc >= ub { "×" }
            else { "○" }
      - attribute: result_2_1
        method: create
        value:
          type: flowExpr
          value: |
            if not env.get("enableTsunamiCheck", false) { "-" } else {
              h = attributes.get("bldgHeight", -1.0);
              th = attributes.get("tsunamiHeight", 0.0);
              if h < 0.0 or th <= 0.0 { "-" }
              else if h < th { "×" } else { "○" }
            }
      - attribute: result_2_2
        method: create
        value:
          type: flowExpr
          value: |
            if not env.get("enableFloodCheck", false) { "-" } else {
              h = attributes.get("bldgHeight", -1.0);
              fd = attributes.get("floodDepth", 0.0);
