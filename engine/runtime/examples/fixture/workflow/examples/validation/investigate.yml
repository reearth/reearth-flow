# Investigation harness: isolate one building that fails a given check and echo
# its full geometry (intermediate data) so the failure can be studied offline.
# Pass --var cityGmlPath=... and --var check=Planarity (or SelfIntersection).
id: c0ffee00-0000-4000-8000-000000000001
name: "Validation Investigation"
entryGraphId: c0ffee00-0000-4000-8000-000000000002
with:
  cityGmlPath:
  check: Planarity
graphs:
  - id: c0ffee00-0000-4000-8000-000000000002
    name: main
    nodes:
      - id: 11111111-1111-4111-8111-111111111111
        name: FeatureCreator
        type: action
        action: Feature Creator
        with:
          creator:
            type: flowExpr
            value: |
              [
                { "path": env["cityGmlPath"] },
              ]

      - id: 22222222-2222-4222-8222-222222222222
        name: FeatureCityGml3Reader
        type: action
        action: FeatureCityGml3Reader
        with:
          dataset:
            type: flowExpr
            value: attributes["path"]
          extractTags:
            - bldg:Building

      - id: 33333333-3333-4333-8333-333333333333
        name: GeometryValidator
        type: action
        action: Geometry Validator
        with:
          validationTypes: []

      - id: 44444444-4444-4444-8444-444444444444
        name: FilterByCheck
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["validationResult"]["checks"].get(env["check"], 0) > 0
              outputPort: hit

      - id: 55555555-5555-4555-8555-555555555555
        name: Counter
        type: action
        action: Feature Counter
        with:
          countStart: 1
          outputAttribute: index

      - id: 66666666-6666-4666-8666-666666666666
        name: FilterFirst
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["index"] == 1
              outputPort: one

      - id: 77777777-7777-4777-8777-777777777777
        name: Echo
        type: action
        action: Echo Sink

    edges:
      - id: b0000001-0000-4000-8000-000000000001
        from: 11111111-1111-4111-8111-111111111111
        to: 22222222-2222-4222-8222-222222222222
        fromPort: features
        toPort: features
      - id: b0000002-0000-4000-8000-000000000002
        from: 22222222-2222-4222-8222-222222222222
        to: 33333333-3333-4333-8333-333333333333
        fromPort: features
        toPort: features
      - id: b0000003-0000-4000-8000-000000000003
        from: 33333333-3333-4333-8333-333333333333
        to: 44444444-4444-4444-8444-444444444444
        fromPort: failed
        toPort: features
      - id: b0000004-0000-4000-8000-000000000004
        from: 44444444-4444-4444-8444-444444444444
        to: 55555555-5555-4555-8555-555555555555
        fromPort: hit
        toPort: features
      - id: b0000005-0000-4000-8000-000000000005
        from: 55555555-5555-4555-8555-555555555555
        to: 66666666-6666-4666-8666-666666666666
        fromPort: features
        toPort: features
      - id: b0000006-0000-4000-8000-000000000006
        from: 66666666-6666-4666-8666-666666666666
        to: 77777777-7777-4777-8777-777777777777
        fromPort: one
        toPort: features
