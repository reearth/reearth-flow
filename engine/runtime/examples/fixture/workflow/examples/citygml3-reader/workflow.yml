# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
name: "CityGML3 Reader Test"
entryGraphId: b2c3d4e5-f6a7-8901-bcde-f12345678901
with:
  cityGmlPath:
  workerArtifactPath:
graphs:
  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: main
    nodes:
      - id: c3d4e5f6-a7b8-9012-cdef-123456789012
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{
                cityGmlPath: env.get("cityGmlPath"),
              },
            ]

      - id: a2b3c4d5-e6f7-8901-abcd-ef2345678901
        name: FeatureFilePathExtractor
        type: action
        action: FeatureFilePathExtractor
        with:
          sourceDataset: |
            env.get("__value").cityGmlPath
          extractArchive: true
          destPrefix: udx

      - id: a3b4c5d6-e7f8-9012-bcde-f34567890123
        name: FeatureFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr: |
                env.get("__value").extension == "gml"
              outputPort: default

      - id: d4e5f6a7-b8c9-0123-def1-234567890123
        name: CityGml3Reader
        type: action
        action: FeatureCityGml3Reader
        with:
          dataset: |
            env.get("__value")["path"]
          extractTags:
            - bldg:Building
            - con:FloorSurface
            - tran:Road
            - tran:TrafficArea
            - frn:CityFurniture

      # PLATEAU CityGML 3 coordinates are in JGD2011 geographic (lat/lon/ellipsoidal-height).
      # Shift ellipsoidal height → WGS84 orthometric height before tile output.
      # Horizontal reprojection is not required: JGD2011 lat/lon ≈ WGS84 lat/lon for 3D tiles.
      - id: b1c2d3e4-f5a6-7890-bcde-f12345678901
        name: VerticalReprojector
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: e5f6a7b8-c9d0-1e2f-3a4b-5c6d7e8f9a0b
        name: Cesium3DTilesWriter
        type: action
        action: Cesium3DTilesWriter
        with:
          output: |
            file::join_path(env.get("workerArtifactPath"), "citygml3-3dtiles")
          minZoom: 15
          maxZoom: 18

    edges:
      - id: f6a7b8c9-d0e1-2f3a-4b5c-6d7e8f9a0b1c
        from: c3d4e5f6-a7b8-9012-cdef-123456789012
        to: a2b3c4d5-e6f7-8901-abcd-ef2345678901
        fromPort: default
        toPort: default
      - id: b3c4d5e6-f7a8-9012-bcde-f23456789012
        from: a2b3c4d5-e6f7-8901-abcd-ef2345678901
        to: a3b4c5d6-e7f8-9012-bcde-f34567890123
        fromPort: default
        toPort: default
      - id: c4d5e6f7-a8b9-0123-cdef-123456789012
        from: a3b4c5d6-e7f8-9012-bcde-f34567890123
        to: d4e5f6a7-b8c9-0123-def1-234567890123
        fromPort: default
        toPort: default
      - id: a7b8c9d0-e1f2-3a4b-5c6d-7e8f9a0b1c2d
        from: d4e5f6a7-b8c9-0123-def1-234567890123
        to: b1c2d3e4-f5a6-7890-bcde-f12345678901
        fromPort: default
        toPort: default
      - id: c8d9e0f1-a2b3-4c5d-6e7f-8a9b0c1d2e3f
        from: b1c2d3e4-f5a6-7890-bcde-f12345678901
        to: e5f6a7b8-c9d0-1e2f-3a4b-5c6d7e8f9a0b
        fromPort: default
        toPort: default
