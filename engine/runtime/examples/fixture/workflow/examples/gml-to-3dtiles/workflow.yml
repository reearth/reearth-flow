# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
# Read a single CityGML file and write new-geometry Cesium 3D Tiles.
# Replaces the temporary `action-sink/examples/gml_to_3dtiles.rs` harness.
#
# The new-geometry writer reprojects internally (source CRS -> WGS84), so no
# reprojection node precedes it. The source CityGML frame (e.g. EPSG:6697) is
# carried through to the writer as-is.
id: 7f3b1a2c-4d5e-6f70-8a9b-0c1d2e3f4a5b
name: "GML to Cesium 3D Tiles (new geometry)"
entryGraphId: 8a4c2b3d-5e6f-7081-9bac-1d2e3f4a5b6c
with:
  cityGmlPath:
  codelistsPath:
  schemasPath:
graphs:
  - id: 8a4c2b3d-5e6f-7081-9bac-1d2e3f4a5b6c
    name: main
    nodes:
      - id: 1a1a1a1a-1111-4111-8111-111111111111
        name: FeatureCreator
        type: action
        action: Feature Creator
        with:
          creator:
            type: flowExpr
            value: |
              [
                {
                  "cityGmlPath": env["cityGmlPath"],
                  "codelists": env.get("codelistsPath"),
                  "schemas": env.get("schemasPath"),
                },
              ]

      - id: 2b2b2b2b-2222-4222-8222-222222222222
        name: CityGml3Reader
        type: action
        action: Feature CityGML 3 Reader
        with:
          dataset:
            type: flowExpr
            value: attributes["cityGmlPath"]

      - id: 4d4d4d4d-4444-4444-8444-444444444444
        name: Cesium3DTilesWriter
        type: action
        action: Cesium 3D Tiles Writer
        with:
          output:
            type: string
            value: gml-to-3dtiles
          minZoom: 15
          maxZoom: 18
          # textureCodec: "KTX2/ETC1S"
          textureCodec: "KTX2/UASTC"
          # textureCodec: "JPEG"
          atlasExtrusion: 10

    edges:
      - id: 5e5e5e5e-5555-4555-8555-555555555555
        from: 1a1a1a1a-1111-4111-8111-111111111111
        to: 2b2b2b2b-2222-4222-8222-222222222222
        fromPort: features
        toPort: features
      - id: 6f6f6f6f-6666-4666-8666-666666666666
        from: 2b2b2b2b-2222-4222-8222-222222222222
        to: 4d4d4d4d-4444-4444-8444-444444444444
        fromPort: features
        toPort: features
