# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
id: 2c8a8a08-3f3e-44eb-8b01-64b9e4ebf88c
name: "CityGML Roundtrip Example"
entryGraphId: 6998a6f6-bba4-4ac7-95f3-7ce8b979b970
with:
  cityGmlPath:
  cityCode:
  codelistsPath:
  schemasPath:
  codelists:
  schemas:
  workerArtifactPath:
graphs:
  - !include ../../../graphs/plateau4/folder_and_file_path_reader.yml

  - id: 6998a6f6-bba4-4ac7-95f3-7ce8b979b970
    name: main
    nodes:
      - id: a0b1c2d3-e4f5-6a7b-8c9d-0e1f2a3b4c5d
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{
                cityGmlPath: env.get("cityGmlPath"),
                cityCode: env.get("cityCode") ?? file::extract_filename(env.get("cityGmlPath"))[0..5],
                codelists: env.get("codelistsPath") ?? env.get("codelists"),
                schemas: env.get("schemasPath") ?? env.get("schemas"),
              },
            ]

      - id: d2140af5-0312-471a-9e83-d486a4d949bc
        name: FolderAndFilePathReader
        type: subGraph
        subGraphId: c6863b71-953b-4d15-af56-396fc93fc617

      - id: e3f4a5b6-c7d8-9e0f-1a2b-3c4d5e6f7a8b
        name: FeatureCityGmlReader
        type: action
        action: FeatureCityGmlReader
        with:
          codelistsPath: env.get("__value").codelists
          flatten: false
          dataset: |
            env.get("__value")["path"]

      - id: aa11bb22-cc33-dd44-ee55-ff6677889900
        name: AttributeManagerAfterReader
        type: action
        action: AttributeManager
        with:
          operations:
          - attribute: gml_id
            method: create
            value: |
              env.get("__value")["__citygml_gml_id"]

      - id: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
        name: FeatureWriter
        type: action
        action: FeatureWriter
        with:
          format: citygml
          output: |
            "file://" + env.get("workerArtifactPath") + "/citygml-roundtrip-output.gml"
          prettyPrint: true

      - id: b2c3d4e5-f6a7-8b9c-0d1e-2f3a4b5c6d7e
        name: FeatureCityGmlReaderReadback
        type: action
        action: FeatureCityGmlReader
        with:
          codelistsPath: env.get("__value").codelists
          flatten: false
          dataset: |
            env.get("__value")["filePath"]

      - id: bb22cc33-dd44-ee55-ff66-778899001122
        name: AttributeManagerAfterReadback
        type: action
        action: AttributeManager
        with:
          operations:
          - attribute: gml_id
            method: create
            value: |
              env.get("__value")["__citygml_gml_id"]

      - id: c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
        name: VerticalReprojector
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a
        name: Cesium3DTilesWriter
        type: action
        action: Cesium3DTilesWriter
        with:
          minZoom: 15
          maxZoom: 18
          attachTexture: true
          output: |
            file::join_path(env.get("workerArtifactPath"), "citygml-roundtrip-3dtiles")

      - id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        name: VerticalReprojectorOriginal
        type: action
        action: VerticalReprojector
        with:
          reprojectorType: jgd2011ToWgs84

      - id: 2b3c4d5e-6f7a-8b9c-0d1e-2f3a4b5c6d7e
        name: Cesium3DTilesWriterOriginal
        type: action
        action: Cesium3DTilesWriter
        with:
          minZoom: 15
          maxZoom: 18
          attachTexture: true
          output: |
            file::join_path(env.get("workerArtifactPath"), "citygml-original-3dtiles")

    edges:
      - id: b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        from: a0b1c2d3-e4f5-6a7b-8c9d-0e1f2a3b4c5d
        to: d2140af5-0312-471a-9e83-d486a4d949bc
        fromPort: default
        toPort: default

      - id: 49cf9ba0-5118-48d2-989b-01862a58b5f1
        from: d2140af5-0312-471a-9e83-d486a4d949bc
        to: e3f4a5b6-c7d8-9e0f-1a2b-3c4d5e6f7a8b
        fromPort: default
        toPort: default

      - id: f4a5b6c7-d8e9-0f1a-2b3c-4d5e6f7a8b9c
        from: e3f4a5b6-c7d8-9e0f-1a2b-3c4d5e6f7a8b
        to: aa11bb22-cc33-dd44-ee55-ff6677889900
        fromPort: default
        toPort: default

      - id: aa11bb22-cc33-dd44-ee55-ff6677889901
        from: aa11bb22-cc33-dd44-ee55-ff6677889900
        to: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
        fromPort: default
        toPort: default

      - id: e5f6a7b8-c9d0-1e2f-3a4b-5c6d7e8f9a0b
        from: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
        to: b2c3d4e5-f6a7-8b9c-0d1e-2f3a4b5c6d7e
        fromPort: default
        toPort: default

      - id: f6a7b8c9-d0e1-2f3a-4b5c-6d7e8f9a0b1c
        from: b2c3d4e5-f6a7-8b9c-0d1e-2f3a4b5c6d7e
        to: bb22cc33-dd44-ee55-ff66-778899001122
        fromPort: default
        toPort: default

      - id: bb22cc33-dd44-ee55-ff66-778899001123
        from: bb22cc33-dd44-ee55-ff66-778899001122
        to: c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
        fromPort: default
        toPort: default

      - id: a7b8c9d0-e1f2-3a4b-5c6d-7e8f9a0b1c2d
        from: c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
        to: d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f9a
        fromPort: default
        toPort: default

      - id: 3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
        from: aa11bb22-cc33-dd44-ee55-ff6677889900
        to: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        fromPort: default
        toPort: default

      - id: 4d5e6f7a-8b9c-0d1e-2f3a-4b5c6d7e8f9a
        from: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
