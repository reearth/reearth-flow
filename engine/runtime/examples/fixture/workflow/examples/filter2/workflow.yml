id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
name: "FeatureFilter2 POC - new expr engine"
entryGraphId: b2c3d4e5-f6a7-8901-bcde-f12345678901
graphs:
  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: main
    nodes:
      - id: 11111111-1111-1111-1111-111111111111
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{ pkg: "bldg", label: "building-A" },
              #{ pkg: "tran", label: "road-B" },
              #{ pkg: "bldg", label: "building-C" },
              #{ pkg: "veg",  label: "tree-D" },
            ]

      - id: 22222222-2222-2222-2222-222222222222
        name: FeatureFilter2
        type: action
        action: FeatureFilter2
        with:
          conditions:
            - expr: 'getattr("pkg") == "bldg"'
              outputPort: bldg
            - expr: 'getattr("pkg") == "tran"'
              outputPort: tran

      # expects building-A, building-C (2 features)
      - id: 33333333-3333-3333-3333-333333333333
        name: WriterBldg
        type: action
        action: FeatureWriter
        with:
          format: json
          output: '"/tmp/filter2-bldg.json"'

      # expects road-B (1 feature)
      - id: 44444444-4444-4444-4444-444444444444
        name: WriterTran
        type: action
        action: FeatureWriter
        with:
          format: json
          output: '"/tmp/filter2-tran.json"'

      # expects tree-D (1 feature, unmatched)
      - id: 55555555-5555-5555-5555-555555555555
        name: WriterUnfiltered
        type: action
        action: FeatureWriter
        with:
          format: json
          output: '"/tmp/filter2-unfiltered.json"'

    edges:
      - id: e1000001-0000-0000-0000-000000000001
        from: 11111111-1111-1111-1111-111111111111
        to: 22222222-2222-2222-2222-222222222222
        fromPort: default
        toPort: default
      - id: e1000002-0000-0000-0000-000000000002
        from: 22222222-2222-2222-2222-222222222222
        to: 33333333-3333-3333-3333-333333333333
        fromPort: bldg
        toPort: default
      - id: e1000003-0000-0000-0000-000000000003
        from: 22222222-2222-2222-2222-222222222222
        to: 44444444-4444-4444-4444-444444444444
        fromPort: tran
        toPort: default
      - id: e1000004-0000-0000-0000-000000000004
        from: 22222222-2222-2222-2222-222222222222
        to: 55555555-5555-5555-5555-555555555555
        fromPort: unfiltered
        toPort: default
