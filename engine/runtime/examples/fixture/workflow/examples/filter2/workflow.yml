id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
name: "FeatureFilter2 POC - new expr engine"
entryGraphId: b2c3d4e5-f6a7-8901-bcde-f12345678901
graphs:
  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
    name: main
    nodes:
      - id: 11111111-1111-1111-1111-111111111111
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{ package: "bldg", name: "building-A" },
              #{ package: "tran", name: "road-B" },
              #{ package: "bldg", name: "building-C" },
              #{ package: "veg",  name: "tree-D" },
            ]

      - id: 22222222-2222-2222-2222-222222222222
        name: FeatureFilter2
        type: action
        action: FeatureFilter2
        with:
          conditions:
            - expr: 'package == "bldg"'
              outputPort: bldg
            - expr: 'package == "tran"'
              outputPort: tran

      - id: 33333333-3333-3333-3333-333333333333
        name: EchoBldg
        type: action
        action: Echo
        with:
          message: "bldg feature passed through"

      - id: 44444444-4444-4444-4444-444444444444
        name: EchoTran
        type: action
        action: Echo
        with:
          message: "tran feature passed through"

      - id: 55555555-5555-5555-5555-555555555555
        name: EchoUnfiltered
        type: action
        action: Echo
        with:
          message: "unfiltered feature (veg) passed through"

    edges:
      - id: e1000001-0000-0000-0000-000000000001
        from: 11111111-1111-1111-1111-111111111111
        to: 22222222-2222-2222-2222-222222222222
        fromPort: default
        toPort: default
      - id: e1000002-0000-0000-0000-000000000002
        from: 22222222-2222-2222-2222-222222222222
        to: 33333333-3333-3333-3333-333333333333
        fromPort: bldg
        toPort: default
      - id: e1000003-0000-0000-0000-000000000003
        from: 22222222-2222-2222-2222-222222222222
        to: 44444444-4444-4444-4444-444444444444
        fromPort: tran
        toPort: default
      - id: e1000004-0000-0000-0000-000000000004
        from: 22222222-2222-2222-2222-222222222222
        to: 55555555-5555-5555-5555-555555555555
        fromPort: unfiltered
        toPort: default
