# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
id: f2e8a945-7b3c-4d1e-9a8f-3c5b7e9d2f84
name: "PLATEAU4-quality-check-02-bldg-workflow"
entryGraphId: 8a6c4f2e-9b1d-4e7a-b3c5-6f8e2a4b9d7c
with:
  cityGmlPath:
  codelistsPath:
  codelists:
  schemasPath:
  schemas:
  objectListsPath:
  objectLists:
  prcs:
  targetPackages: ["bldg"]
graphs:
  # Common quality check graphs
  - !include ../../../../graphs/plateau4/xml_validator.yml
  - !include ../../../../graphs/plateau4/domain_of_definition_validator.yml
  - !include ../../../../graphs/plateau4/quality-check/01-01-common.yml
  - !include ../../../../graphs/plateau4/quality-check/01-02-common.yml
  # Domain-specific graphs
  - !include ../../../../graphs/lod_splitter_with_dm.yml
  - !include ../../../../graphs/surface_validator.yml
  - !include building_part_validation.yml
  - !include format_checks.yml
  - !include ref_and_type_checks.yml
  - !include surface_validation.yml
  - id: 8a6c4f2e-9b1d-4e7a-b3c5-6f8e2a4b9d7c
    name: entry_point
    nodes:
      - id: 4d7b9e2a-5c8f-41d6-b9a3-7e1c5f8d2b9a
        name: FeatureCreator
        type: action
        action: Feature Creator
        with:
          creator:
            type: flowExpr
            value: |
              [
                {
                  "cityGmlPath": env["cityGmlPath"],
                  "cityCode": env.get("cityCode") or env["cityGmlPath"].rsplit("/", 1)[-1][:5],
                  "baseCityCode": env.get("cityCode") or env["cityGmlPath"].rsplit("/", 1)[-1][:5],
                  "objectListsPath": env.get("objectListsPath") or env.get("objectLists"),
                  "codelists": env.get("codelistsPath") or env.get("codelists"),
                  "schemas": env.get("schemasPath") or env.get("schemas"),
                },
              ]

      # Common quality check subgraphs
      - id: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6a
        name: CommonQualityCheck-01-01
        type: subGraph
        subGraphId: 5db64758-df36-486d-86bd-437b72fd9fc8

      - id: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7b
        name: CommonQualityCheck-01-02
        type: subGraph
        subGraphId: b7a4c316-112e-4473-bd25-4c158db4e561

      - id: c7315341-26b3-4405-9d02-039d721cd225
        name: DirectoryDecompressor
        type: action
        action: Directory Decompressor
        with:
          archiveAttributes:
            - codelists
            - schemas

      - id: 2aaa4ac9-2e79-479f-aa50-6543f461a76e
        name: FeatureFilePathExtractor
        type: action
        action: Feature File Path Extractor
        with:
          sourceDataset:
            type: flowExpr
            value: attributes["cityGmlPath"]
          extractArchive: true
          destPrefix: udx

      - id: 0daf7972-4d58-4ccd-a576-f3dfc418f749
        name: FeatureFilterByGml
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["extension"] == "gml"
              outputPort: features

      - id: 151fbadf-1b40-4264-a003-f6f11f6af2d6
        name: FeatureCounterFileIndex
        type: action
        action: Feature Counter
        with:
          countStart: 1
          outputAttribute: fileIndex

      - id: 7e833060-f8c4-458b-a8cc-8c817527f25b
        name: PLATEAU4.UDXFolderExtractor
        type: action
        action: PLATEAU4.UDXFolderExtractor
        with:
          cityGmlPath:
            type: flowExpr
            value: attributes["path"]
          codelistsPath: codelists
          schemasPath: schemas

      - id: a1554a74-3caa-4880-a4a3-6dc4ab526a13
        name: FeatureFilterByPackage
        type: action
        action: Feature Filter
        with:
          conditions:
          - expr:
              type: flowExpr
              value: not env["targetPackages"] or attributes["package"] in env["targetPackages"]
            outputPort: features

      - id: 7a561c34-2e94-4883-91e4-4026b09c2f8a
        name: ReferenceAndTypeChecker
        type: subGraph
        subGraphId: 34e55bec-9185-4a66-9c41-3dbddc1e64fa

      - id: 3f7b2a9d-1c8e-4a6f-b5d3-9e2c7a4f8b1d
        name: FeatureCityGmlReader
        type: action
        action: Feature CityGML Reader
        with:
          codelistsPath:
            type: flowExpr
            value: attributes["codelists"]
          flatten: true
          dataset:
            type: flowExpr
            value: attributes["gmlPath"]
      - id: 7c3e8b1f-2a9d-4f6c-8e5a-9b2d4f7c1e8a
        name: AttributeMapperGmlPathAndFilename
        type: action
        action: Attribute Mapper
        with:
          mappers:
            - attribute: gmlPath
              valueAttribute: path
            - attribute: gmlFilename
              valueAttribute: name
            - attribute: fileIndex
              valueAttribute: fileIndex
            - attribute: codelists
              valueAttribute: dirCodelists
            - attribute: schemas
              valueAttribute: dirSchemas

      - id: a8a7e7f8-8d73-4078-9cff-4476924f2ad7
        name: FeatureSorter
        type: action
        action: Feature Sorter
        with:
          attributes: [fileIndex]
          order: ascending

      - id: 5a7b1469-217a-4d4b-bb01-971a9f9140d8
        name: FeatureCounterFeatureIndex
        type: action
        action: Feature Counter
        with:
          countStart: 0
          outputAttribute: featureIndex

      - id: 00e04196-60a5-4e0e-8389-74d2d0fad6e1
        name: AppearanceRemover
        type: action
        action: Appearance Remover
      - id: e51ebef4-2a0f-4c67-abdc-1583db29a72b
        name: AttributeManagerRemoveUnusedAttributesForGeometryChecks
        type: action
        action: Attribute Manager
        with:
          operations:
            - attribute: gmlPath
              method: remove
            - attribute: cityGmlAttributes
              method: remove
            - attribute: gmlName
              method: remove

      - id: 10df06f3-cafa-4abd-ba94-04ac71dae467
        name: HorizontalReprojector
        type: action
        action: Horizontal Reprojector
        with:
          targetEpsgCode:
            type: flowExpr
            value: env["prcs"]

      - id: 2b8c4e7a-9f1d-4a3b-c6e8-5d2a7b9c1e4f
        name: FeatureFilterBuildingPart
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: "true"
              outputPort: features
            - expr:
                type: flowExpr
                value: attributes["featureType"] == "bldg:BuildingPart"
              outputPort: buildingPart

      - id: 7f3a8d2c-4e6b-4d9a-b1c5-3e8f2a7d9c4b
        name: FormatChecker
        type: subGraph
        subGraphId: 36d6a846-80a8-48e9-9c34-d7c0b8af2d6d

      - id: e9f2c5b8-3a7d-4c1e-8b6f-2d9a5c8e1b4f
        name: SurfaceValidation
        type: subGraph
        subGraphId: a9952b0d-e085-4a0b-bb76-fa36b969c96b

      - id: 3e9f7c2a-8b4d-4e1f-a9c5-6b8e2c4a7d9f
        name: BuildingPartValidation
        type: subGraph
        subGraphId: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d

      # ===== Error Summary Output (Phase 1-6) =====
      # Phase 1: File info extraction
      - id: b1c2d3e4-5f6a-7b8c-9d0e-1f2a3b4c5d6e
        name: FileInfoExtractor
        type: action
        action: Attribute Mapper
        with:
          mappers:
            - attribute: index
              valueAttribute: fileIndex
            - attribute: filename
              valueAttribute: gmlFilename

      # Phase 2: FeatureMerger for aggregating error counts
      - id: 4712539b-5103-41ee-9359-0333eefb82ef
        name: GeometryRemoverForErrorSummary
        type: action
        action: Geometry Remover
      - id: c2d3e4f5-6a7b-8c9d-0e1f-2a3b4c5d6e7f
        name: ErrorSummaryMerger
        type: action
        action: Feature Merger
        with:
          requestorAttributeValue:
            type: flowExpr
            value: attributes["filename"]
          supplierAttributeValue:
            type: flowExpr
            value: attributes["gmlFilename"]

      # Phase 3: AttributeMapper for CSV formatting
      - id: d3e4f5a6-7b8c-9d0e-1f2a-3b4c5d6e7f8a
        name: SummaryAttributeMapper
        type: action
        action: Attribute Mapper
        with:
          mappers:
            - attribute: Index
              valueAttribute: index
            - attribute: Filename
              valueAttribute: filename
            - attribute: "市区町村コードエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_incorrect_city_code", 0)
            - attribute: "C-bldg-01 エラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_duplicate_building_id", 0)
            - attribute: "不正な建物ID"
              expr:
                type: flowExpr
                value: attributes.get("_num_missing_building_id", 0)
            - attribute: "L-bldg-02 エラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lbldg02_error", 0)
            - attribute: "L-bldg-04,05 エラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_incorrect_usage_attribute", 0)
            - attribute: "L-bldg-06 エラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lbldg06_error", 0)
            - attribute: "T-bldg-02エラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_invalid_bldginst_geom_type", 0)
            - attribute: "LOD0 面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod0_invalid_surface", 0)
            - attribute: "LOD0 面の向きエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod0_incorrect_orientation", 0)
            - attribute: "LOD0 面の交差"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod0_surface_intersection", 0)
            - attribute: "LOD1 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod1_invalid_surface", 0)
            - attribute: "LOD1 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod1_not_closed_solid", 0)
            - attribute: "LOD1 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod1_solid_issues", 0)
            - attribute: "LOD2 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod2_invalid_surface", 0)
            - attribute: "LOD3 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod3_invalid_surface", 0)
            - attribute: "LOD4 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod4_invalid_surface", 0)
            - attribute: "LOD2 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod2_not_closed_solid", 0)
            - attribute: "LOD3 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod3_not_closed_solid", 0)
            - attribute: "LOD4 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod4_not_closed_solid", 0)
            - attribute: "LOD2 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod2_solid_issues", 0)
            - attribute: "LOD3 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod3_solid_issues", 0)
            - attribute: "LOD4 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod4_solid_issues", 0)
            - attribute: "図郭不正"
              expr:
                type: flowExpr
                value: attributes.get("_num_incorrect_meshcode", 0)
            - attribute: "LOD0-1のBuildingPart"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod0_1_buildingpart", 0)
            - attribute: "LOD1 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod1_solid_intersection", 0)
            - attribute: "LOD2 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod2_solid_intersection", 0)
            - attribute: "LOD3 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod3_solid_intersection", 0)
            - attribute: "LOD4 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("_num_lod4_solid_intersection", 0)

      # Phase 4: CSV output
      - id: e4f5a6b7-8c9d-0e1f-2a3b-4c5d6e7f8a9b
        name: CSVSummaryWriter
        type: action
        action: FeatureWriter
        with:
          format: csv
          output:
            type: string
            value: 02_建築物_検査結果一覧.csv

      # Phase 5: StatisticsCalculator for JSON aggregation
      - id: f5a6b7c8-9d0e-1f2a-3b4c-5d6e7f8a9b0c
        name: StatisticsCalculator
        type: action
        action: Statistics Calculator
        with:
          calculations:
            - newAttribute: "C-bldg-01 エラー"
              expr:
                type: flowExpr
                value: attributes.get("C-bldg-01 エラー", 0)
            - newAttribute: "不正な建物ID"
              expr:
                type: flowExpr
                value: attributes.get("不正な建物ID", 0)
            - newAttribute: "市区町村コードエラー"
              expr:
                type: flowExpr
                value: attributes.get("市区町村コードエラー", 0)
            - newAttribute: "L-bldg-02 エラー"
              expr:
                type: flowExpr
                value: attributes.get("L-bldg-02 エラー", 0)
            - newAttribute: "L-bldg-04,05 エラー"
              expr:
                type: flowExpr
                value: attributes.get("L-bldg-04,05 エラー", 0)
            - newAttribute: "L-bldg-06 エラー"
              expr:
                type: flowExpr
                value: attributes.get("L-bldg-06 エラー", 0)

            # LOD0
            - newAttribute: "LOD0 面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD0 面のエラー", 0)
            - newAttribute: "LOD0 面の向きエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD0 面の向きエラー", 0)
            - newAttribute: "LOD0 面の交差"
              expr:
                type: flowExpr
                value: attributes.get("LOD0 面の交差", 0)

            # LOD1
            - newAttribute: "LOD1 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD1 境界面のエラー", 0)
            - newAttribute: "LOD1 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("LOD1 非水密立体", 0)
            - newAttribute: "LOD1 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD1 立体のエラー", 0)
            - newAttribute: "LOD1 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("LOD1 立体の交差", 0)

            # LOD2
            - newAttribute: "LOD2 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD2 境界面のエラー", 0)
            - newAttribute: "LOD2 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("LOD2 非水密立体", 0)
            - newAttribute: "LOD2 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD2 立体のエラー", 0)
            - newAttribute: "LOD2 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("LOD2 立体の交差", 0)

            # LOD3
            - newAttribute: "LOD3 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD3 境界面のエラー", 0)
            - newAttribute: "LOD3 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("LOD3 非水密立体", 0)
            - newAttribute: "LOD3 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD3 立体のエラー", 0)
            - newAttribute: "LOD3 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("LOD3 立体の交差", 0)

            # LOD4
            - newAttribute: "LOD4 境界面のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD4 境界面のエラー", 0)
            - newAttribute: "LOD4 非水密立体"
              expr:
                type: flowExpr
                value: attributes.get("LOD4 非水密立体", 0)
            - newAttribute: "LOD4 立体のエラー"
              expr:
                type: flowExpr
                value: attributes.get("LOD4 立体のエラー", 0)
            - newAttribute: "LOD4 立体の交差"
              expr:
                type: flowExpr
                value: attributes.get("LOD4 立体の交差", 0)

            - newAttribute: "T-bldg-02エラー"
              expr:
                type: flowExpr
                value: attributes.get("T-bldg-02エラー", 0)
            - newAttribute: "LOD0-1のBuildingPart"
              expr:
                type: flowExpr
                value: attributes.get("LOD0-1のBuildingPart", 0)

            - newAttribute: totalErrorCount
              expr:
                type: flowExpr
                value: |
                  itertools.sum([
                    attributes.get("C-bldg-01 エラー", 0),
                    attributes.get("不正な建物ID", 0),
                    attributes.get("市区町村コードエラー", 0),
                    attributes.get("L-bldg-02 エラー", 0),
                    attributes.get("L-bldg-04,05 エラー", 0),
                    attributes.get("L-bldg-06 エラー", 0),
                    attributes.get("LOD0 面のエラー", 0),
                    attributes.get("LOD0 面の向きエラー", 0),
                    attributes.get("LOD0 面の交差", 0),
                    attributes.get("LOD1 境界面のエラー", 0),
                    attributes.get("LOD1 非水密立体", 0),
                    attributes.get("LOD1 立体のエラー", 0),
                    attributes.get("LOD1 立体の交差", 0),
                    attributes.get("LOD2 境界面のエラー", 0),
                    attributes.get("LOD2 非水密立体", 0),
                    attributes.get("LOD2 立体のエラー", 0),
                    attributes.get("LOD2 立体の交差", 0),
                    attributes.get("LOD3 境界面のエラー", 0),
                    attributes.get("LOD3 非水密立体", 0),
                    attributes.get("LOD3 立体のエラー", 0),
                    attributes.get("LOD3 立体の交差", 0),
                    attributes.get("LOD4 境界面のエラー", 0),
                    attributes.get("LOD4 非水密立体", 0),
                    attributes.get("LOD4 立体のエラー", 0),
                    attributes.get("LOD4 立体の交差", 0),
                    attributes.get("T-bldg-02エラー", 0),
                    attributes.get("LOD0-1のBuildingPart", 0),
                    attributes.get("図郭不正", 0),
                  ])

      # Phase 6: JSON output with converter
      - id: a6b7c8d9-0e1f-2a3b-4c5d-6e7f8a9b0c1d
        name: JSONSummaryWriter
        type: action
        action: FeatureWriter
        with:
          format: json
          converter:
            type: flowExpr
            value: |
              if len(attributes["__features"]) == 0 {
                []
              } else {
                feature = attributes["__features"][0];
                itertools.map(feature.keys(), fn(key) {
                  {"name": key, "count": feature[key]}
                })
              }
          output:
            type: string
            value: summary_bldg.json

      - id: 9e0f1a2b-3c4d-5e6f-7a8b-9c0d1e2f3a4b
        name: StatisticsCalculatorTotalErrors
        type: action
        action: Statistics Calculator
        with:
          calculations:
            - newAttribute: totalErrorCount
              expr:
                type: flowExpr
                value: attributes.get("totalErrorCount", 0)

      - id: a1b2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        name: FeatureFilterNoErrors
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["totalErrorCount"] == 0
              outputPort: features

      - id: b2c3d4e5-6f7a-8b9c-0d1e-2f3a4b5c6d7e
        name: FileWriterQcResultOk
        type: action
        action: JSON Writer
        with:
          converter:
            type: flowExpr
            value: '[]'
          output:
            type: flowExpr
            value: 'env["cityGmlPath"].split("/")[-1].remove_suffix(".zip") + "_qc_result_ok"'

      # ZipFileWriter - Bundle all output files
      - id: 9f8e7d6c-5b4a-3928-1716-0f5e4d3c2b1a
        name: ZipFileWriter
        type: action
        action: Zip File Writer
        with:
          output:
            type: flowExpr
            value: 'env["cityGmlPath"].split("/")[-1].remove_suffix(".zip") + "_qc_result.zip"'

    edges:
      - id: 8c9e2f4a-7b1d-4e5c-a3f2-9d8b6c4e1a7f
        from: 4d7b9e2a-5c8f-41d6-b9a3-7e1c5f8d2b9a
        to: c7315341-26b3-4405-9d02-039d721cd225
        fromPort: features
        toPort: features
      - id: f3a7b2e5-4c8d-4f9a-bce2-5f1a8d3b9c6e
        from: c7315341-26b3-4405-9d02-039d721cd225
        to: 2aaa4ac9-2e79-479f-aa50-6543f461a76e
        fromPort: features
        toPort: features
      # Connect DirectoryDecompressor to common quality check subgraphs
      - id: 1a2b3c4d-5e6f-7a8b-9c0d-0e1f2a3b4c5d
        from: c7315341-26b3-4405-9d02-039d721cd225  # DirectoryDecompressor
        to: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6a    # CommonQualityCheck-01-01
        fromPort: features
        toPort: features
      - id: 2b3c4d5e-6f7a-8b9c-0d1e-1f2a3b4c5d6e
        from: c7315341-26b3-4405-9d02-039d721cd225  # DirectoryDecompressor
        to: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7b    # CommonQualityCheck-01-02
        fromPort: features
        toPort: features
