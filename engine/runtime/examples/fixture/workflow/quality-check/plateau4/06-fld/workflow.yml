id: d5277b70-7263-44c9-b1c3-aa43081b9e59
name: "PLATEAU4 Quality Check 06 Flood Zone"
entryGraphId: 0a2f610f-b92c-483b-a76a-e6143c3ab249
with:
  cityGmlPath:
  codelistsPath:
  codelists:
  schemasPath:
  schemas:
  objectListsPath:
  objectLists:
  workerArtifactPath:
  prcs:
  targetPackages: ["fld", "htd", "ifld", "tnm", "rfld"]
graphs:
  # Common quality check graphs
  - !include ../../../../graphs/plateau4/xml_validator.yml
  - !include ../../../../graphs/plateau4/domain_of_definition_validator.yml
  - !include ../../../../graphs/plateau4/quality-check/01-01-common.yml
  - !include ../../../../graphs/plateau4/quality-check/01-02-common.yml
  - id: 0a2f610f-b92c-483b-a76a-e6143c3ab249
    name: EntryPoint
    nodes:
      # Input Processing
      - id: 04f359e7-3c19-4b3a-9859-3cd7de61eec9
        name: InputFeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator: |
            [
              #{
                cityGmlPath: env.get("cityGmlPath"),
                codelists: env.get("codelistsPath") ?? env.get("codelists"),
                schemas: env.get("schemasPath") ?? env.get("schemas"),
                objectListsPath: env.get("objectListsPath") ?? env.get("objectLists"),
                workerArtifactPath: env.get("workerArtifactPath"),
              },
            ]

      - id: 0aeb935e-bc3e-4867-96f3-122d504fcde6
        name: DirectoryDecompressor
        type: action
        action: DirectoryDecompressor
        with:
          archiveAttributes:
            - codelists
            - schemas

      # Common quality check subgraphs
      - id: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6b
        name: CommonQualityCheck-01-01
        type: subGraph
        subGraphId: 5db64758-df36-486d-86bd-437b72fd9fc8

      - id: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7c
        name: CommonQualityCheck-01-02
        type: subGraph
        subGraphId: b7a4c316-112e-4473-bd25-4c158db4e561

      - id: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe4
        name: FeatureFilePathExtractor
        type: action
        action: FeatureFilePathExtractor
        with:
          sourceDataset: |
            env.get("__value")["cityGmlPath"]
          extractArchive: true
          destPrefix: udx

      - id: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe5
        name: FeatureFilterByGml
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr: |
                env.get("__value").extension == "gml"
              outputPort: default

      # UDX Folder Structure Extraction and _fld_scale Extraction
      - id: 30af8e4f-0d06-4b74-b99d-c23d7cb5c72e
        name: UDXFolderExtractor
        type: action
        action: PLATEAU4.UDXFolderExtractor
        with:
          cityGmlPath: |
            env.get("__value")["path"]
          codelistsPath: "codelists"
          schemasPath: "schemas"

      - id: a1554a74-3caa-4880-a4a3-6dc4ab526a13
        name: FeatureFilterByPackage
        type: action
        action: FeatureFilter
        with:
          conditions:
          - expr: |
              (env.get("targetPackages") ?? []).is_empty() || env.get("__value")["package"] in env.get("targetPackages")
            outputPort: default

      # Extract _fld_scale (l1 or l2) from filename using pattern matching
      # FME StringSearcher pattern: (?<=_)(l1|l2)(?=_|\.)
      - id: 2f8e9d3a-1b2c-4d5e-6f7a-8b9c0d1e2f3a
        name: FldScaleExtractor
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: "_fld_scale"
              method: create
              value: |
                let filename = env.get("__value")["name"];
                if filename == () {
                  return ();
                }
                // Split by underscore and look for l1 or l2
                let parts = filename.split("_");
                for part in parts {
                  if part == "l1" || part.starts_with("l1.") {
                    return "l1";
                  }
                  if part == "l2" || part.starts_with("l2.") {
                    return "l2";
                  }
                }
                return ();

      # Clean up unnecessary attributes
      - id: 3b4c5d6e-7f8a-9b0c-1d2e-3f4a5b6c7d8e
        name: AttributeCleanup
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: "_folder_root"
              method: remove
            - attribute: "_dir_root"
              method: remove
            - attribute: "_dir_codelists"
              method: remove
            - attribute: "_dir_schemas"
              method: remove

      # Sort by _udx_dirs, _fld_scale, _gml_filename
      - id: 4c5d6e7f-8a9b-0c1d-2e3f-4a5b6c7d8e9f
        name: Sorter
        type: action
        action: FeatureSorter
        with:
          attributes:
            - "_udx_dirs"
            - "_fld_scale"
            - "_gml_filename"
          order: "ascending"

      # Add _file_index counter
      - id: 5d6e7f8a-9b0c-1d2e-3f4a-5b6c7d8e9f0a
        name: Counter
        type: action
        action: FeatureCounter
        with:
          outputAttribute: "_file_index"
          groupBy:
            - "_udx_dirs"
          countStart: 1

      # WaterBody TIN surface validation
      - id: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5e
        name: WaterBodyTinValidator
        type: action
        action: PLATEAU4.WaterBodyTinValidator
        with:
          cityGmlPathAttribute: "path"
          targetEpsgCode: env.get("prcs")
          unsharedEdgeTolerance: 0.1  # meter(s)
          unsharedEdgeGroupBy:
            - "_fld_scale"
            - "udxDirs"
          duplicateConsecutivePointsTolerance: 0.009
          corruptGeometryTolerance: 0.01

      # CSV Output Preparation
      # Maps only the columns needed for CSV output
      - id: 9d0e1f2a-3b4c-5d6e-7f8a-9b0c1d2e3f4a
        name: PrepareSummaryForCSV
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: "Folder"
              expr: |
                env.get("__value").udxDirs
            - attribute: "Index"
              expr: |
                env.get("__value")._file_index
            - attribute: "Filename"
              expr: |
                env.get("__value").name
            - attribute: "頂点数が不正な三角形"
              expr: |
                env.get("__value")._num_incorrect_num_vertices
            - attribute: "向きが不正な三角形"
              expr: |
                env.get("__value")._num_wrong_orientation
            - attribute: "閉じていない三角形"
              expr: |
                env.get("__value")._num_not_closed
            - attribute: "線状・点状の三角形"
              expr: |
                env.get("__value")._num_degenerate_triangles ?? 0
            - attribute: "共有先のない辺"
              expr: |
                env.get("__value")._num_unshared_edges ?? 0

      # JSON Output Preparation
      # Maps attributes needed for JSON output, including _json_filename
      - id: 0a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        name: PrepareSummaryForJSON
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: "頂点数が不正な三角形"
              expr: |
                env.get("__value")._num_incorrect_num_vertices
            - attribute: "閉じていない三角形"
              expr: |
                env.get("__value")._num_not_closed
            - attribute: "向きが不正な三角形"
              expr: |
                env.get("__value")._num_wrong_orientation
            - attribute: "線状・点状の三角形"
              expr: |
                env.get("__value")._num_degenerate_triangles ?? 0
            - attribute: "_json_filename"
              expr: |
                env.get("__value")._json_filename

      # File Output Writers
      # CSV Writer for detailed error summary (one row per file)
      - id: 1f2a3b4c-5d6e-7f8a-9b0c-1d2e3f4a5b6c
        name: CSVWriter
        type: action
        action: FeatureWriter
        with:
          format: csv
          output: |
            let base_path = env.get("workerArtifactPath");
            let folder = env.get("__value").Folder;
            if folder == () || folder == "" {
              return file::join_path(base_path, "06_浸水想定区域_fld.csv");
            }
            // Extract flood type from first path segment (e.g., "htd/12_1" -> "htd", "12_1")
            let slash_pos = folder.index_of("/");
            let flood_type = folder.sub_string(0, slash_pos);
            let path = folder.sub_string(slash_pos + 1);
            // Create hierarchical path: 06_浸水想定区域_{flood_type}/{path}.csv
            let csv_filepath = "06_浸水想定区域_" + flood_type + "/" + path + ".csv";
            file::join_path(base_path, csv_filepath)

      # JSON Writer for aggregated counts (one file per folder)
      - id: 2a3b4c5d-6e7f-8a9b-0c1d-2e3f4a5b6c7d
        name: JSONWriter
        type: action
        action: FeatureWriter
        with:
          format: json
          converter: |
            if env.get("__features").is_empty() {
              []
            } else {
              let features = env.get("__features");
              let sum_incorrect = 0;
              let sum_not_closed = 0;
              let sum_wrong_orientation = 0;
              let sum_degenerate = 0;
              for f in features {
                sum_incorrect += f["頂点数が不正な三角形"] ?? 0;
                sum_not_closed += f["閉じていない三角形"] ?? 0;
                sum_wrong_orientation += f["向きが不正な三角形"] ?? 0;
                sum_degenerate += f["線状・点状の三角形"] ?? 0;
              }
              // Note: "共有先のない辺" is excluded from JSON summary and totalErrorCount to match FME behavior
              [
                #{
                  name: "頂点数が不正な三角形",
                  count: sum_incorrect,
                },
                #{
                  name: "閉じていない三角形",
                  count: sum_not_closed,
                },
                #{
                  name: "向きが不正な三角形",
                  count: sum_wrong_orientation,
                },
                #{
                  name: "線状・点状の三角形",
                  count: sum_degenerate,
                }
              ]
            }
          output: |
            let base_path = env.get("workerArtifactPath");
            let json_filename = env.get("__value")._json_filename ?? "summary_fld.json";
            file::join_path(base_path, json_filename)

      # Calculate total error count
      - id: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b
        name: StatisticsCalculatorTotalErrors
        type: action
        action: StatisticsCalculator
        with:
          calculations:
            # Note: "共有先のない辺" is excluded from totalErrorCount to match FME behavior
            - newAttribute: totalErrorCount
              expr: |
                let v1 = env.get("__value")["頂点数が不正な三角形"] ?? 0;
                let v2 = env.get("__value")["閉じていない三角形"] ?? 0;
                let v3 = env.get("__value")["向きが不正な三角形"] ?? 0;
                let v4 = env.get("__value")["線状・点状の三角形"] ?? 0;
                let common = env.get("__value")["totalErrorCount"] ?? 0;
                v1 + v2 + v3 + v4 + common

      # Filter features with no errors
      - id: 4f5a6b7c-8d9e-0f1a-2b3c-4d5e6f7a8b9c
        name: FeatureFilterNoErrors
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr: |
                env.get("__value")["totalErrorCount"] == 0
              outputPort: default

      # Write qc_result_ok file when no errors
      - id: 5a6b7c8d-9e0f-1a2b-3c4d-5e6f7a8b9c0d
        name: FileWriterQcResultOk
        type: action
        action: JsonWriter
        with:
          converter: '[]'
          output: |
            let filename = file::extract_filename_without_ext(env.get("cityGmlPath")) + "_qc_result_ok";
            let dirname = env.get("workerArtifactPath");
            file::join_path(dirname, filename)

      # ZipFileWriter - Bundle all output files
      - id: 6b7c8d9e-0f1a-2b3c-4d5e-6f7a8b9c0d1e
        name: ZipFileWriter
        type: action
        action: ZipFileWriter
        with:
          output: |
            let filename = file::extract_filename_without_ext(env.get("cityGmlPath")) + "_qc_result.zip";
            let dirname = env.get("workerArtifactPath");
            file::join_path(dirname, filename)

    edges:
      # Input processing chain
      - id: b54bb6e9-9bee-407c-a11d-58436552a745
        from: 04f359e7-3c19-4b3a-9859-3cd7de61eec9
        to: 0aeb935e-bc3e-4867-96f3-122d504fcde6
        fromPort: default
        toPort: default

      # Connect DirectoryDecompressor to common quality check subgraphs
      - id: b5c6d7e8-f9a0-1b2c-3d4e-5f6a7b8c9d0f
        from: 0aeb935e-bc3e-4867-96f3-122d504fcde6  # DirectoryDecompressor
        to: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6b    # CommonQualityCheck-01-01
        fromPort: default
        toPort: default

      - id: c6d7e8f9-a0b1-2c3d-4e5f-6a7b8c9d0e1a
        from: 0aeb935e-bc3e-4867-96f3-122d504fcde6  # DirectoryDecompressor
        to: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7c    # CommonQualityCheck-01-02
        fromPort: default
        toPort: default

      - id: 205e077b-2464-4b02-a6b7-760957506e27
        from: 0aeb935e-bc3e-4867-96f3-122d504fcde6
        to: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe4
        fromPort: default
        toPort: default

      - id: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe6
        from: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe4
        to: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe5
        fromPort: default
        toPort: default

      - id: 4fe403d4-b3e2-41f3-b155-c7050aba3c8b
        from: 1c38a4d1-a4ca-455d-b65e-bf5d3209abe5
        to: 30af8e4f-0d06-4b74-b99d-c23d7cb5c72e
        fromPort: default
        toPort: default
      - id: 30af8e4f-0001-0001-0001-000000000001
        from: 30af8e4f-0d06-4b74-b99d-c23d7cb5c72e
        to: a1554a74-3caa-4880-a4a3-6dc4ab526a13
        fromPort: default
        toPort: default

      # _fld_scale extraction
      - id: 3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d
        from: a1554a74-3caa-4880-a4a3-6dc4ab526a13
        to: 2f8e9d3a-1b2c-4d5e-6f7a-8b9c0d1e2f3a
        fromPort: default
        toPort: default

      # Attribute cleanup
      - id: 4b5c6d7e-8f9a-0b1c-2d3e-4f5a6b7c8d9e
        from: 2f8e9d3a-1b2c-4d5e-6f7a-8b9c0d1e2f3a
        to: 3b4c5d6e-7f8a-9b0c-1d2e-3f4a5b6c7d8e
        fromPort: default
        toPort: default

      # Sorting by _udx_dirs, _fld_scale, _gml_filename
      - id: 5c6d7e8f-9a0b-1c2d-3e4f-5a6b7c8d9e0f
        from: 3b4c5d6e-7f8a-9b0c-1d2e-3f4a5b6c7d8e
        to: 4c5d6e7f-8a9b-0c1d-2e3f-4a5b6c7d8e9f
        fromPort: default
        toPort: default

      # Add _file_index counter
      - id: 6d7e8f9a-0b1c-2d3e-4f5a-6b7c8d9e0f1a
        from: 4c5d6e7f-8a9b-0c1d-2e3f-4a5b6c7d8e9f
        to: 5d6e7f8a-9b0c-1d2e-3f4a-5b6c7d8e9f0a
        fromPort: default
        toPort: default

      # Counter to WaterBodyTinValidator (one feature per gml file)
      - id: 9705ee13-25e6-4237-b60e-4e89828a1774
        from: 5d6e7f8a-9b0c-1d2e-3f4a-5b6c7d8e9f0a
        to: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5e
        fromPort: default
        toPort: default

      # WaterBodyTinValidator summary to CSV preparation
      - id: 1b2c3d4e-5f6a-7b8c-9d0e-1f2a3b4c5d6e
        from: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5e
        to: 9d0e1f2a-3b4c-5d6e-7f8a-9b0c1d2e3f4a
        fromPort: summary
        toPort: default

      # CSV preparation to CSV writer
      - id: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7b
        from: 9d0e1f2a-3b4c-5d6e-7f8a-9b0c1d2e3f4a
        to: 1f2a3b4c-5d6e-7f8a-9b0c-1d2e3f4a5b6c
        fromPort: default
        toPort: default

      # WaterBodyTinValidator summary to JSON preparation
      - id: 2c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
        from: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5e
        to: 0a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        fromPort: summary
        toPort: default

      # JSON preparation to JSON writer
      - id: 3d4e5f6a-7b8c-9d0e-1f2a-3b4c5d6e7f8a
        from: 0a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        to: 2a3b4c5d-6e7f-8a9b-0c1d-2e3f4a5b6c7d
        fromPort: default
        toPort: default

      # qc_result_ok generation flow
      # JSON preparation to StatisticsCalculatorTotalErrors
      - id: 4e5f6a7b-8c9d-0e1f-2a3b-4c5d6e7f8a9b
        from: 0a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        to: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b
        fromPort: default
        toPort: default

      # StatisticsCalculatorTotalErrors to FeatureFilterNoErrors
      - id: 5f6a7b8c-9d0e-1f2a-3b4c-5d6e7f8a9b0c
        from: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b
        to: 4f5a6b7c-8d9e-0f1a-2b3c-4d5e6f7a8b9c
        fromPort: default
        toPort: default

      # FeatureFilterNoErrors to FileWriterQcResultOk
      - id: 6a7b8c9d-0e1f-2a3b-4c5d-6e7f8a9b0c1d
        from: 4f5a6b7c-8d9e-0f1a-2b3c-4d5e6f7a8b9c
        to: 5a6b7c8d-9e0f-1a2b-3c4d-5e6f7a8b9c0d
        fromPort: default
        toPort: default

      # Connect CommonQualityCheck subgraphs summaryOutput to StatisticsCalculatorTotalErrors
      - id: a1b2c3d4-0e1f-2a3b-4c5d-6e7f8a9b0c1e
        from: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6b  # CommonQualityCheck-01-01
        to: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b    # StatisticsCalculatorTotalErrors
        fromPort: summaryOutput
        toPort: default

      - id: b2c3d4e5-1f2a-3b4c-5d6e-7f8a9b0c1d2f
        from: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7c  # CommonQualityCheck-01-02
        to: 3e4f5a6b-7c8d-9e0f-1a2b-3c4d5e6f7a8b    # StatisticsCalculatorTotalErrors
        fromPort: summaryOutput
        toPort: default

      # ===== ZipFileWriter connections =====
      # CSVWriter → ZipFileWriter
      - id: 7c8d9e0f-1a2b-3c4d-5e6f-7a8b9c0d1e2f
        from: 1f2a3b4c-5d6e-7f8a-9b0c-1d2e3f4a5b6c
        to: 6b7c8d9e-0f1a-2b3c-4d5e-6f7a8b9c0d1e
        fromPort: default
        toPort: default

      # JSONWriter → ZipFileWriter
      - id: 8d9e0f1a-2b3c-4d5e-6f7a-8b9c0d1e2f3a
        from: 2a3b4c5d-6e7f-8a9b-0c1d-2e3f4a5b6c7d
        to: 6b7c8d9e-0f1a-2b3c-4d5e-6f7a8b9c0d1e
        fromPort: default
        toPort: default

      # CommonQualityCheck-01-01 default output → ZipFileWriter
      - id: c0d1e2f3-4a5b-6c7d-8e9f-0a1b2c3d4e5a
        from: d1e2f3a4-b5c6-7d8e-9f0a-1b2c3d4e5f6b  # CommonQualityCheck-01-01
        to: 6b7c8d9e-0f1a-2b3c-4d5e-6f7a8b9c0d1e    # ZipFileWriter
        fromPort: default
        toPort: default

      # CommonQualityCheck-01-02 default output → ZipFileWriter
      - id: d1e2f3a4-5b6c-7d8e-9f0a-1b2c3d4e5f6b
        from: e2f3a4b5-c6d7-8e9f-0a1b-2c3d4e5f6a7c  # CommonQualityCheck-01-02
