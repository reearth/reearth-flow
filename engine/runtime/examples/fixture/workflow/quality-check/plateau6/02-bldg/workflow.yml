# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
# PLATEAU6 (CityGML 3.0 + i-UR 4.0) quality-check 02-bldg workflow.
id: a2066efe-f484-461f-af06-5b50daba978e
name: "PLATEAU6-quality-check-02-bldg-workflow"
entryGraphId: 028be94c-4528-4349-908c-ecf2b319a67a
with:
  cityGmlPath:
  codelistsPath:
  codelists:
  schemasPath:
  schemas:
  objectListsPath:
  objectLists:
  prcs:
graphs:
  - !include ../../../../graphs/plateau6/xml_validator.yml
  - !include ../../../../graphs/plateau6/domain_of_definition_validator.yml
  - !include ../../../../graphs/plateau6/quality-check/01-01-common.yml
  - !include ../../../../graphs/plateau6/quality-check/01-02-common.yml
  - !include building_checks.yml
  - !include ../../../../graphs/lod_splitter_with_dm.yml
  - !include ../../../../graphs/surface_validator.yml
  - id: 028be94c-4528-4349-908c-ecf2b319a67a
    name: entry_point
    nodes:
      - id: 9d39970f-e631-4440-893d-9770abdad26f
        name: FeatureCreator
        type: action
        action: Feature Creator
        with:
          creator:
            type: flowExpr
            value: |
              [
                {
                  "cityGmlPath": env["cityGmlPath"],
                  "cityCode": env.get("cityCode") or env["cityGmlPath"].rsplit("/", 1)[-1][:5],
                  "baseCityCode": env.get("cityCode") or env["cityGmlPath"].rsplit("/", 1)[-1][:5],
                  "objectListsPath": env.get("objectListsPath") or env.get("objectLists"),
                  "codelists": env.get("codelistsPath") or env.get("codelists"),
                  "schemas": env.get("schemasPath") or env.get("schemas"),
                },
              ]

      - id: 4bff1e48-0f4f-4fbb-a277-a9287ef2eba8
        name: DirectoryDecompressor
        type: action
        action: Directory Decompressor
        with:
          archiveAttributes:
            - codelists
            - schemas

      - id: 9c3286ea-0e02-4bd0-bc21-0c5abd7e13d5
        name: PLATEAU6.CommonQualityCheck-01-01-common
        type: subGraph
        subGraphId: e7503542-d250-46d1-9646-4321b4fedbd3

      - id: d539b2c4-0538-40c0-bf2f-fd06e8488c3e
        name: PLATEAU6.CommonQualityCheck-01-02-common
        type: subGraph
        subGraphId: 0c1ed91a-7e69-4196-b6b7-d628060c2590

      - id: bd5c8270-4ca6-4dd4-a604-6b5fe7db517a
        name: PLATEAU6.BuildingQualityCheck-02-bldg
        type: subGraph
        subGraphId: a7a69028-b9d9-4ef1-916a-db453fca2638

      - id: d658ccbd-8f8c-4776-a2ea-425fb3dea282
        name: ZipFileWriter
        type: action
        action: Zip File Writer
        with:
          output:
            type: flowExpr
            value: 'env["cityGmlPath"].split("/")[-1].remove_suffix(".zip") + "_qc_result.zip"'

      - id: 47639a83-eb27-47d6-93a7-7393542aca1a
        name: StatisticsCalculatorTotalErrors
        type: action
        action: Statistics Calculator
        with:
          calculations:
            - newAttribute: totalErrorCount
              expr:
                type: flowExpr
                value: attributes.get("totalErrorCount", 0)

      - id: 4ae87699-571e-4cc8-bb13-4a977edbcac3
        name: FeatureFilterNoErrors
        type: action
        action: Feature Filter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["totalErrorCount"] == 0
              outputPort: features

      - id: df1c774c-a239-4d00-b7d8-01bb3af80c8d
        name: FileWriterQcResultOk
        type: action
        action: JSON Writer
        with:
          converter:
            type: flowExpr
            value: '[]'
          output:
            type: flowExpr
            value: 'env["cityGmlPath"].split("/")[-1].remove_suffix(".zip") + "_qc_result_ok"'

    edges:
      - id: ca53a8b9-377c-460e-9076-368cdb2a8911
        from: 9d39970f-e631-4440-893d-9770abdad26f
        to: 4bff1e48-0f4f-4fbb-a277-a9287ef2eba8
        fromPort: features
        toPort: features
