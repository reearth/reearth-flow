# PLATEAU6 (CityGML 3.0 + i-UR 4.0) quality-check 02-bldg sub-graph.
id: a7a69028-b9d9-4ef1-916a-db453fca2638
name: PLATEAU6.BuildingQualityCheck-02-bldg
nodes:
  - id: 63341eb4-409d-4668-b338-2d1e5ab003fd
    name: InputRouter
    type: action
    action: InputRouter
    with:
      routingPort: default

  - id: 27bb6136-ff9f-4523-9b28-bf01e0e9f698
    name: FeatureFilePathExtractor
    type: action
    action: FeatureFilePathExtractor
    with:
      sourceDataset:
        type: flowExpr
        value: attributes["cityGmlPath"]
      extractArchive: true
      destPrefix: udx

  - id: eb76867a-9d21-4c08-959b-abaf06bfadb6
    name: FeatureFilterByGml
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["extension"] == "gml"
          outputPort: default

  - id: a650b6b7-d764-4eb8-aeb0-6dc123e52d26
    name: FeatureSorterByName
    type: action
    action: FeatureSorter
    with:
      attributes:
        - name
      order: ascending

  - id: b229d8d1-f6c8-456a-b325-68f39a5fe82b
    name: FeatureCounterIndex
    type: action
    action: FeatureCounter
    with:
      countStart: 1
      outputAttribute: index

  - id: 06437150-b04d-4b41-83fc-e5767ea35a23
    name: FilePropertyExtractor
    type: action
    action: FilePropertyExtractor
    with:
      filePathAttribute: path

  # --- LOD0 surface validation pipeline ---
  # Reads each building GML (CityGML 3.0), splits geometry per LOD, validates the
  # LOD0 multi-surface.
  - id: d9349887-1920-44a6-93c9-182c8484d1a2
    name: FeatureCityGml3Reader
    type: action
    action: FeatureCityGml3Reader
    with:
      dataset:
        type: flowExpr
        value: attributes["path"]
      extractTags:
        - bldg:Building

  - id: 273fc537-32eb-44e1-af9f-d46bf0ba1cc8
    name: HorizontalReprojector
    type: action
    action: HorizontalReprojector
    with:
      sourceEpsgCode:
        type: flowExpr
        value: "6697"
      targetEpsgCode:
        type: flowExpr
        value: env.get("prcs")

  - id: 012f23c6-65e1-4759-ab04-f20ebecbadfc
    name: PLATEAU3.LodSplitterWithDM
    type: subGraph
    subGraphId: 7e98d856-1438-4148-bdcb-91747ef2e405

  - id: d12958f8-f52d-4c95-b62c-58a92d363017
    name: PLATEAU3.SurfaceValidator2D
    type: subGraph
    subGraphId: 8a5b1c9d-2e4f-4a3b-9c5d-1e6f8a2b4c7d

  - id: b60778f7-b110-44cb-a079-26d03f4dbb51
    name: Lod0InvalidSurfaceCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod0_invalid_surface
          expr:
            type: flowExpr
            value: "1"

  - id: ce1613dd-0b26-45a8-984e-adcf8932656e
    name: AttributeMapperLod0InvalidSurface
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: flowExpr
            value: |
              vr = attributes.get("validationResult");
              if vr != null and "details" in vr {
                vr["details"][0][0]
              } else if "issue" in attributes {
                attributes["issue"]
              } else {
                "UnknownError"
              }

  - id: b06c19d6-0ad0-4a3c-90bf-26d3613d7637
    name: FeatureWriterLod0InvalidSurface
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_LOD0面のエラー.csv

  # --- LOD0 surface intersection pipeline (Z-bldg-02) ---
  # Detect footprints of different buildings that overlap within the same GML.
  # Taps the valid LOD0 surfaces from SurfaceValidator2D, turns them into 2D line
  # work, then overlays the areas; any region covered by 2+ footprints is reported.
  - id: 5eb65556-a94e-4b76-a396-1752283d48a4
    name: GeometryCoercerLod0SurfaceIntersection
    type: action
    action: GeometryCoercer
    with:
      targetType: lineString

  - id: d65886fc-2d62-448c-8b2e-16841e3c4887
    name: TwoDimensionForcer
    type: action
    action: TwoDimensionForcer

  - id: 2edae6ab-44fe-48af-beb4-68c85e26dcdb
    name: AreaOnAreaOverlayerLod0
    type: action
    action: AreaOnAreaOverlayer
    with:
      accumulationMode: dropIncomingAttributes
      outputAttribute: overlap
      generateList: list
      tolerance: 0.01

  - id: 2550e8a3-04e0-446d-b592-886edcc3d351
    name: FeatureFilterByAreaOnAreaOverlap
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["overlap"] > 1
          outputPort: intersectionSurface

  - id: fd8dd5ad-cd3a-4703-87b9-663cd0bfb589
    name: ListIndexer1
    type: action
    action: ListIndexer
    with:
      listAttribute: list
      listIndexToCopy: 0
      copiedAttributeSuffix: _1

  - id: af899976-7fb2-4c38-a0ff-c76ce7d00709
    name: ListIndexer2
    type: action
    action: ListIndexer
    with:
      listAttribute: list
      listIndexToCopy: 1
      copiedAttributeSuffix: _2

  - id: 2a060073-02a0-460a-8b68-c3ea965a96d6
    name: AttributeMapperLod0SurfaceIntersection
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename_a
          valueAttribute: name_1
        - attribute: filename_b
          valueAttribute: name_2
        - attribute: feature_type_a
          valueAttribute: __citygml_feature_type_1
        - attribute: feature_type_b
          valueAttribute: __citygml_feature_type_2
        - attribute: lod_a
          valueAttribute: lod_1
        - attribute: lod_b
          valueAttribute: lod_2
        - attribute: gml_id_a
          valueAttribute: __citygml_gml_id_1
        - attribute: gml_id_b
          valueAttribute: __citygml_gml_id_2
        - attribute: issue
          expr:
            type: string
            value: Surface Intersection

  - id: 86da6c18-1b32-4443-9d24-9a0c3d6d060c
    name: Lod0SurfaceIntersectionCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - filename_a
      calculations:
        - newAttribute: _num_lod0_surface_intersection
          expr:
            type: flowExpr
            value: "1"

  - id: acb7b8cf-9059-4c7f-9b51-45cf430be09a
    name: FeatureWriterLod0SurfaceIntersection
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_LOD0面の交差.csv

  # --- LOD0 surface orientation pipeline ---
  # SurfaceValidator2D emits LOD0 surfaces whose exterior ring is not
  # counter-clockwise on the inCorrectOrientation port. Keep only genuinely
  # reversed (clockwise) surfaces; degenerate "no_orientation" /
  # "invalid_orientation" rings come from self-intersecting or corrupt geometry
  # and are already reported under "LOD0 面のエラー", so they must not be
  # double-counted here.
  - id: aefb9355-f63a-459c-beee-69635c4afaf1
    name: FeatureFilterLod0IncorrectOrientation
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["outerOrientation"] == "clockwise"
          outputPort: clockwise

  # Exclude surfaces that are also invalid (e.g. self-intersecting): those are
  # reported under "LOD0 面のエラー" and must not be double-counted as an
  # orientation error. The unmerged port carries reversed-but-otherwise-valid
  # surfaces (gml_id not present in the invalid-surface stream).
  - id: af670379-9f3c-4eef-bccb-580a53c2cc69
    name: OrientationInvalidSurfaceExcluder
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["__citygml_gml_id"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["__citygml_gml_id"]

  - id: 0177ff7b-a842-4aca-be99-47813bf1b11d
    name: Lod0IncorrectOrientationCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod0_incorrect_orientation
          expr:
            type: flowExpr
            value: "1"

  - id: 8b6e3dbc-4c45-4d8d-8f64-58ee6e2c419a
    name: AttributeMapperLod0IncorrectOrientation
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: string
            value: IncorrectOrientation

  - id: d0a4c34c-c050-4017-960a-762a0ad09441
    name: FeatureWriterLod0IncorrectOrientation
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_LOD0面の向きエラー.csv

  # --- LOD1 boundary-surface validation pipeline ---
  # CityGML 3.0 buildings carry their LOD1 geometry as a `lod1Solid`; the
  # LodSplitter routes the per-LOD surfaces to the `lod1` port. SurfaceValidator3D
  # validates each boundary surface and emits the broken ones on `invalidSurface`.
  - id: 3ace9872-a832-406a-8fdb-af97610dd86d
    name: PLATEAU3.SurfaceValidator3D_LOD1
    type: subGraph
    subGraphId: 8a5b1c9d-2e4f-4a3b-9c5d-1e6f8a2b4c7d

  - id: afa5ac6e-0bf0-496c-91b5-a46058264ff6
    name: Lod1InvalidSurfaceCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod1_invalid_surface
          expr:
            type: flowExpr
            value: "1"

  - id: 7d0476b4-30db-45f5-bbd7-99c52a86e30b
    name: AttributeMapperLod1InvalidSurface
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: flowExpr
            value: |
              vr = attributes.get("validationResult");
              if vr != null and "details" in vr {
                vr["details"][0][0]
              } else if "issue" in attributes {
                attributes["issue"]
              } else {
                "UnknownError"
              }

  - id: f8589886-0315-441c-bca5-a937f9137e6f
    name: FeatureWriterLod1InvalidSurface
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_LOD1境界面のエラー.csv

  # --- LOD1 solid-boundary validation pipeline (L14) ---
  # SolidBoundaryValidator checks the lod1Solid shell. NotA2Manifold issues mean
  # the surface is not closed (watertight); everything else is reported as a
  # generic invalid solid boundary.
  - id: 45007e89-4cd7-49aa-b145-a40d6539f83c
    name: SolidBoundaryValidatorLod1
    type: action
    action: SolidBoundaryValidator
    with:
      tolerance:
        type: flowExpr
        value: "0.01"

  - id: 9c9074a7-7977-443e-897e-883128733faf
    name: FeatureFilterInvalidSolidBoundaryLod1
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["solid_boundary_issues"]["issue"] == "NotA2Manifold"
          outputPort: notClosed

  - id: 5af53e1b-cbfe-4cba-9f38-d8230d74468b
    name: Lod1NotClosedSolidCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod1_not_closed_solid
          expr:
            type: flowExpr
            value: "1"

  - id: 4941ec68-5567-41bd-a8a6-946c30343b26
    name: AttributeMapperLod1NotClosedSolid
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: string
            value: Surface Not Closed

  - id: 4261177e-6f06-48cc-aa24-f0a10382b704
    name: FeatureWriterLod1NotClosedSolid
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_非水密体.csv

  - id: 19da512d-70c7-4461-824b-047919d0cd40
    name: Lod1SolidIssuesCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod1_solid_issues
          expr:
            type: flowExpr
            value: "1"

  - id: 2173b3cb-18b8-43bf-a49e-cfe2f5fb1ff8
    name: AttributeMapperLod1SolidIssues
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: string
            value: InvalidSolidBoundaries

  - id: 59b03bd3-9e44-453e-92fc-52cc14abcf25
    name: FeatureWriterLod1SolidIssues
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_立体のエラー.csv

  # --- LOD1 solid intersection pipeline (L-BLDG-01) ---
  # Pre-filter candidate building pairs by overlapping their 2D footprints, then
  # confirm a real 3D overlap with a CSG intersection on the original solids.
  # SolidIntersectionTestPairCreator is a plateau4 action but is LOD-independent,
  # so it is reused here.
  # NOTE: plateau4 filters the lod1+ stream down to solids via
  # `gmlPropertyName.ends_with("Solid")`, but the CityGML 3.0 reader does not
  # populate `gmlPropertyName` (it stays "Unknown"). In CityGML 3.0 the LOD1
  # geometry is always a `lod1Solid` (lod1MultiSurface was removed), so the
  # LodSplitter `lod1` port already yields solids and no extra filter is needed.
  - id: 6536f03a-91b4-44d2-9e9d-d7b3e8e91b6b
    name: GeometryExtractorSolidIntersectionLod1
    type: action
    action: GeometryExtractor
    with:
      outputAttribute: _solid_geometry

  - id: 3cc74f98-96bd-4585-801b-02bb11c434c8
    name: FootprintReplacerSolidIntersectionLod1
    type: action
    action: FootprintReplacer

  # IMPORTANT: Shrink the footprint by 0.005m to match the behavior of the FME
  # PLATEAU workflow, which silently ignores small intersections caused by a few
  # mm of coordinate precision artifacts at shared building boundaries. This is
  # NOT part of the PLATEAU spec but is replicated for result comparability.
  - id: e25d4514-3bcc-4d10-b31b-bf93a57f23b1
    name: BuffererSolidIntersectionLod1
    type: action
    action: Bufferer
    with:
      bufferType: area2d
      distance: -0.005
      interpolationAngle: 0

  - id: 3f676870-4b7c-46f0-925e-073c20429200
    name: AreaOnAreaOverlayerSolidIntersectionLod1
    type: action
    action: AreaOnAreaOverlayer
    with:
      accumulationMode: dropIncomingAttributes
      outputAttribute: overlap
      generateList: list
      groupBy:
        - lod
      tolerance: 0.01

  - id: 689eabf1-cc48-43dd-b6b5-0ac7b369d0ab
    name: FeatureFilterSolidIntersectionOverlapLod1
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["overlap"] > 1
          outputPort: overlapping

  - id: 4c033bed-d29b-48f0-9226-bef423073e18
    name: PLATEAU4.SolidIntersectionTestPairCreator
    type: action
    action: PLATEAU4.SolidIntersectionTestPairCreator
    with:
      listAttribute: list
      gmlIdAttribute: __citygml_gml_id
      pairIdAttribute: pair_id

  - id: c56dec68-91f9-4d49-94d4-3e6142996735
    name: GeometryReplacerSolidIntersectionLod1A
    type: action
    action: GeometryReplacer
    with:
      sourceAttribute: _solid_geometry

  - id: 23e6f0c7-d4b2-4d1a-8287-a910a4f7dcc7
    name: GeometryReplacerSolidIntersectionLod1B
    type: action
    action: GeometryReplacer
    with:
      sourceAttribute: _solid_geometry

  - id: 585e54ec-2814-4e67-a5b2-33e16007110a
    name: CSGBuilderLod1
    type: action
    action: CSGBuilder
    with:
      pairIdAttribute:
        type: flowExpr
        value: attributes["pair_id"]
      createList: true
      listAttributeName: attrList

  - id: 8c37d786-50f7-4aba-8737-5422da3ba79b
    name: CSGEvaluatorLod1
    type: action
    action: CSGEvaluator
    with:
      operation: intersection
      tolerance:
        type: flowExpr
        value: "0.01"

  - id: a08a7333-b223-41d2-aea1-24966c6349b1
    name: AttributeMapperLod1SolidIntersection
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: intersection_id
          expr:
            type: flowExpr
            value: |
              item = attributes["attrList"][0];
              "lod" + str(item["lod"]) + "_" + str(item["pair_id"])
        - attribute: gmlFilenameA
          expr:
            type: flowExpr
            value: attributes["attrList"][0]["name"]
        - attribute: gmlFilenameB
          expr:
            type: flowExpr
            value: attributes["attrList"][1]["name"]
        - attribute: featureTypeA
          expr:
            type: flowExpr
            value: attributes["attrList"][0]["__citygml_feature_type"]
        - attribute: featureTypeB
          expr:
            type: flowExpr
            value: attributes["attrList"][1]["__citygml_feature_type"]
        - attribute: lodA
          expr:
            type: flowExpr
            value: attributes["attrList"][0]["lod"]
        - attribute: lodB
          expr:
            type: flowExpr
            value: attributes["attrList"][1]["lod"]
        - attribute: gmlIdA
          expr:
            type: flowExpr
            value: attributes["attrList"][0]["__citygml_gml_id"]
        - attribute: gmlIdB
          expr:
            type: flowExpr
            value: attributes["attrList"][1]["__citygml_gml_id"]
        - attribute: issue
          expr:
            type: string
            value: Solid Intersection

  - id: 68871b39-bb4c-45a2-a328-3725ad947f0f
    name: Lod1SolidIntersectionCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - gmlFilenameA
      calculations:
        - newAttribute: _num_lod1_solid_intersection
          expr:
            type: flowExpr
            value: if attributes["lodA"] == "1" { 1 } else { 0 }

  - id: 073a86d1-e1d0-497d-803f-6398518f0c1a
    name: FeatureWriterLod1SolidIntersection
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_立体交差.csv

  # Join the per-file LOD0 error counts back onto each building GML file feature.
  - id: 7edcc43f-22a3-4091-bef5-b6ba1b18a543
    name: ErrorSummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # Join the per-file LOD0 surface-intersection counts onto each file feature.
  - id: 7f364020-94f2-4c3a-9642-f94b696dc551
    name: SurfaceIntersectionSummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["filename_a"]

  # Join the per-file LOD0 orientation-error counts onto each file feature.
  - id: af18b16c-6dd7-41f8-b6b7-65ecb062aa67
    name: OrientationSummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # Join the per-file LOD1 invalid-surface counts onto each file feature.
  - id: a9806a8c-4796-42eb-a76e-960435492aaa
    name: InvalidSurfaceLod1SummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # Join the per-file LOD1 not-closed-solid counts onto each file feature.
  - id: 7af09d51-c5a9-4434-ab60-24ed7f1e8192
    name: NotClosedSolidLod1SummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # Join the per-file LOD1 invalid-solid counts onto each file feature.
  - id: d2268a59-ec0c-42a7-953b-b55475d27b30
    name: SolidIssuesLod1SummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # Join the per-file LOD1 solid-intersection counts onto each file feature.
  - id: c693f8b2-e6a9-4943-871d-f3ee950f75a0
    name: SolidIntersectionLod1SummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["gmlFilenameA"]

  # Build one summary row per building GML file.
  - id: 428129b3-ad69-4a18-bf99-25492d41ba26
    name: AttributeMapperBuildingSummary
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: Index
          valueAttribute: index
        - attribute: Filename
          expr:
            type: flowExpr
            value: attributes["path"].split("/")[-1]
        # TODO: wire to a PLATEAU6 city-code validator
        - attribute: "市区町村コードエラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 duplicate-building-id check (C-bldg-01)
        - attribute: "C-bldg-01 エラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 building-id format check
        - attribute: "不正な建物ID"
          expr:
            type: flowExpr
            value: "0"
