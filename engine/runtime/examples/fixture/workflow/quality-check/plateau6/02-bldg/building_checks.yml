  # --- Invalid building-id format pipeline (不正な建物ID / Z-bldg-01_URO) ---
  # Sibling of the C-bldg-01 duplicate check: it reuses the flattened building-id
  # attributes produced by AttributeManagerBuildingId. A building is "good" only
  # when its uro:buildingID matches the required format and its branch/part ids are
  # well-formed; everything else falls through to the `unfiltered` port and is
  # reported as 不正な建物ID. Mirrors plateau4 FeatureFilterValidBuildingIds.
  - id: c1b00010-0000-4000-8000-000000000010
    name: FeatureFilterValidBuildingIdFormat
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: |
              building_id = attributes.get("uroBuildingId", "");
              branch_id = attributes.get("uroBranchId", "");
              part_id = attributes.get("uroPartId", "");
              feature_type = attributes.get("__citygml_feature_type", "");
              building_id_valid = Regex(r"^\d{5}-bldg-\d+$").find(building_id) != null;
              branch_id_valid = branch_id == "" or type(branch_id) == "int";
              if feature_type == "bldg:Building" {
                part_id_valid = part_id == "";
              } else if feature_type == "bldg:BuildingPart" {
                part_id_valid = type(part_id) == "int";
              } else {
                part_id_valid = false;
              }
              building_id_valid and branch_id_valid and part_id_valid
          outputPort: goodUroFormatting

  # One CSV row per building with an invalid id format.
  - id: c1b00011-0000-4000-8000-000000000011
    name: AttributeMapperInvalidBuildingIdFormat
    type: action
    action: AttributeMapper
