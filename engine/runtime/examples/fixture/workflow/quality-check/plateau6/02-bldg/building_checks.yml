# PLATEAU6 (CityGML 3.0 + i-UR 4.0) quality-check 02-bldg sub-graph.
id: a7a69028-b9d9-4ef1-916a-db453fca2638
name: PLATEAU6.BuildingQualityCheck-02-bldg
nodes:
  - id: 63341eb4-409d-4668-b338-2d1e5ab003fd
    name: InputRouter
    type: action
    action: InputRouter
    with:
      routingPort: default

  - id: 27bb6136-ff9f-4523-9b28-bf01e0e9f698
    name: FeatureFilePathExtractor
    type: action
    action: FeatureFilePathExtractor
    with:
      sourceDataset: |
        env.get("__value")["cityGmlPath"]
      extractArchive: true
      destPrefix: udx

  - id: eb76867a-9d21-4c08-959b-abaf06bfadb6
    name: FeatureFilterByGml
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["extension"] == "gml"
          outputPort: default

  - id: a650b6b7-d764-4eb8-aeb0-6dc123e52d26
    name: FeatureSorterByName
    type: action
    action: FeatureSorter
    with:
      attributes:
        - name
      order: ascending

  - id: b229d8d1-f6c8-456a-b325-68f39a5fe82b
    name: FeatureCounterIndex
    type: action
    action: FeatureCounter
    with:
      countStart: 1
      outputAttribute: index

  - id: 06437150-b04d-4b41-83fc-e5767ea35a23
    name: FilePropertyExtractor
    type: action
    action: FilePropertyExtractor
    with:
      filePathAttribute: path

  # --- LOD0 surface validation pipeline ---
  # Reads each building GML (CityGML 3.0), splits geometry per LOD, validates the
  # LOD0 multi-surface.
  - id: d9349887-1920-44a6-93c9-182c8484d1a2
    name: FeatureCityGml3Reader
    type: action
    action: FeatureCityGml3Reader
    with:
      dataset:
        type: flowExpr
        value: attributes["path"]
      extractTags:
        - bldg:Building

  - id: 273fc537-32eb-44e1-af9f-d46bf0ba1cc8
    name: HorizontalReprojector
    type: action
    action: HorizontalReprojector
    with:
      sourceEpsgCode: "6697"
      targetEpsgCode: env.get("prcs")

  - id: 012f23c6-65e1-4759-ab04-f20ebecbadfc
    name: PLATEAU3.LodSplitterWithDM
    type: subGraph
    subGraphId: 7e98d856-1438-4148-bdcb-91747ef2e405

  - id: d12958f8-f52d-4c95-b62c-58a92d363017
    name: PLATEAU3.SurfaceValidator2D
    type: subGraph
    subGraphId: 8a5b1c9d-2e4f-4a3b-9c5d-1e6f8a2b4c7d

  - id: b60778f7-b110-44cb-a079-26d03f4dbb51
    name: Lod0InvalidSurfaceCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lod0_invalid_surface
          expr:
            type: flowExpr
            value: "1"

  - id: ce1613dd-0b26-45a8-984e-adcf8932656e
    name: AttributeMapperLod0InvalidSurface
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: filename
          valueAttribute: name
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: issue
          expr:
            type: flowExpr
            value: |
              vr = attributes.get("validationResult");
              if vr != null and "details" in vr {
                vr["details"][0][0]
              } else if "issue" in attributes {
                attributes["issue"]
              } else {
                "UnknownError"
              }

  - id: b06c19d6-0ad0-4a3c-90bf-26d3613d7637
    name: FeatureWriterLod0InvalidSurface
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_LOD0面のエラー.csv

  # Join the per-file LOD0 error counts back onto each building GML file feature.
  - id: 7edcc43f-22a3-4091-bef5-b6ba1b18a543
    name: ErrorSummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue: |
        env.get("__value").name
      supplierAttributeValue: |
        env.get("__value").name

  # Build one summary row per building GML file.
  - id: 428129b3-ad69-4a18-bf99-25492d41ba26
    name: AttributeMapperBuildingSummary
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: Index
          valueAttribute: index
        - attribute: Filename
          expr:
            type: flowExpr
            value: attributes["path"].split("/")[-1]
        # TODO: wire to a PLATEAU6 city-code validator
        - attribute: "市区町村コードエラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 duplicate-building-id check (C-bldg-01)
        - attribute: "C-bldg-01 エラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 building-id format check
        - attribute: "不正な建物ID"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 L-bldg-02 check
        - attribute: "L-bldg-02 エラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 L-bldg-04,05 usage-attribute validator
        - attribute: "L-bldg-04,05 エラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 L-bldg-06 check
        - attribute: "L-bldg-06 エラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 BuildingInstallation geometry-type check (T-bldg-02)
        - attribute: "T-bldg-02エラー"
          expr:
            type: flowExpr
            value: "0"
        # LOD0 surface errors: TooFewPoints etc.
        - attribute: "LOD0 面のエラー"
          expr:
            type: flowExpr
            value: attributes.get("_num_lod0_invalid_surface", 0)
        - attribute: "LOD0 面の向きエラー"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD0 面の交差"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to PLATEAU6 LOD1 surface/solid checks
        - attribute: "LOD1 境界面のエラー"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD1 非水密立体"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD1 立体のエラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to PLATEAU6 LOD2 surface/solid checks
        - attribute: "LOD2 境界面のエラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to PLATEAU6 LOD3 surface/solid checks
        - attribute: "LOD3 境界面のエラー"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD2 非水密立体"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD3 非水密立体"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD2 立体のエラー"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD3 立体のエラー"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 mesh-code (figure boundary) check
        - attribute: "図郭不正"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to a PLATEAU6 BuildingPart LOD0-1 check
        - attribute: "LOD0-1のBuildingPart"
          expr:
            type: flowExpr
            value: "0"
        # TODO: wire to PLATEAU6 solid-intersection checks
        - attribute: "LOD1 立体の交差"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD2 立体の交差"
          expr:
            type: flowExpr
            value: "0"
        - attribute: "LOD3 立体の交差"
          expr:
            type: flowExpr
            value: "0"

  - id: 501a24e8-b919-4f3b-9706-9ae6228f2bfd
    name: FeatureWriterCsv
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_検査結果一覧.csv

  # Aggregate the per-file building error columns into the error-count summary.
  # Each newAttribute name becomes a "name" entry in summary_bldg.json.
  - id: 2eea35c1-6732-471a-bb39-4a03f01d411a
    name: StatisticsCalculatorBuilding
    type: action
    action: StatisticsCalculator
    with:
      calculations:
        - newAttribute: "C-bldg-01 エラー"
          expr:
            type: flowExpr
            value: attributes.get("C-bldg-01 エラー", 0)
        - newAttribute: "不正な建物ID"
          expr:
            type: flowExpr
            value: attributes.get("不正な建物ID", 0)
        - newAttribute: "市区町村コードエラー"
          expr:
            type: flowExpr
            value: attributes.get("市区町村コードエラー", 0)
        - newAttribute: "L-bldg-02 エラー"
          expr:
            type: flowExpr
            value: attributes.get("L-bldg-02 エラー", 0)
        - newAttribute: "L-bldg-04,05 エラー"
          expr:
            type: flowExpr
            value: attributes.get("L-bldg-04,05 エラー", 0)
        - newAttribute: "L-bldg-06 エラー"
          expr:
            type: flowExpr
            value: attributes.get("L-bldg-06 エラー", 0)
        - newAttribute: "LOD0 面のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD0 面のエラー", 0)
        - newAttribute: "LOD0 面の向きエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD0 面の向きエラー", 0)
        - newAttribute: "LOD0 面の交差"
          expr:
            type: flowExpr
            value: attributes.get("LOD0 面の交差", 0)
        - newAttribute: "LOD1 境界面のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD1 境界面のエラー", 0)
        - newAttribute: "LOD1 非水密立体"
          expr:
            type: flowExpr
            value: attributes.get("LOD1 非水密立体", 0)
        - newAttribute: "LOD1 立体のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD1 立体のエラー", 0)
        - newAttribute: "LOD1 立体の交差"
          expr:
            type: flowExpr
            value: attributes.get("LOD1 立体の交差", 0)
        - newAttribute: "LOD2 境界面のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD2 境界面のエラー", 0)
        - newAttribute: "LOD2 非水密立体"
          expr:
            type: flowExpr
            value: attributes.get("LOD2 非水密立体", 0)
        - newAttribute: "LOD2 立体のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD2 立体のエラー", 0)
        - newAttribute: "LOD2 立体の交差"
          expr:
            type: flowExpr
            value: attributes.get("LOD2 立体の交差", 0)
        - newAttribute: "LOD3 境界面のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD3 境界面のエラー", 0)
        - newAttribute: "LOD3 非水密立体"
          expr:
            type: flowExpr
            value: attributes.get("LOD3 非水密立体", 0)
        - newAttribute: "LOD3 立体のエラー"
          expr:
            type: flowExpr
            value: attributes.get("LOD3 立体のエラー", 0)
        - newAttribute: "LOD3 立体の交差"
          expr:
            type: flowExpr
            value: attributes.get("LOD3 立体の交差", 0)
        - newAttribute: "T-bldg-02エラー"
          expr:
            type: flowExpr
            value: attributes.get("T-bldg-02エラー", 0)
        - newAttribute: "LOD0-1のBuildingPart"
          expr:
            type: flowExpr
            value: attributes.get("LOD0-1のBuildingPart", 0)
        - newAttribute: "totalErrorCount"
          expr:
            type: flowExpr
            value: |
              attributes.get("市区町村コードエラー", 0)
              + attributes.get("C-bldg-01 エラー", 0)
              + attributes.get("不正な建物ID", 0)
              + attributes.get("L-bldg-02 エラー", 0)
              + attributes.get("L-bldg-04,05 エラー", 0)
              + attributes.get("L-bldg-06 エラー", 0)
              + attributes.get("T-bldg-02エラー", 0)
              + attributes.get("LOD0 面のエラー", 0)
              + attributes.get("LOD0 面の向きエラー", 0)
              + attributes.get("LOD0 面の交差", 0)
              + attributes.get("LOD1 境界面のエラー", 0)
              + attributes.get("LOD1 非水密立体", 0)
              + attributes.get("LOD1 立体のエラー", 0)
              + attributes.get("LOD2 境界面のエラー", 0)
              + attributes.get("LOD3 境界面のエラー", 0)
              + attributes.get("LOD2 非水密立体", 0)
              + attributes.get("LOD3 非水密立体", 0)
              + attributes.get("LOD2 立体のエラー", 0)
              + attributes.get("LOD3 立体のエラー", 0)
              + attributes.get("図郭不正", 0)
              + attributes.get("LOD0-1のBuildingPart", 0)
              + attributes.get("LOD1 立体の交差", 0)
              + attributes.get("LOD2 立体の交差", 0)
              + attributes.get("LOD3 立体の交差", 0)

  - id: 4375b01b-c253-475b-8737-08736f4961f8
    name: FeatureWriterJson
    type: action
    action: FeatureWriter
    with:
      format: json
      converter:
        type: flowExpr
        value: |
          if len(attributes["__features"]) == 0 {
            []
          } else {
            result = [];
            feature = attributes["__features"][0];
            for key in feature.keys() {
              result.append({"name": key, "count": feature[key]});
            }
            result
          }
      output:
        type: string
        value: summary_bldg.json

  - id: 3730412c-8a45-417c-a669-fa10fec80028
    name: OutputRouter
    type: action
    action: OutputRouter
    with:
      routingPort: default

  - id: 20e962f2-e612-42c7-a107-8c0ff21a09af
    name: OutputRouterSummary
    type: action
    action: OutputRouter
    with:
      routingPort: summaryOutput

