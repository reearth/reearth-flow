  # --- C-bldg-01 duplicate building-id pipeline ---
  # Detect bldg:Building features that share the same composite key
  # (uro:buildingID + uro:branchID + uro:partID). In CityGML 3.0 the building id
  # lives under bldg:adeOfAbstractBuilding > uro:BuildingIDAttribute > uro:buildingID;
  # the reader keeps a single ADE as a map and multiple ADEs as a list.
  - id: c1b00001-0000-4000-8000-000000000001
    name: FeatureFilterBuildingForDuplicateId
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["__citygml_feature_type"] == "bldg:Building"
          outputPort: default

  # Flatten the building id parts into plain attributes for keying/counting.
  - id: c1b00002-0000-4000-8000-000000000002
    name: AttributeManagerBuildingId
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: uroBuildingId
          method: create
          value:
            type: flowExpr
            value: |
              ade = attributes.get("bldg:adeOfAbstractBuilding");
              id_attr = {};
              if type(ade) == "map" {
                id_attr = ade.get("uro:BuildingIDAttribute", {});
              } else if type(ade) == "list" {
                for item in ade {
                  if type(item) == "map" and "uro:BuildingIDAttribute" in item {
                    id_attr = item["uro:BuildingIDAttribute"];
                  }
                }
              }
              id_attr.get("uro:buildingID", "")
        - attribute: uroBranchId
          method: create
          value:
            type: flowExpr
            value: |
              ade = attributes.get("bldg:adeOfAbstractBuilding");
              id_attr = {};
              if type(ade) == "map" {
                id_attr = ade.get("uro:BuildingIDAttribute", {});
              } else if type(ade) == "list" {
                for item in ade {
                  if type(item) == "map" and "uro:BuildingIDAttribute" in item {
                    id_attr = item["uro:BuildingIDAttribute"];
                  }
                }
              }
              id_attr.get("uro:branchID", "")
        - attribute: uroPartId
          method: create
          value:
            type: flowExpr
            value: |
              ade = attributes.get("bldg:adeOfAbstractBuilding");
              id_attr = {};
              if type(ade) == "map" {
                id_attr = ade.get("uro:BuildingIDAttribute", {});
              } else if type(ade) == "list" {
                for item in ade {
                  if type(item) == "map" and "uro:BuildingIDAttribute" in item {
                    id_attr = item["uro:BuildingIDAttribute"];
                  }
                }
              }
              id_attr.get("uro:partID", "")

  # Count how many buildings share each composite id key.
  - id: c1b00003-0000-4000-8000-000000000003
    name: AttributeAggregatorDuplicateBuildingId
    type: action
    action: AttributeAggregator
    with:
      aggregateAttributes:
        - newAttribute: uroBuildingId
          attributeValue:
            type: flowExpr
            value: attributes.get("uroBuildingId", "")
        - newAttribute: uroBranchId
          attributeValue:
            type: flowExpr
            value: attributes.get("uroBranchId", "")
        - newAttribute: uroPartId
          attributeValue:
            type: flowExpr
