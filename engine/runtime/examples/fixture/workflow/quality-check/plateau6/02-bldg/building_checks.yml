      calculation:
        type: flowExpr
        value: "1"
      calculationAttribute: uroBuildingIdCount
      method: count

  # Join the per-key count back onto each building feature.
  - id: c1b00004-0000-4000-8000-000000000004
    name: FeatureMergerDuplicateBuildingId
