  - id: c1b00062-0000-4000-8000-000000000062
    name: PLATEAU6.BuildingPartConnectivityChecker
    type: action
    action: PLATEAU6.BuildingPartConnectivityChecker
    with:
      buildingIdAttribute: __citygml_parent_gml_id
      partIdAttribute: __citygml_gml_id
      lodAttribute: lod
      fileIndexAttribute: index

  # Keep only error parts (_status != "full").
  - id: c1b00063-0000-4000-8000-000000000063
    name: FilterNonFullStatusL02
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["_status"] != "full"
          outputPort: filtered

  - id: c1b00064-0000-4000-8000-000000000064
    name: DeduplicateBuildingPartsL02
    type: action
    action: FeatureDuplicateFilter

  - id: c1b00065-0000-4000-8000-000000000065
    name: AttributeMapperLbldg02
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: Index
          valueAttribute: index
        - attribute: Filename
          valueAttribute: name
        - attribute: Building.gml_id
          valueAttribute: __citygml_parent_gml_id
        - attribute: BuildingPart.gml_id
          valueAttribute: __citygml_gml_id
        - attribute: lod
          valueAttribute: lod
        - attribute: status
          valueAttribute: _status
        - attribute: connected_id
          valueAttribute: _connected_id
        - attribute: connected_parts
          valueAttribute: _connected_parts

  - id: c1b00066-0000-4000-8000-000000000066
    name: FeatureWriterLbldg02
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_L-bldg-02エラー.csv

  # Count L-bldg-02 error rows per file for the summary column.
  - id: c1b00067-0000-4000-8000-000000000067
    name: Lbldg02ErrorCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_lbldg02_error
          expr:
            type: flowExpr
            value: "1"

  # Join the per-file L-bldg-02 count onto each file feature.
  - id: c1b00068-0000-4000-8000-000000000068
    name: Lbldg02SummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

  # --- Z-bldg-03 mesh-code (figure boundary) pipeline ---
  # Taps the reprojected LOD0 footprints (already forced to 2D by TwoDimensionForcer)
  # and computes the Japanese standard 1km mesh code the building actually falls in.
  # A building whose GML filename does not start with that mesh code is a figure
  # boundary error (図郭不正). Mirrors the plateau4 surface_validation.yml wiring.
  - id: c1b00070-0000-4000-8000-000000000070
    name: DestinationMeshCodeExtractor
    type: action
    action: PLATEAU6.DestinationMeshCodeExtractor
    with:
      meshType: 3
      epsgCode:
        type: flowExpr
        value: env.get("prcs")
      meshcodeAttr: "meshcode"

  - id: c1b00071-0000-4000-8000-000000000071
    name: MeshCodeTester
    type: action
    action: FeatureFilter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: not attributes["name"].starts_with(attributes["meshcode"])
          outputPort: failed

  - id: c1b00072-0000-4000-8000-000000000072
    name: AttributeMapperIncorrectMeshCode
    type: action
    action: AttributeMapper
    with:
      mappers:
        - attribute: feature_type
          valueAttribute: __citygml_feature_type
        - attribute: meshcount
          valueAttribute: _mesh_count
        - attribute: lod
          valueAttribute: lod
        - attribute: meshcode
          valueAttribute: meshcode
        - attribute: filename
          valueAttribute: name
        - attribute: mesh2area
          valueAttribute: _meshcode_to_area
        - attribute: gml_id
          valueAttribute: __citygml_gml_id

  - id: c1b00073-0000-4000-8000-000000000073
    name: FeatureWriterIncorrectMeshCode
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: string
        value: 02_建築物_図郭不正.csv

  # Count 図郭不正 rows per file for the summary column.
  - id: c1b00074-0000-4000-8000-000000000074
    name: IncorrectMeshCodeCounter
    type: action
    action: StatisticsCalculator
    with:
      groupBy:
        - name
      calculations:
        - newAttribute: _num_incorrect_meshcode
          expr:
            type: flowExpr
            value: "1"

  # Join the per-file 図郭不正 count onto each file feature.
  - id: c1b00075-0000-4000-8000-000000000075
    name: IncorrectMeshCodeSummaryMerger
    type: action
    action: FeatureMerger
    with:
      requestorAttributeValue:
        type: flowExpr
        value: attributes["name"]
      supplierAttributeValue:
        type: flowExpr
        value: attributes["name"]

