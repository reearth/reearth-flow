# yaml-language-server: $schema=https://raw.githubusercontent.com/reearth/reearth-flow/main/engine/schema/workflow.json
id: 3e39d990-0a80-47df-9be9-3bf7c0068b5b
name: "PLATEAU4-DataConvert-04-luse-lsld-workflow-citygml2"
entryGraphId: 0e500d5a-7882-4835-9285-9763ba8b5b65
with:
  cityGmlPath:
  codelistsPath:
  schemasPath:
  codelists:
  schemas:
  cityCode:
  targetPackages:
    - luse
    - lsld
graphs:
  - !include ../../../../graphs/plateau4/folder_and_file_path_reader.yml
  - id: 0e500d5a-7882-4835-9285-9763ba8b5b65
    name: entry_point
    nodes:
      - id: 90f40a3e-61d3-48e2-a328-e7226c2ad1ae
        name: FeatureCreator
        type: action
        action: FeatureCreator
        with:
          creator:
            type: flowExpr
            value: |
              [
                {
                  "cityGmlPath": env["cityGmlPath"],
                  "cityCode": env.get("cityCode") or env["cityGmlPath"].rsplit("/", 1)[-1][:5],
                  "codelists": env.get("codelistsPath") or env.get("codelists"),
                  "schemas": env.get("schemasPath") or env.get("schemas"),
                },
              ]

      - id: d376f32b-7ce8-4721-8b9e-bfa39d71b860
        name: FolderAndFilePathReader
        type: subGraph
        subGraphId: c6863b71-953b-4d15-af56-396fc93fc617

      - id: ded2e272-e05c-4918-86b3-aa9f763da6e6
        name: FeatureReaderByCityGml
        type: action
        action: FeatureCityGml2Reader
        with:
          dataset:
            type: flowExpr
            value: attributes["path"]
          keepAttributes: false
          flattenSingleChildObjects: true
          flattenMeasureTypes: true
          cityGmlAttributesKey: cityGmlAttributes

      # FeatureCityGml2Reader emits the parsed CityGML content nested under
      # `cityGmlAttributes` and the identity as `__citygml_feature_type`/`__citygml_gml_id`.
      # PLATEAU4.AttributeFlattener and the downstream mappers expect `featureType`/`gmlId`.
      - id: 62a743b1-ac32-4fe1-a0d2-f13b41c37aa6
        name: TargetPackagesFilter
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: not env["targetPackages"] or attributes["package"] in env["targetPackages"]
              outputPort: features

      - id: 3820b7e2-a1ca-436b-acb0-72b907c8b246
        name: AttributeFlattener
        type: action
        action: PLATEAU4.AttributeFlattener

      - id: a7c3e1d2-5f8b-4a6c-9e0d-1b2c3d4e5f60
        name: TwoDimensionForcer
        type: action
        action: TwoDimensionForcer

      - id: 8510992d-2546-4e89-a09b-f31ff435bbb7
        name: FeatureFilterByPackage
        type: action
        action: FeatureFilter
        with:
          conditions:
            - expr:
                type: flowExpr
                value: attributes["package"] == "luse"
              outputPort: luse
            - expr:
                type: flowExpr
                value: attributes["package"] == "lsld"
              outputPort: lsld

      # LUSE processing branch
      - id: 6e5ed9fc-006e-4dbe-8699-4663dba795cb
        name: AttributeMapperLuse
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: meshcode
              expr:
                type: flowExpr
                value: attributes["path"].split("/")[-1].split("_")[0]
            - attribute: city_code
              valueAttribute: cityCode
            - attribute: city_name
              valueAttribute: cityName
            - attribute: feature_type
              valueAttribute: __citygml_feature_type
            - attribute: gml_id
              valueAttribute: __citygml_gml_id
            - attribute: luse_class
              expr:
                type: flowExpr
                value: attributes.get("luse:class")
            - attribute: luse_usage
              expr:
                type: flowExpr
                value: attributes.get("luse:usage")
            - attribute: core_creationDate
              expr:
                type: flowExpr
                value: attributes.get("core:creationDate")
            - attribute: uro_urbanPlanType
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:urbanPlanType")
            - attribute: uro_prefecture
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:prefecture")
            - attribute: uro_city
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:city")
            - attribute: uro_surveyYear
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:surveyYear")
            - attribute: uro_areaInSquareMeter
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:areaInSquareMeter")
            - attribute: uro_orgLandUse
              expr:
                type: flowExpr
                value: attributes.get("uro:LandUseDetailAttribute_uro:orgLandUse")
            - attribute: uro_geometrySrcDescLod1
              expr:
                type: flowExpr
                value: attributes.get("uro:DataQualityAttribute_uro:geometrySrcDescLod1")
            - attribute: attributes
              valueAttribute: attributes

      - id: b4862d31-4bb2-49b1-8f0d-6d58dd4cb385
        name: MVTWriterLuse
        type: action
        action: MVTWriter
        with:
          schemaKey: __citygml_feature_type
          layerName:
            type: string
            value: luse
          minZoom: 8
          maxZoom: 16
          extent: 65536
          output:
            type: string
            value: luse
          compressOutput:
            type: flowExpr
            value: |
              city_gml = env["cityGmlPath"].split("/")[-1].remove_suffix(".zip");
              city_gml.remove_suffix("_luse") + "_luse_mvt.zip"

      # LSLD processing branch
      - id: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        name: AttributeMapperLsld
        type: action
        action: AttributeMapper
        with:
          mappers:
            - attribute: meshcode
              expr:
                type: flowExpr
                value: attributes["path"].split("/")[-1].split("_")[0]
            - attribute: city_code
              valueAttribute: cityCode
            - attribute: city_name
              valueAttribute: cityName
            - attribute: feature_type
              valueAttribute: __citygml_feature_type
            - attribute: gml_id
              valueAttribute: __citygml_gml_id
            - attribute: core_creationDate
              expr:
                type: flowExpr
                value: attributes.get("core:creationDate")
            - attribute: urf_validFrom
              expr:
                type: flowExpr
                value: attributes.get("urf:validFrom")
            - attribute: urf_prefecture
              expr:
                type: flowExpr
                value: attributes.get("urf:prefecture")
            - attribute: urf_location
              expr:
                type: flowExpr
                value: attributes.get("urf:location")
            - attribute: urf_disasterType
              expr:
                type: flowExpr
                value: attributes.get("urf:disasterType")
            - attribute: urf_areaType
              expr:
                type: flowExpr
                value: attributes.get("urf:areaType")
            - attribute: urf_zoneNumber
              expr:
                type: flowExpr
                value: attributes.get("urf:zoneNumber")
            - attribute: urf_zoneName
              expr:
                type: flowExpr
                value: attributes.get("urf:zoneName")
            - attribute: urf_status
              expr:
                type: flowExpr
                value: attributes.get("urf:status")
            - attribute: uro_geometrySrcDescLod1
              expr:
                type: flowExpr
                value: attributes.get("uro:DataQualityAttribute_uro:geometrySrcDescLod1")
            - attribute: attributes
              valueAttribute: attributes
            - attribute: sort_order
              expr:
                type: flowExpr
                value: |
                  area_type = attributes.get("urf:areaType_code");
                  if area_type == null { area_type = attributes.get("urf:areaType") }
                  if area_type == "1" or area_type == 1 { 1 }
                  else if area_type == "2" or area_type == 2 { 2 }
                  else if area_type == "3" or area_type == 3 { 3 }
                  else if area_type == "4" or area_type == 4 { 4 }
                  else { 999 }

      - id: 9c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
        name: FeatureSorterLsld
        type: action
        action: FeatureSorter
        with:
          attributes:
            - sort_order
          order: ascending

      - id: 4b5c6d7e-8f9a-0b1c-2d3e-4f5a6b7c8d9e
        name: AttributeManagerLsldRemoveSortOrder
        type: action
        action: AttributeManager
        with:
          operations:
            - attribute: sort_order
              method: remove

      - id: 0d4e5f6a-7b8c-9d0e-1f2a-3b4c5d6e7f8a
        name: MVTWriterLsld
        type: action
        action: MVTWriter
        with:
          schemaKey: __citygml_feature_type
          layerName:
            type: string
            value: lsld
          minZoom: 8
          maxZoom: 16
          extent: 65536
          output:
            type: string
            value: lsld
          compressOutput:
            type: flowExpr
            value: |
              city_gml = env["cityGmlPath"].split("/")[-1].remove_suffix(".zip");
              city_gml.remove_suffix("_lsld") + "_lsld_mvt.zip"

    edges:
      - id: 5ebf24ab-1d98-49d5-8f58-eb7c18d27244
        from: 90f40a3e-61d3-48e2-a328-e7226c2ad1ae
        to: d376f32b-7ce8-4721-8b9e-bfa39d71b860
        fromPort: features
        toPort: features
      - id: 7b81f501-3f07-4cec-bf9b-9cefcebdf47d
        from: d376f32b-7ce8-4721-8b9e-bfa39d71b860
        to: ded2e272-e05c-4918-86b3-aa9f763da6e6
        fromPort: features
        toPort: features
      - id: ad52c3e6-68ff-4844-a7b2-d302fc0aef14
        from: ded2e272-e05c-4918-86b3-aa9f763da6e6
        to: 62a743b1-ac32-4fe1-a0d2-f13b41c37aa6
        fromPort: features
        toPort: features
      - id: 1076a29a-9d4c-4205-b3bb-d95072400253
        from: 62a743b1-ac32-4fe1-a0d2-f13b41c37aa6
        to: 3820b7e2-a1ca-436b-acb0-72b907c8b246
        fromPort: features
        toPort: features
      - id: c1d2e3f4-a5b6-7c8d-9e0f-1a2b3c4d5e6f
        from: 3820b7e2-a1ca-436b-acb0-72b907c8b246
        to: a7c3e1d2-5f8b-4a6c-9e0d-1b2c3d4e5f60
        fromPort: features
        toPort: features
      - id: 1e29f24a-620b-472c-805f-8295bf5920c2
        from: a7c3e1d2-5f8b-4a6c-9e0d-1b2c3d4e5f60
        to: 8510992d-2546-4e89-a09b-f31ff435bbb7
        fromPort: features
        toPort: features
      - id: 28abe7a9-8bdc-414d-b15e-90cb2a451a70
        from: 8510992d-2546-4e89-a09b-f31ff435bbb7
        to: 6e5ed9fc-006e-4dbe-8699-4663dba795cb
        fromPort: luse
        toPort: features
      - id: e862f11a-88a6-4c1b-a743-ba80253039df
        from: 6e5ed9fc-006e-4dbe-8699-4663dba795cb
        to: b4862d31-4bb2-49b1-8f0d-6d58dd4cb385
        fromPort: features
        toPort: features

      # LSLD branch edges
      - id: 1e2f3a4b-5c6d-7e8f-9a0b-1c2d3e4f5a6b
        from: 8510992d-2546-4e89-a09b-f31ff435bbb7
        to: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        fromPort: lsld
        toPort: features
      - id: 2f3a4b5c-6d7e-8f9a-0b1c-2d3e4f5a6b7c
        from: 7a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
        to: 9c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
        fromPort: features
        toPort: features
      - id: 3a4b5c6d-7e8f-9a0b-1c2d-3e4f5a6b7c8d
        from: 9c3d4e5f-6a7b-8c9d-0e1f-2a3b4c5d6e7f
        to: 4b5c6d7e-8f9a-0b1c-2d3e-4f5a6b7c8d9e
        fromPort: features
        toPort: features
      - id: 5c6d7e8f-9a0b-1c2d-3e4f-5a6b7c8d9e0f
        from: 4b5c6d7e-8f9a-0b1c-2d3e-4f5a6b7c8d9e
        to: 0d4e5f6a-7b8c-9d0e-1f2a-3b4c5d6e7f8a
        fromPort: features
        toPort: features

