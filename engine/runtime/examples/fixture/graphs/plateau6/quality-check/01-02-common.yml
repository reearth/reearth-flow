id: 0c1ed91a-7e69-4196-b6b7-d628060c2590
name: PLATEAU6.CommonQualityCheck-01-02-common
nodes:
  - id: 15b6f8e4-e91a-4b45-9c38-dbe2aabc0139
    name: InputRouter
    type: action
    action: Input Router
    with:
      routingPort: features

  - id: 110f6df8-bfef-4726-9ce8-cdde4ea73b5a
    name: PLATEAU6.ObjectListExtractor
    type: action
    action: PLATEAU6.ObjectListExtractor
    with:
      objectListPathAttribute: "objectListsPath"

  - id: 250564f8-7df6-416b-97ac-d77d14944331
    name: FeatureFilePathExtractor
    type: action
    action: Feature File Path Extractor
    with:
      sourceDataset:
        type: flowExpr
        value: attributes["cityGmlPath"]
      extractArchive: true
      destPrefix: udx

  - id: 8717dffc-9537-4bf2-b78a-b7b5c27ceaff
    name: FeatureFilterByGml
    type: action
    action: Feature Filter
    with:
      conditions:
        - expr:
            type: flowExpr
            value: attributes["extension"] == "gml"
          outputPort: features

  - id: d5c7ab8c-7f51-4ce0-b251-eb6e5636f4c9
    name: PLATEAU6.UDXFolderExtractor
    type: action
    action: PLATEAU6.UDXFolderExtractor
    with:
      cityGmlPath:
        type: flowExpr
        value: attributes["path"]
      codelistsPath: "codelists"
      schemasPath: "schemas"

  - id: dafb3642-e144-4bf7-b5fd-5c21e54ad350
    name: XMLFragmenter
    type: action
    action: XML Fragmenter
    with:
      source: url
      elementsToMatch:
        type: flowExpr
        value: attributes["featureTypes"][attributes["package"]]
      elementsToExclude:
        type: flowExpr
        value: "[]"
      attribute: path

  - id: 585b39dd-4068-4674-a865-e2c7009b4b0c
    name: FeatureCounter
    type: action
    action: Feature Counter
    with:
      countStart: 0
      outputAttribute: featureIndex

  - id: f853fc08-49c5-49d9-8b2c-bdf423f1475a
    name: PLATEAU6.MissingAttributeDetector
    type: action
    action: PLATEAU6.MissingAttributeDetector
    with:
      packageAttribute: "package"

  - id: 3b77c3fd-b9ae-4fa6-90fa-eee3abe148d2
    name: FeatureWriterBySummary
    type: action
    action: FeatureWriter
    with:
      format: json
      converter:
        type: flowExpr
        value: |
          if len(attributes["__features"]) == 0 {
            {}
          } else {
            feature = attributes["__features"][0];
            feature["dataFileData"]
          }
      output:
        type: flowExpr
        value: |
          "summary_common2-" + attributes["package"] + ".json"

  - id: 086251b1-f820-44e1-a8d5-79440769dc26
    name: AttributeMapperRequired
    type: action
    action: Attribute Mapper
    with:
      mappers:
        - attribute: package
          valueAttribute: package
        - attribute: dirs
          valueAttribute: udxDirs
        - attribute: filename
          expr:
            type: flowExpr
            value: attributes["path"].split("/")[-1]
        - attribute: gml_id
          valueAttribute: gmlId
        - attribute: severity
          valueAttribute: severity
        - attribute: feature_type
          valueAttribute: featureType
        - attribute: name
          valueAttribute: missing

  - id: 338751f9-0dd4-4f55-b2cf-ce476b45338d
    name: FeatureWriterByRequired
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: flowExpr
        value: |
          "01-2_必須属性等_C05必須属性等の欠落_" + attributes["package"] + ".csv"

  - id: 19198252-b7f0-4b88-b56f-8ae4ee7e1e9c
    name: AttributeMapperTarget
    type: action
    action: Attribute Mapper
    with:
      mappers:
        - attribute: package
          valueAttribute: package
        - attribute: feature_type
          valueAttribute: featureType
        - attribute: name
          valueAttribute: missing

  - id: 06e9b878-19ab-41bf-b908-ae30a52b048a
    name: FeatureWriterByTarget
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: flowExpr
        value: |
          "01-2_必須属性等_C06現われない属性等_" + attributes["package"] + ".csv"

  - id: 62732346-381c-4fc9-b948-2c831c01371c
    name: AttributeMapperC07
    type: action
    action: Attribute Mapper
    with:
      mappers:
        - attribute: package
          valueAttribute: package
        - attribute: dirs
          valueAttribute: udxDirs
        - attribute: filename
          expr:
            type: flowExpr
            value: attributes["path"].split("/")[-1]
        - attribute: gml_id
          valueAttribute: gmlId
        - attribute: feature_type
          valueAttribute: featureType
        - attribute: lod
          valueAttribute: lod
        - attribute: name
          valueAttribute: missing

  - id: 1a89b7e2-2107-452f-bebe-7c13916ac46b
    name: FeatureWriterByC07
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: flowExpr
        value: |
          "01-2_必須属性等_C07品質属性_" + attributes["package"] + ".csv"

  - id: f8718b6b-b306-4fda-a8b4-0b01f2496b30
    name: AttributeMapperC08
    type: action
    action: Attribute Mapper
    with:
      mappers:
        - attribute: package
          valueAttribute: package
        - attribute: dirs
          valueAttribute: udxDirs
        - attribute: filename
          expr:
            type: flowExpr
            value: attributes["path"].split("/")[-1]
        - attribute: gml_id
          valueAttribute: gmlId
        - attribute: feature_type
          valueAttribute: featureType
        - attribute: lod
          valueAttribute: lod
        - attribute: name
          valueAttribute: missing

  - id: eaa12d5b-fefa-46d9-a35e-4468f6825619
    name: FeatureWriterByC08
    type: action
    action: FeatureWriter
    with:
      format: csv
      output:
        type: flowExpr
        value: |
          "01-2_必須属性等_C08公共測量品質属性_" + attributes["package"] + ".csv"

  - id: 6230df10-ac26-4086-9990-05b52dfb5ef4
    name: AttributeManagerTotalErrorCount
    type: action
    action: Attribute Manager
    with:
      operations:
        - attribute: totalErrorCount
          method: create
          value:
            type: flowExpr
            value: |
              total = 0;
              data = attributes.get("dataFileData");
              if data != null {
                for item in data {
                  if type(item) == dict {
                    count = item.get("count");
                    if count != null and type(count) == int {
                      total += count;
                    }
                  }
                }
              }
              total

  - id: 65bb33a7-fa81-41b7-a657-344bc2b5489c
    name: OutputRouter
    type: action
    action: Output Router
    with:
      routingPort: features

  - id: 2c75bdff-7bc3-4b14-8d50-4d0e83da6343
    name: OutputRouterSummary
    type: action
    action: Output Router
    with:
      routingPort: summaryOutput

  # Per-file aggregation for C05 errors (required attributes)
  - id: 63d44b96-3bed-4377-9864-4b1665d08f90
    name: StatisticsCalculatorC05PerFile
    type: action
    action: Statistics Calculator
    with:
      groupBy:
        - filename
      calculations:
        - newAttribute: C05エラー
          expr:
            type: flowExpr
            value: "1"

  # Per-file aggregation for C07 errors (data quality attributes)
  - id: cdf776ec-02bc-4c16-b1ce-755ec6e66434
    name: StatisticsCalculatorC07PerFile
    type: action
    action: Statistics Calculator
    with:
      groupBy:
        - filename
      calculations:
        - newAttribute: C07エラー
          expr:
            type: flowExpr
            value: "1"

  # Per-file aggregation for C08 errors (public survey quality attributes)
  - id: 5c41a6a9-2ef4-4581-940c-2744a094afc0
    name: StatisticsCalculatorC08PerFile
    type: action
    action: Statistics Calculator
    with:
      groupBy:
        - filename
      calculations:
        - newAttribute: C08エラー
          expr:
            type: flowExpr
            value: "1"

  - id: c2c8e346-7189-4f06-a08c-09cb46f46140
    name: OutputRouterPerFile
    type: action
    action: Output Router
    with:
      routingPort: perFileOutput

