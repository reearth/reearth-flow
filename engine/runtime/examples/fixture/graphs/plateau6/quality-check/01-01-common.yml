  - id: aa7828b4-54f5-41c7-9ab7-15653010200c
    name: AttributeManagerL01AndL02Errors
    type: action
    action: AttributeManager
    with:
      operations:
        - attribute: L01Errors
          method: create
          value:
            type: flowExpr
            value: |
              if attributes["status"] == "NOT_WELL_FORMED" {
                len(attributes["xmlError"])
              } else {
                0
              }
        - attribute: L02Errors
          method: create
          value:
            type: flowExpr
            value: |
              if attributes["status"] == "INVALID" {
                len(attributes["xmlError"])
              } else {
                0
              }

