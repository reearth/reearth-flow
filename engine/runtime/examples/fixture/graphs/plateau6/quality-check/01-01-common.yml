  - id: 9e34709d-b8d1-4080-8ebf-bebe4641e681
    name: StatisticsCalculator
    type: action
    action: StatisticsCalculator
    with:
      calculations:
        - newAttribute: "L01エラー"
          expr:
            type: flowExpr
            value: attributes.get("L01エラー", 0)

        - newAttribute: "L02エラー"
          expr:
            type: flowExpr
            value: attributes.get("L02エラー", 0)

        - newAttribute: "L04エラー"
          expr:
            type: flowExpr
            value: attributes.get("L04エラー", 0)

        - newAttribute: "不正なcodeSpace数"
          expr:
            type: flowExpr
            value: attributes.get("不正なcodeSpace数", 0)

        - newAttribute: "L05CRS識別子"
          expr:
            type: flowExpr
            value: |
              if attributes.get("L05CRS識別子") == "Wrong" {
                1
              } else {
                0
              }

        - newAttribute: "L06エラー"
          expr:
            type: flowExpr
            value: attributes.get("L06エラー", 0)

        - newAttribute: "T03エラー"
          expr:
            type: flowExpr
            value: attributes.get("T03エラー", 0)

        - newAttribute: "xlink参照先なし"
          expr:
            type: flowExpr
            value: attributes.get("xlink参照先なし", 0)

        - newAttribute: "gml:id重複"
          expr:
            type: flowExpr
            value: attributes.get("gml:id重複", 0)

        - newAttribute: "gml:id書式不正"
          expr:
            type: flowExpr
            value: attributes.get("gml:id書式不正", 0)

        - newAttribute: "L-frn-01エラー"
          expr:
            type: flowExpr
            value: attributes.get("L-frn-01エラー", 0)

  - id: 50de9474-378b-4878-b85d-516cf8a55547
    name: FeatureWriterJson
    type: action
    action: FeatureWriter
    with:
      format: json
      converter:
        type: flowExpr
        value: |
          if len(attributes["__features"]) == 0 {
            []
          } else {
            result = [];
            feature = attributes["__features"][0];
            for key in feature.keys() {
              result.append({"name": key, "count": feature[key]});
            }
            result
          }
      output:
        type: string
        value: summary_common.json

