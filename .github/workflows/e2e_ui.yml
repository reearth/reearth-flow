name: Reearth Flow - E2E UI Tests
on:
  schedule:
    # 00:30 UTC daily (09:30 JST) — failures surface at the start of the workday.
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Which tests to run"
        type: choice
        default: all
        options:
          - all # fast + pipeline (same as the scheduled run)
          - fast # @smoke/@regression UI tests only
          - pipeline # tests that deploy and run real engine jobs
          - smoke # @smoke-tagged sanity check only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      BUCKET: reearth-oss-flow-allure-reports
    defaults:
      run:
        working-directory: ui/e2e
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: ui/e2e/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        # Scheduled runs have no input, so default to the full fast + pipeline suite.
        run: |
          case "${{ github.event.inputs.test_scope || 'all' }}" in
            fast)     npm run test:fast ;;
            pipeline) npm run test:pipeline ;;
            smoke)    npm run test:smoke ;;
            *)        npm test ;;
          esac
        env:
          CI: "true"
          FLOW_DASHBOARD_E2E_BASEURL: ${{ secrets.FLOW_DASHBOARD_E2E_BASEURL }}
          FLOW_DASHBOARD_E2E_USER_EMAIL: ${{ secrets.FLOW_DASHBOARD_E2E_USER_EMAIL }}
          FLOW_DASHBOARD_E2E_USER_PASSWORD: ${{ secrets.FLOW_DASHBOARD_E2E_USER_PASSWORD }}
      - name: Check Allure Results
        if: ${{ !cancelled() }}
        id: check-results
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "has_results=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            echo "No allure results found, skipping report steps."
          fi

      - name: Authenticate to Google Cloud for GCS
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          service_account: ${{ secrets.GC_SA_EMAIL }}
          workload_identity_provider: ${{ secrets.GC_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Setup Google Cloud SDK
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Load dashboard index and history from GCS
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        run: |
          # Download index or create empty one if it does not exist
          if gsutil cp "gs://$BUCKET/index.json" /tmp/index.json 2>/tmp/gsutil_index_err.log; then
            echo "Downloaded existing index.json from GCS."
          else
            if grep -qiE "No URLs matched|Matched no objects|404" /tmp/gsutil_index_err.log; then
              echo "No existing index.json found in bucket, starting with empty index."
              echo '[]' > /tmp/index.json
            else
              echo "Failed to download index.json from GCS. Error output:"
              cat /tmp/gsutil_index_err.log
              rm -f /tmp/gsutil_index_err.log
              exit 1
            fi
          fi
          rm -f /tmp/gsutil_index_err.log || true

          # Get most recent run for history
          MOST_RECENT_RUN=$(python3 -c "
          import json, sys
          try:
              with open('/tmp/index.json') as f:
                  data = json.load(f)
              print(data[0]['id'] if data else '')
          except Exception:
              print('')
          ")

          if [ -n "$MOST_RECENT_RUN" ]; then
            echo "Found previous run: $MOST_RECENT_RUN"
            mkdir -p ./allure-results/history
            if ! gsutil -m rsync -r "gs://$BUCKET/runs/$MOST_RECENT_RUN/history/" ./allure-results/history/ 2>/tmp/gsutil_history_err.log; then
              if grep -qE "Matched 0 objects|No URLs matched" /tmp/gsutil_history_err.log; then
                echo "No history objects found for run $MOST_RECENT_RUN; continuing without history."
              else
                echo "Error syncing history from GCS:" >&2
                cat /tmp/gsutil_history_err.log >&2
              fi
            fi
            rm -f /tmp/gsutil_history_err.log || true
          else
            echo "No previous runs, starting fresh"
          fi

      - name: Generate Allure report
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        run: rm -rf allure-report; npm run allure:generate

      - name: Determine Run ID
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        id: run-id
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_ID="run-${SHORT_SHA}-${{ github.run_number }}-${{ github.run_attempt }}"
          LABEL="${{ github.ref_name }} #${{ github.run_number }}"
          if [ "${{ github.run_attempt }}" != "1" ]; then
            LABEL="$LABEL (attempt ${{ github.run_attempt }})"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Upload Allure Report to GCS
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        env:
          RUN_ID: ${{ steps.run-id.outputs.run_id }}
        run: |
          gsutil -m rsync -r -d ./allure-report "gs://$BUCKET/runs/$RUN_ID/"
          if [ -f "./allure-report/widgets/summary.json" ]; then
            gsutil cp ./allure-report/widgets/summary.json "gs://$BUCKET/runs/$RUN_ID/summary.json"
          fi

      - name: Update dashboard index.json
        if: ${{ !cancelled() && steps.check-results.outputs.has_results == 'true' }}
        env:
          RUN_ID: ${{ steps.run-id.outputs.run_id }}
          BRANCH: ${{ steps.run-id.outputs.branch }}
          COMMIT: ${{ steps.run-id.outputs.commit }}
          LABEL: ${{ steps.run-id.outputs.label }}
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone

          with open('/tmp/index.json') as f:
              runs = json.load(f)

          run_id = os.environ['RUN_ID']
          label = os.environ['LABEL']
          branch = os.environ['BRANCH']
          commit = os.environ['COMMIT']

          runs = [r for r in runs if r.get('id') != run_id]

          new_entry = {
              'id': run_id,
              'label': label,
              'branch': branch,
              'commit': commit,
              'createdAt': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'path': f'runs/{run_id}/index.html'
          }

          runs.insert(0, new_entry)
          runs = runs[:50]

          with open('/tmp/index.json', 'w') as f:
              json.dump(runs, f, indent=2)
          "

          OBJECT="gs://$BUCKET/index.json"
          if STAT_OUT=$(gsutil stat "$OBJECT" 2>/tmp/gsutil_stat_err.log); then
            GEN=$(echo "$STAT_OUT" | awk '/Generation:/ {print $2}')
          elif grep -qiE "No URLs matched|Matched no objects|404" /tmp/gsutil_stat_err.log; then
            echo "No existing index.json in bucket; creating it."
            GEN=0
          else
            echo "gsutil stat failed unexpectedly:" >&2
            cat /tmp/gsutil_stat_err.log >&2
            exit 1
          fi
          rm -f /tmp/gsutil_stat_err.log

          gsutil -h "Content-Type:application/json" -h "Cache-Control:no-cache" \
            -h "x-goog-if-generation-match:${GEN}" \
            cp /tmp/index.json "$OBJECT"

      - name: Upload Allure report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: allure-report
          path: ui/e2e/allure-report
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: ui/e2e/test-results
          retention-days: 14
