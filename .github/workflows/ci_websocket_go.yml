# CI for the Go Y-WebSocket server (server/websocket-go). Runs additively
# alongside the Rust ci_websocket.yml during the blue-green coexistence; the
# cutover later replaces the Rust workflow with this one (deploy/README.md).
# Go toolchain: vet + gofmt + golangci-lint + race tests + govulncheck.

name: ci-websocket-go

on:
  workflow_call:

defaults:
  run:
    working-directory: server/websocket-go

jobs:
  ci:
    runs-on: ubuntu-latest
    # This module is intentionally excluded from the repo-root go.work, so all go
    # commands must run in module mode. Without this the runner auto-detects the
    # root go.work and fails: "directory prefix . does not contain modules listed
    # in go.work or their selected dependencies".
    env:
      GOWORK: "off"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # go-version '1.25' = latest 1.25.x patch. Keep >= 1.25.10 once available so
      # the govulncheck stdlib findings clear (docs/build-hygiene.md §2).
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.25"
          cache-dependency-path: server/websocket-go/go.sum

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      # golangci-lint v2.4.0 is the FIRST release built with go1.25 and the first
      # to accept a go1.25 target. A go1.24-built binary (e.g. v2.3.0) errors:
      # "the Go language version (go1.24) used to build golangci-lint is lower
      # than the targeted Go version (1.25.0)". Do NOT downgrade the module's go
      # directive — pin the linter forward instead (docs/build-hygiene.md §1).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.4.0
          working-directory: server/websocket-go

      - name: Test (race)
        run: go test ./... -race

      # govulncheck policy (consistent with docs/build-hygiene.md §2):
      #   - HARD FAIL on any CALLED vuln in a THIRD-PARTY dependency (module !=
      #     "stdlib" with a populated call trace) — these are real, fix them.
      #   - WARN (do not fail) on CALLED vulns in the Go STANDARD LIBRARY — those
      #     are cleared by bumping the builder's Go patch (the floating
      #     go-version '1.25' picks up patches; target >= go1.25.10). Tighten to a
      #     hard fail on stdlib too once the runners ship the patched Go.
      #   - Non-called ("imported"/"required") findings are informational.
      # We parse -json so the stdlib/non-stdlib split is precise rather than a
      # blanket pass/fail on the exit code. A "called" finding is a finding record
      # whose trace has a resolved function (.finding.trace[0].function != null).
      - name: govulncheck
        run: |
          set -o pipefail
          go run golang.org/x/vuln/cmd/govulncheck@latest -json ./... > govuln.json || true

          called_nonstdlib=$(jq -r '
            select(.finding != null)
            | .finding
            | select(.trace[0].function != null)        # CALLED (resolved symbol)
            | select(.trace[0].module != "stdlib")       # third-party only
            | "\(.osv) \(.trace[0].module)"' govuln.json | sort -u)

          called_stdlib=$(jq -r '
            select(.finding != null)
            | .finding
            | select(.trace[0].function != null)
            | select(.trace[0].module == "stdlib")
            | .osv' govuln.json | sort -u)

          if [ -n "$called_stdlib" ]; then
            echo "::warning::govulncheck: CALLED stdlib vulns (clear by bumping the Go builder patch >= go1.25.10, see docs/build-hygiene.md):"
            echo "$called_stdlib"
          fi

          if [ -n "$called_nonstdlib" ]; then
            echo "::error::govulncheck: CALLED vulnerabilities in third-party dependencies — must be fixed:"
            echo "$called_nonstdlib"
            exit 1
          fi
          echo "govulncheck: no called third-party vulnerabilities."
