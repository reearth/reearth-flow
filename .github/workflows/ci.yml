name: ci-bench-conv-concurrency

on:
  push:
  pull_request:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short
  FLOW_RUNTIME_ACTION_LOG_DISABLE: true

defaults:
  run:
    working-directory: engine

jobs:
  test-conv-concurrency-1:
    name: test-conv (concurrency=1)
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      PLATEAU_TILES_TEST_CONCURRENCY: 1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-engine-ci
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install glb-decompress
        run: |
          for attempt in 1 2 3; do
            if npm install -g github:asrcpq/glb_decompress_draco#d0dc30683ae65bb60dda96192b8c1b1d8a80a771; then
              echo "glb-decompress install succeeded on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed; sleeping 15s before retry..."
            sleep 15
          done
          echo "glb-decompress install failed after 3 attempts" >&2
          exit 1
      - name: test-conv
        run: cargo make test-conv

  test-conv-concurrency-2:
    name: test-conv (concurrency=2)
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      PLATEAU_TILES_TEST_CONCURRENCY: 2
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-engine-ci
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install glb-decompress
        run: |
          for attempt in 1 2 3; do
            if npm install -g github:asrcpq/glb_decompress_draco#d0dc30683ae65bb60dda96192b8c1b1d8a80a771; then
              echo "glb-decompress install succeeded on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed; sleeping 15s before retry..."
            sleep 15
          done
          echo "glb-decompress install failed after 3 attempts" >&2
          exit 1
      - name: test-conv
        run: cargo make test-conv
