type NodeExecution implements Node {
  id: ID!
  jobId: ID!
  nodeId: ID!
  status: NodeStatus!
  createdAt: DateTime
  startedAt: DateTime
  completedAt: DateTime
  diagnostics: [Diagnostic!]
}

enum NodeStatus {
  """
  Never emitted by the runtime; retained for API compatibility.
  """
  PENDING
  STARTING
  PROCESSING
  COMPLETED
  FAILED
}

extend type Subscription {
  nodeStatus(jobId: ID!, nodeId: String!): NodeStatus!
}

extend type Query {
  nodeExecution(jobId: ID!, nodeId: String!): NodeExecution
  nodeExecutions(jobId: ID!): [NodeExecution!]
}
