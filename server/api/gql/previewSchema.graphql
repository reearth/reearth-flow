# InputType

input PreviewSchemaInput {
  projectId: ID!
  workspaceId: ID!
  file: Upload!
  parameters: [RunParameterInput!]
  sampleSize: Int
}

# Payload

type PreviewSchemaPayload {
  job: Job!
}

# Mutation

extend type Mutation {
  previewSchema(input: PreviewSchemaInput!): PreviewSchemaPayload!
}
